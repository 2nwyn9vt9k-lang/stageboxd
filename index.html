<style>
  /* Single fixed palette — Bright Turquoise & Gold. (WARM/dark mode and the
     toggle were removed by request; colors still route through these CSS
     custom properties rather than being hardcoded in rules, in case a second
     palette is ever wanted again.)
     2026-06-27: --chalk and --chalk-dim were darkened well past --ink for
     real contrast against the teal --stage/--panel backgrounds (chalk-dim
     used to be LIGHTER than chalk, which is why it was nearly invisible —
     "dim" was being read as "lower contrast" instead of "less saturated/
     less prominent but still legible"). --ink, --amber, and --amber-dim are
     untouched — ink already had huge headroom on the cream --paper
     background, and the gold accent was working as intended.
     2026-06-27 (later): marquee h1 sized up and given a crisp no-blur
     depth shadow alongside the existing soft glow — see --title-glow's
     comment at its declaration for why blur radius itself was left
     alone. */
  :root{
    --stage:#1E9E99;
    --panel:#178F8A;
    --panel-line:#0F6E69;
    --paper:#FFF6DC;
    --paper-line:#F0DCA0;
    --amber:#FFC93D;
    --amber-dim:#E0A92E;
    --curtain:#C2613D;
    --pink:#FF4FA0;
    --ink:#0A3F3C;
    --chalk:#04211F;
    --chalk-dim:#082E2B;
    /* Blur radius (6px) is the parameter that caused the old "jumbled,
       illegible" glow — it's what fills in the gaps between letters on a
       bold condensed face. Left untouched on purpose; only opacity moved. */
    --title-glow:0 0 6px rgba(255,201,61,0.42);
    --bulb-glow:rgba(255,201,61,.45);
    --font-display:Impact, Haettenschweiler, 'Anton', 'Arial Narrow Bold', sans-serif;
    --font-body:'Source Serif 4', Georgia, serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--stage);
    color:var(--chalk);
    font-family:var(--font-body);
    line-height:1.5;
  }
  ::selection{ background:var(--amber); color:var(--ink); }

  /* ---------- marquee header ---------- */
  .marquee{
    background:var(--panel);
    border-bottom:3px solid var(--amber-dim);
    padding:22px 20px 16px;
    text-align:center;
    position:relative;
  }
  .marquee h1{
    font-family:var(--font-display);
    font-size:clamp(32px,7.5vw,54px);
    letter-spacing:3px;
    margin:0;
    color:var(--amber);
    text-shadow:1px 2px 0 var(--panel-line), var(--title-glow);
    text-transform:uppercase;
  }
  .marquee .sub{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin-top:6px;
  }
  .bottom-actions{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:30;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    background:var(--panel);
    border-top:1px solid var(--panel-line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .bottom-actions button{
    background:none;
    border:1px solid var(--panel-line);
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1px;
    padding:8px 14px;
    border-radius:4px;
    cursor:pointer;
  }
  .bottom-actions button:hover{ border-color:var(--amber); color:var(--amber); }

  /* ---------- nav ---------- */
  nav{
    display:flex;
    justify-content:center;
    background:var(--panel);
    border-bottom:1px solid var(--panel-line);
    position:sticky; top:0; z-index:20;
  }
  nav button{
    background:none; border:none;
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:13px 18px;
    cursor:pointer;
    border-bottom:3px solid transparent;
  }
  nav button.active{
    color:var(--amber);
    border-bottom-color:var(--amber);
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:24px 16px 120px;
  }
  .tab{ display:none; }
  .tab.active{ display:block; animation:fadein .25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  h2.section-title{
    font-family:var(--font-mono);
    font-weight:700;
    color:var(--chalk);
    letter-spacing:2px;
    font-size:16px;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .section-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    margin:0 0 18px;
  }

  /* ---------- ticket stub card (signature element) ---------- */
  .ticket{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    position:relative;
    padding:18px 20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.35);
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:18px; height:18px;
    background:var(--stage);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-9px; }
  .ticket::after{ right:-9px; }
  .ticket .perf{
    border-top:2px dashed var(--paper-line);
    margin:14px 0;
  }
  .ticket .show-title{
    font-family:var(--font-display);
    font-size:24px;
    letter-spacing:.5px;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .ticket .credits{
    font-family:var(--font-mono);
    font-size:11px;
    color:#5a5550;
    letter-spacing:.3px;
  }
  .ticket .tags{ margin-top:6px; }
  .tag-pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.5px;
    background:rgba(0,0,0,0.06);
    border-radius:10px;
    padding:2px 8px;
    margin:0 4px 4px 0;
    color:#5a5550;
  }

  /* ---------- buttons / chips ---------- */
  .btnrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .btn{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.5px;
    padding:9px 14px;
    border-radius:5px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
  }
  .btn:hover{ border-color:var(--ink); }
  .btn.primary{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .btn.amber{ background:var(--amber); color:var(--ink); border-color:var(--amber); font-weight:700; }
  .btn.ghost-dark{
    background:transparent; color:var(--chalk); border:1px solid var(--panel-line);
  }
  .btn.ghost-dark:hover{ border-color:var(--amber); color:var(--amber); }
  .btn.danger{ color:var(--curtain); border-color:var(--curtain); background:#fff; }
  .btn.small{ padding:5px 10px; font-size:11px; }
  .btn:disabled{ opacity:.4; cursor:default; }

  .chip{
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 11px;
    border-radius:14px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    display:inline-block;
  }
  .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .verdict-chip[data-v="allIn"].on{ background:var(--pink); border-color:var(--pink); color:#fff; }

  /* ---------- form elements ---------- */
  .field{ margin:14px 0; }
  .field label{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:#5a5550;
    margin-bottom:6px;
  }
  .field input[type=text], .field input[type=date], .field textarea, .field select{
    width:100%;
    font-family:var(--font-body);
    font-size:16px;
    padding:9px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:64px; }
  .capacity-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .capacity-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .capacity-grid .cap-chip{ display:flex; align-items:center; justify-content:center; text-align:center; border-radius:8px; padding:16px 10px; min-height:60px; }
  .rating-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .rate-btn{
    font-family:var(--font-mono);
    font-size:11px;
    padding:7px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    cursor:pointer;
  }
  .rate-btn.on{ background:var(--amber); border-color:var(--amber); font-weight:700; }
  .rate-hint{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:4px; }

  /* ---------- logged experience entries ---------- */
  .exp-entry{
    background:rgba(0,0,0,0.04);
    border-left:3px solid var(--amber);
    border-radius:4px;
    padding:10px 12px;
    margin-top:10px;
  }
  .exp-entry.verdict-didntBuy{ border-left-color:var(--curtain); }
  .exp-entry.verdict-allIn{ border-left-color:var(--pink); box-shadow:0 0 0 1px rgba(255,79,160,0.18), 0 0 14px rgba(255,79,160,0.22); }
  .exp-entry-head{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.5px;
  }
  .exp-entry-head .cap{ text-transform:uppercase; font-weight:700; }
  .exp-entry .blurb{ font-family:var(--font-body); font-size:14px; margin:6px 0 0; font-style:italic; }
  .exp-entry .meta{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:6px; }
  .exp-entry-actions{ margin-top:8px; display:flex; gap:8px; }

  /* ---------- library list ---------- */
  .lib-controls{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  #libList{ display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-bottom:6px; }
  .lib-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:12px 14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .lib-card:hover{ border-color:var(--amber-dim); }
  .lib-card .title{ font-family:var(--font-display); font-size:16px; letter-spacing:.3px; text-transform:uppercase; line-height:1.15; }
  .lib-card .credits{ font-family:var(--font-mono); font-size:11px; color:var(--chalk); margin-top:0; }
  /* margin-top:auto (not a fixed value) deliberately — #libList is a CSS
     grid, which already stretches every card in a row to match the tallest
     one by default, so each .lib-card (a flex column) has real leftover
     space to give away. Putting that leftover space here, on the LAST child,
     pins the icon row to the bottom of every card uniformly, regardless of
     how many lines the title/credits text above it wrapped to. */
  .cap-icons{ font-size:15px; letter-spacing:2px; white-space:nowrap; margin-top:auto; }

  /* ---------- library subsections: someday / scheduled / don't-care ---------- */
  .lib-section-divider{ height:1px; background:var(--panel-line); margin:24px 0 14px; }
  .lib-subsection{ margin-bottom:4px; }
  .lib-subsection-header{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--chalk-dim); padding:10px 4px; cursor:pointer; border-bottom:1px solid var(--panel-line);
  }
  .lib-subsection-header:hover{ color:var(--amber); }
  .lib-subsection-body{ padding:8px 4px 6px; }
  .lib-subitem{ font-family:var(--font-body); font-size:13px; padding:5px 0; color:var(--chalk); }
  .lib-subitem .sub-extra{ font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim); }
  .lib-subitem-clickable{ cursor:pointer; }
  .lib-subitem-clickable:hover{ color:var(--amber); }

  /* ---------- empty states ---------- */
  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--chalk-dim);
  }
  .empty .bulb{ font-size:40px; display:block; margin-bottom:10px; filter: drop-shadow(0 0 14px var(--bulb-glow)); }
  .empty p{ font-family:var(--font-mono); font-size:12px; letter-spacing:.5px; max-width:360px; margin:0 auto; }

  /* ---------- storage health banner ---------- */
  .storage-warning{
    background:var(--curtain);
    color:#fff;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.3px;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    text-align:center;
  }
  .storage-warning button{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:#fff;
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 9px;
    border-radius:3px;
    cursor:pointer;
  }

  /* ---------- due-scheduled banner (Review) ---------- */
  .due-banner{
    background:var(--paper); color:var(--ink);
    border:1px solid var(--amber-dim);
    border-radius:6px;
    padding:6px 14px;
    margin-bottom:18px;
  }
  .due-banner-row{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    flex-wrap:wrap;
    font-family:var(--font-body); font-size:13px;
    padding:8px 0;
    border-bottom:1px dashed var(--paper-line);
  }
  .due-banner-row:last-child{ border-bottom:none; }

  /* ---------- vibe check ---------- */
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:16px;
    margin-bottom:14px;
  }
  .stat-card h3{
    font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--amber); margin:0 0 10px;
  }
  .collab-row{ display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12px; padding:4px 0; border-bottom:1px solid var(--panel-line); }
  .collab-row:last-child{ border-bottom:none; }
  .collab-name-btn{ background:none; border:none; padding:0; margin:0; font:inherit; color:var(--chalk); text-decoration:underline; text-decoration-color:var(--panel-line); cursor:pointer; }
  .collab-name-btn:hover{ color:var(--amber); text-decoration-color:var(--amber); }
  .flag-row{ font-family:var(--font-body); font-size:13px; padding:6px 0; }
  .flag-row b{ color:var(--amber); }

  /* ---------- vibe check: collapsible card bodies (title+description always
     visible, the actual list tucked behind a tap, default collapsed) ---------- */
  .stat-card-header{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; margin-bottom:10px; }
  .stat-card-header h3{ margin:0; }
  .stat-card-toggle{ font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim); white-space:nowrap; }
  .stat-card-header:hover .stat-card-toggle{ color:var(--amber); }

  /* ---------- vibe check: free tab-switch between Quick check / Computer
     Friend (live) results, separate from the run buttons above them ---------- */
  .vibe-tab-row{ display:flex; gap:8px; margin-top:12px; }
  .vibe-tab-pill{
    background:none; border:1px solid var(--panel-line); border-radius:14px;
    color:var(--chalk-dim); font-family:var(--font-mono); font-size:11px;
    padding:5px 12px; cursor:pointer; letter-spacing:.5px;
  }
  .vibe-tab-pill:hover{ border-color:var(--amber-dim); color:var(--chalk); }
  .vibe-tab-pill.active{ border-color:var(--amber); color:var(--amber); }
  .vibe-result-header{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; margin-top:12px; }
  .vibe-result-collapse-btn{ font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim); background:none; border:none; cursor:pointer; padding:2px 0; }
  .vibe-result-header:hover .vibe-result-collapse-btn{ color:var(--amber); }

  .anchor-tag{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--panel); border:1px solid var(--panel-line);
    border-radius:14px; padding:5px 10px; margin:0 6px 6px 0;
    font-family:var(--font-mono); font-size:11px;
  }
  .anchor-tag button{ background:none; border:none; color:var(--chalk-dim); cursor:pointer; font-size:13px; padding:0;}

  .ai-box{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:16px;
  }
  .ai-response{
    background:var(--paper); color:var(--ink);
    border-radius:6px; padding:14px 16px; margin-top:14px;
    font-family:var(--font-body); font-size:14px; white-space:pre-wrap;
  }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.65);
    display:flex; align-items:flex-start; justify-content:center;
    overflow-y:auto; padding:30px 14px; z-index:50;
  }
  .modal{
    background:var(--paper); color:var(--ink);
    border-radius:8px; padding:22px;
    max-width:520px; width:100%;
    margin-top:10px;
  }

  textarea.json-area{ width:100%; height:140px; font-family:var(--font-mono); font-size:11px; }
</style>

const STORAGE_KEY = 'ledger-data';
const API_KEY_STORAGE = 'underscore-api-key';
let DATA = { overrides:{}, customShows:{}, anchors:[], vibeHistory:[] };
let dataLoaded = false;

/* ---- personal Anthropic API key: deliberately its own storage key, kept
   OUT of ledger-data, so it never gets swept into an EXPORT backup ---- */
function getApiKey(){
  try{ return (localStorage.getItem(API_KEY_STORAGE) || '').trim(); }
  catch(e){ return ''; }
}
function setApiKey(key){
  try{ localStorage.setItem(API_KEY_STORAGE, key.trim()); }
  catch(e){ alert('Could not save the key — this browser may be blocking local storage.'); }
}
function clearApiKey(){
  try{ localStorage.removeItem(API_KEY_STORAGE); }catch(e){}
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      DATA = JSON.parse(raw);
      DATA.overrides = DATA.overrides || {};
      DATA.customShows = DATA.customShows || {};
      DATA.anchors = DATA.anchors || [];
      DATA.vibeHistory = DATA.vibeHistory || [];
    }
  }catch(e){
    // no existing data yet, or storage is blocked — checkStorageHealth() catches that case
  }
  dataLoaded = true;
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  }catch(e){
    console.error('Storage save failed', e);
    showStorageWarning();
    alert('Could not save — this browser is blocking local storage (common in private/incognito windows, or very strict privacy settings). Use EXPORT now, then try a normal browser window.');
  }
}

function checkStorageHealth(){
  try{
    const probeKey = '__underscore_storage_probe__';
    localStorage.setItem(probeKey, String(Date.now()));
    const back = localStorage.getItem(probeKey);
    localStorage.removeItem(probeKey);
    if(!back) throw new Error('storage readback returned nothing');
  }catch(e){
    showStorageWarning();
  }
}
function showStorageWarning(){
  const el = document.getElementById('storageWarning');
  if(el) el.style.display = 'flex';
}
document.getElementById('storageWarningDismiss').onclick = ()=>{
  document.getElementById('storageWarning').style.display = 'none';
};

function allShows(){
  return Object.assign({}, SEED_SHOWS, DATA.customShows);
}
function getShow(id){ return allShows()[id]; }
function getState(id){
  return DATA.overrides[id] || {status:null, experiences:[]};
}
function ensureOverride(id){
  if(!DATA.overrides[id]) DATA.overrides[id] = {status:null, experiences:[]};
  return DATA.overrides[id];
}
function setStatus(id, status){
  const o = ensureOverride(id);
  o.status = status;
  if(status !== 'scheduled') o.scheduledDate = null;
  if(status !== 'dontcare') o.dontcareReason = null;
  saveData();
}
function setScheduled(id, dateStr){
  const o = ensureOverride(id);
  o.status = 'scheduled';
  o.scheduledDate = dateStr;
  o.dontcareReason = null;
  saveData();
}
function setDontcare(id, reason){
  const o = ensureOverride(id);
  o.status = 'dontcare';
  o.dontcareReason = (reason||'').trim();
  o.scheduledDate = null;
  saveData();
}
function addExperience(id, exp){
  const o = ensureOverride(id);
  exp.id = 'e' + Date.now() + Math.floor(Math.random()*1000);
  o.experiences.push(exp);
  // someday / dontcare / noopinion all mean "haven't experienced this yet" —
  // once you've logged anything, that's no longer true, so these three
  // always clear. 'scheduled' is different on purpose: it's an upcoming,
  // unrelated date that can coexist with experiences already logged in
  // OTHER capacities (e.g. you've got the OBC and a pro-shot logged for a
  // show, but you're also seeing it live for the first time next month) — so
  // a still-future date survives logging something else in the meantime. It
  // only clears here once its date has actually arrived, on the assumption
  // that whatever you just logged fulfilled it — the same assumption the
  // due-banner's "log it now" button already depends on to make its prompt
  // go away once you act on it.
  const todayStr = new Date().toISOString().slice(0,10);
  if(o.status==='someday' || o.status==='dontcare' || o.status==='noopinion'){
    o.status = null;
  } else if(o.status==='scheduled' && (!o.scheduledDate || o.scheduledDate <= todayStr)){
    o.status = null;
    o.scheduledDate = null;
  }
  saveData();
}
function updateExperience(id, expId, patch){
  const o = ensureOverride(id);
  const e = o.experiences.find(x=>x.id===expId);
  if(e) Object.assign(e, patch);
  saveData();
}
function deleteExperience(id, expId){
  const o = ensureOverride(id);
  o.experiences = o.experiences.filter(x=>x.id!==expId);
  saveData();
}
function addCustomShow({title, team, year, tags}){
  const id = 'custom-' + slugify(title) + '-' + Date.now();
  DATA.customShows[id] = {id, title, year: year||null, team: team||[], tags: tags||[], custom:true};
  saveData();
  return id;
}

// Custom shows (including ai-suggested ones) get a real edit path now —
// previously the only fields you could ever set were whatever you typed
// into the add-show modal at the moment of creation, with no way back in.
// That's exactly the gap BBAJ exposed: it was added title-only, accidentally,
// during the pre-25n add-modal bug, and there was nowhere to go fill in its
// real year/team/tags afterward. Seed shows never reach this — they stay
// locked/append-only as always.
function updateCustomShow(id, {title, year, team, tags}){
  const show = DATA.customShows[id];
  if(!show) return false;
  if(title !== undefined) show.title = title;
  show.year = year || null;
  show.team = team || [];
  show.tags = tags || [];
  saveData();
  return true;
}

// Shared by Library's detail-popup delete button AND Review's new inline delete
// button — previously each had its own separate copy of this confirm/delete
// logic. Pulled into one function so the warning text and behavior can't drift
// between the two entry points the way other things in this app have before.
// Returns true if the show was actually deleted, false if cancelled or not a
// custom show (seed shows are permanent and never reach this function from the UI).
function deleteCustomShow(showId){
  const show = getShow(showId);
  if(!show || !show.custom) return false;
  const state = getState(showId);
  const hasLogged = state.experiences.length>0;
  const warning = hasLogged
    ? `Delete "${show.title}" entirely? This also removes the ${state.experiences.length} experience${state.experiences.length===1?'':'s'} logged against it. Can't be undone (export a backup first if unsure).`
    : `Delete "${show.title}"? Can't be undone.`;
  if(!confirm(warning)) return false;
  delete DATA.customShows[showId];
  delete DATA.overrides[showId];
  saveData();
  return true;
}

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildReviewQueue(){
  const shows = allShows();
  const undecided = Object.values(shows).filter(s=>{
    const st = getState(s.id);
    return st.status===null && st.experiences.length===0;
  });
  shuffleArray(undecided);
  reviewQueue = undecided;
}

function nextReviewId(){
  return reviewQueue.length>0 ? reviewQueue[0].id : null;
}

function getDueScheduledShows(){
  const todayStr = new Date().toISOString().slice(0,10);
  return Object.values(allShows())
    .filter(s=>{
      const st = getState(s.id);
      return st.status==='scheduled' && st.scheduledDate && st.scheduledDate <= todayStr;
    })
    .sort((a,b)=> getState(a.id).scheduledDate.localeCompare(getState(b.id).scheduledDate));
}

function dueScheduledBannerHtml(dueShows){
  if(!dueShows.length) return '';
  return `
    <div class="due-banner">
      ${dueShows.map(s=>{
        const st = getState(s.id);
        return `<div class="due-banner-row">
          <span>📅 <b>${escapeHtml(s.title)}</b> was on your calendar for ${escapeHtml(st.scheduledDate)} — how'd it go?</span>
          <button class="btn small amber" data-due-log="${s.id}">log it now</button>
        </div>`;
      }).join('')}
    </div>
  `;
}

function wireDueBanner(el){
  el.querySelectorAll('[data-due-log]').forEach(btn=>{
    btn.onclick = ()=>{
      forcedReviewId = btn.dataset.dueLog;
      loggingMode = true;
      schedulingMode = false;
      dontcareMode = false;
      renderReview();
    };
  });
}

function renderReview(){
  buildReviewQueue();
  const el = document.getElementById('tab-review');
  // Don't list a show in its own due-banner row while it's already the one being logged below.
  const dueShows = getDueScheduledShows().filter(s=> !(forcedReviewId===s.id && loggingMode));
  const bannerHtml = dueScheduledBannerHtml(dueShows);

  if(forcedReviewId){
    currentReviewId = forcedReviewId;
  } else if(!currentReviewId || !reviewQueue.find(s=>s.id===currentReviewId)){
    currentReviewId = nextReviewId();
  }

  if(!currentReviewId){
    el.innerHTML = bannerHtml + `
      <h2 class="section-title">Review</h2>
      <div class="empty">
        <span class="bulb">💡</span>
        <p>The ghost light's the only thing on. You've made a call on everything currently in the deck — all seed titles, plus anything you've added.</p>
      </div>
      <div class="btnrow" style="justify-content:center;">
        <button class="btn ghost-dark" id="addCustomFromEmpty">+ add a specific show</button>
        <button class="btn amber" id="findMoreFromEmpty">ask Claude for more shows</button>
      </div>
      <div id="findMoreStatus" style="text-align:center;margin-top:10px;"></div>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);text-align:center;margin-top:8px;">"Ask Claude for more shows" makes a live API call using your personal key (see the API KEY button below) — typically a few cents, and it double-checks facts with a web search before answering. No key set up yet? The button will walk you through it.</p>
    `;
    document.getElementById('addCustomFromEmpty').onclick = ()=> openAddCustomModal(goToShowInReview);
    document.getElementById('findMoreFromEmpty').onclick = ()=> findMoreShowsViaAPI();
    wireDueBanner(el);
    return;
  }
  const show = getShow(currentReviewId);
  el.innerHTML = bannerHtml + `
    <h2 class="section-title">Turn on the ghost light</h2>
    <p class="section-sub">${reviewQueue.length} show${reviewQueue.length===1?'':'s'} left in this pass · go one at a time, no pressure</p>
    <div id="reviewCard"></div>
    <div class="btnrow" style="margin-top:14px;">
      <button class="btn ghost-dark small" id="addCustomFromReview">+ add a show that's not on this list</button>
      ${show.custom ? `<button class="btn danger small" id="deleteCustomFromReview">delete this custom show</button>` : ''}
    </div>
  `;
  renderReviewCard(show);
  document.getElementById('addCustomFromReview').onclick = ()=> openAddCustomModal(goToShowInReview);
  const deleteCustomBtn = document.getElementById('deleteCustomFromReview');
  if(deleteCustomBtn) deleteCustomBtn.onclick = ()=>{
    if(deleteCustomShow(show.id)) advanceReview();
  };
  wireDueBanner(el);
}

function renderReviewCard(show){

  card.innerHTML = `
    <div class="ticket">
      <div class="show-title">${escapeHtml(show.title)}</div>
      <div class="credits">${show.year?show.year+' · ':''}${show.team.map(escapeHtml).join(', ')||'creative team unknown'}</div>

function renderReviewBody(show){
  const body = document.getElementById('reviewBody');
  if(schedulingMode){
    const todayStr = new Date().toISOString().slice(0,10);
    body.innerHTML = `
      <div class="field">
        <label>What date is it on the calendar for?</label>
        <input type="date" id="scheduledDateInput" value="${todayStr}">
      </div>
      <div class="btnrow">
        <button class="btn amber" id="confirmScheduled">Confirm</button>

      </div>

    document.getElementById('confirmScheduled').onclick = ()=>{
      const val = document.getElementById('scheduledDateInput').value;

      setScheduled(show.id, val);
      schedulingMode = false;
      advanceReview();
    };
    document.getElementById('cancelScheduled').onclick = ()=>{
      schedulingMode = false;
      renderReviewBody(show);
    };
    return;
  }
  if(dontcareMode){
    body.innerHTML = `
      <div class="field">
        <label>Why, if you feel like saying? (optional, one line)</label>
        <input type="text" id="dontcareReasonInput" placeholder="e.g. can't get past the premise, not a fan of this composer...">
      </div>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin-top:-4px;">This only ever goes to the live "Ask Computer Friend" feature, if you use it — it never touches your collaborator stats or the local quick-check math, same way an un-experienced show never should.</p>
      <div class="btnrow">
        <button class="btn amber" id="confirmDontcare">Confirm don't-care</button>
        <button class="btn small" id="cancelDontcare">Cancel</button>
      </div>
    `;
    document.getElementById('confirmDontcare').onclick = ()=>{
      const reason = document.getElementById('dontcareReasonInput').value.trim();
      setDontcare(show.id, reason);
      dontcareMode = false;
      advanceReview();
    };
    document.getElementById('cancelDontcare').onclick = ()=>{
      dontcareMode = false;
      renderReviewBody(show);
    };
    return;
  }
  if(!loggingMode){
    body.innerHTML = `
      <div class="btnrow">
        <button class="btn amber" id="rvExperienced">I've experienced this</button>
        <button class="btn" id="rvScheduled">It's on the calendar</button>
        <button class="btn" id="rvSomeday">Someday</button>
        <button class="btn" id="rvDontcare">Don't care, will never care</button>
        <button class="btn" id="rvSkip">No opinion, skip</button>
      </div>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin-top:8px;">"On the calendar" is for a real, dated commitment (season tickets, a ticket already bought) — it'll come back as its own prompt on that date. "Someday" stays open-ended, no date attached. "No opinion, skip" removes a show from this rotation for good — there's no undo yet, so only use it for ones you're confident you have nothing to go on.</p>
    `;
    document.getElementById('rvExperienced').onclick = ()=>{ loggingMode=true; renderReviewBody(show); };
    document.getElementById('rvScheduled').onclick = ()=>{ schedulingMode=true; renderReviewBody(show); };
    document.getElementById('rvSomeday').onclick = ()=>{ setStatus(show.id,'someday'); advanceReview(); };
    document.getElementById('rvDontcare').onclick = ()=>{ dontcareMode=true; renderReviewBody(show); };
    document.getElementById('rvSkip').onclick = ()=>{ setStatus(show.id,'noopinion'); advanceReview(); };
  } else {
    body.innerHTML = experienceFormHtml(show.id, true);
    wireExperienceForm(show.id, true, ()=>{
      loggingMode=false;
      renderLoggedExperiences(show);
    }, null, body);

  }
}

function renderLoggedExperiences(show){
  const state = getState(show.id);
  let container = document.getElementById('loggedExpList');
  if(!container){
    const body = document.getElementById('reviewBody');
    body.insertAdjacentHTML('beforeend', `<div id="loggedExpList" style="margin-top:14px;"></div>`);
    container = document.getElementById('loggedExpList');
  }
  if(state.experiences.length===0){ container.innerHTML=''; return; }
  container.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:#7a756d;margin-bottom:6px;">LOGGED SO FAR</div>` +
    expListOrEditHtml(show.id, state.experiences) +
    `<div class="btnrow" style="margin-top:10px;">
       <button class="btn small" id="addAnotherExp">+ log another experience</button>
       <button class="btn primary small" id="doneWithShow">done with this show</button>
     </div>`;
  document.getElementById('addAnotherExp').onclick = ()=>{ editingExpId=null; loggingMode=true; renderReviewBody(show); };
  document.getElementById('doneWithShow').onclick = ()=>{ currentReviewId=null; loggingMode=false; editingExpId=null; forcedReviewId=null; renderReview(); };
  wireExpListOrEdit(container, show.id, state.experiences, ()=> renderLoggedExperiences(show));
}

function advanceReview(){
  currentReviewId = null;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  forcedReviewId = null;
  renderReview();
}

// Used after manually adding a custom show: forces that specific show onto the
// Review card (reusing the same forcedReviewId mechanism the due-banner's "log it
// now" button uses) so the person actually SEES what they just added, with its
// normal someday/scheduled/dontcare/log button row — rather than silently landing
// back in the shuffled queue, which could easily look identical to "nothing happened."
function goToShowInReview(id){
  forcedReviewId = id;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  renderReview();
}

// Same idea as goToShowFromVibe() below, but drops straight into the
// experience-logging form instead of the normal someday/scheduled/dontcare/
// log button row — for a rec's "Log it" button, where tapping it already
// means "I've experienced this," not "remind me later." Can't just flip
// loggingMode and reuse the nav button's own click handler the way
// goToShowFromVibe() does: that handler only calls renderReview() when
// loggingMode is false (so switching tabs mid-form elsewhere doesn't get
// silently clobbered), so this does the tab-switch bookkeeping itself.
function goToShowFromVibeToLog(id){
  forcedReviewId = id;
  loggingMode = true;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const reviewNavBtn = document.querySelector("nav button[data-tab='review']");
  if(reviewNavBtn) reviewNavBtn.classList.add('active');
  const reviewTabEl = document.getElementById('tab-review');
  if(reviewTabEl) reviewTabEl.classList.add('active');
  renderReview();
}

// Same idea as goToShowInReview() above, but callable from Vibe Check, which
// isn't the active tab yet — clicking a rec title there needs to actually
// switch tabs first. Reuses the real nav button's own click handler (which
// already does the active-class swap + renderReview()) instead of copying
// that logic a second time.
function goToShowFromVibe(id){
  forcedReviewId = id;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  const reviewNavBtn = document.querySelector("nav button[data-tab='review']");
  if(reviewNavBtn) reviewNavBtn.click();
  else renderReview();
}

function wireExperienceForm(showId, isNew, onDone, prefill, containerEl){
  const wrapper = (containerEl||document).querySelector(`[data-form]`);
  if(!wrapper) return;
  const formId = wrapper.dataset.form;
  const subEl = document.getElementById('subfields-'+formId);
  let selectedCap = prefill ? prefill.capacity : null;
  let selectedVenues = (prefill && prefill.venueTypes) ? new Set(prefill.venueTypes) : new Set();
  let selectedRating = (prefill && prefill.rating!=null) ? prefill.rating : null;
  let selectedVerdict = (prefill && prefill.verdict) ? prefill.verdict : null;

  wrapper.querySelectorAll('.cap-chip').forEach(chip=>{
    chip.onclick = ()=>{
      wrapper.querySelectorAll('.cap-chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on');
      selectedCap = chip.dataset.cap;
      selectedVenues = new Set();
      selectedRating = null;
      selectedVerdict = null;
      subEl.innerHTML = subfieldsHtml(formId, selectedCap);
      wireSubfields();
    };
  });

  function wireSubfields(){
    subEl.querySelectorAll('.venue-chip').forEach(vc=>{
      vc.onclick = ()=>{
        vc.classList.toggle('on');
        if(vc.classList.contains('on')) selectedVenues.add(vc.dataset.venue);
        else selectedVenues.delete(vc.dataset.venue);
      };
    });
    subEl.querySelectorAll('.f-rate, .f-rate-none').forEach(rb=>{
      rb.onclick = ()=>{
        subEl.querySelectorAll('.f-rate, .f-rate-none').forEach(x=>x.classList.remove('on'));
        rb.classList.add('on');
        selectedRating = rb.dataset.r ? Number(rb.dataset.r) : null;
        const hint = document.getElementById('ratehint-'+formId);
        if(hint) hint.textContent = selectedRating ? RATING_LABELS[selectedRating] : '';
      };
    });
    subEl.querySelectorAll('.verdict-chip').forEach(vc=>{
      vc.onclick = ()=>{
        subEl.querySelectorAll('.verdict-chip').forEach(x=>x.classList.remove('on'));
        vc.classList.add('on');
        selectedVerdict = vc.dataset.v;
      };
    });
    const saveBtn = subEl.querySelector('.f-save');
    const cancelBtn = subEl.querySelector('.f-cancel');
    if(saveBtn) saveBtn.onclick = ()=>{
      if(!selectedCap){ alert('Pick a capacity first — how did you experience this one?'); return; }
      const sublabelEl = subEl.querySelector('.f-sublabel');
      const performedEl = subEl.querySelector('.f-performed');
      const exp = {
        capacity: selectedCap,
        subLabel: sublabelEl ? sublabelEl.value.trim() : '',
        performedIn: performedEl ? performedEl.checked : false,
        venueTypes: Array.from(selectedVenues),
        location: subEl.querySelector('.f-location').value.trim(),
        dateNote: subEl.querySelector('.f-datenote').value.trim(),
        rating: selectedRating,
        verdict: selectedVerdict,
        blurb: subEl.querySelector('.f-blurb').value.trim(),
        moment: subEl.querySelector('.f-moment').value.trim(),
      };
      if(prefill && prefill.id){
        updateExperience(showId, prefill.id, exp);
      } else {
        addExperience(showId, exp);
      }
      onDone();
    };
    if(cancelBtn) cancelBtn.onclick = ()=> onDone();
  }
  // For an edit, subfields are already rendered inline (experienceFormHtml
  // inlines subfieldsHtml() when given a prefill) — wire them immediately
  // rather than waiting for a capacity-chip click, which only happens for
  // a brand-new entry that starts with no capacity picked yet.
  if(prefill) wireSubfields();
}

function expEntryHtml(showId, e){
  const cap = CAPACITIES.find(c=>c.key===e.capacity);
  const verdict = VERDICTS.find(v=>v.key===e.verdict);
  const verdictClass = e.verdict==='didntBuy' ? 'verdict-didntBuy' : (e.verdict==='allIn' ? 'verdict-allIn' : '');
  const bits = [];
  if(e.subLabel) bits.push(escapeHtml(e.subLabel));
  if(e.venueTypes && e.venueTypes.length) bits.push(e.venueTypes.map(escapeHtml).join('/'));
  if(e.location) bits.push(escapeHtml(e.location));
  if(e.dateNote) bits.push(escapeHtml(e.dateNote));
  return `
    <div class="exp-entry ${verdictClass}">
      <div class="exp-entry-head">
        <span class="cap">${cap?cap.icon+' '+cap.label:e.capacity}</span>
        <span>${e.rating?RATING_LABELS[e.rating]+' ('+e.rating+'/5)':'no rating'} ${verdict? '· '+verdict.label:''}</span>
      </div>
      ${bits.length?`<div class="meta">${bits.join(' · ')}</div>`:''}
      ${e.performedIn?`<div class="meta">🎭 performed in this one</div>`:''}
      ${e.blurb?`<div class="blurb">"${escapeHtml(e.blurb)}"</div>`:''}
      ${e.moment?`<div class="meta">★ ${escapeHtml(e.moment)}</div>`:''}
      <div class="exp-entry-actions">
        <button class="btn small ghost-dark" data-edit="${showId}|${e.id}">edit</button>
        <button class="btn small danger" data-del="${showId}|${e.id}">remove</button>
      </div>
    </div>
  `;
}

// Shared by Review's "LOGGED SO FAR" list and Library's detail popup: renders
// every experience as its normal static entry, EXCEPT the one (if any)
// currently being edited in place (editingExpId), which renders the same
// experience form used for logging a new one — just pre-filled, saving via
// updateExperience() instead of addExperience() on submit. Closes the old
// delete-and-re-add-only gap.
function expListOrEditHtml(showId, experiences){
  return experiences.map(e=>{
    if(editingExpId === e.id){
      return `<div class="exp-edit-wrap" data-edit-wrap="${showId}|${e.id}">${experienceFormHtml(showId, false, e)}</div>`;
    }
    return expEntryHtml(showId, e);
  }).join('');
}

// Wires whatever expListOrEditHtml() just rendered into `container`: the
// edit form (if one of the experiences is currently being edited) and the
// "edit" buttons on every other entry. refreshFn re-renders this same list
// in place after save/cancel/entering edit mode.
function wireExpListOrEdit(container, showId, experiences, refreshFn){
  const editWrap = container.querySelector('[data-edit-wrap]');
  if(editWrap){
    const editingId = editWrap.dataset.editWrap.split('|')[1];
    const exp = experiences.find(x=>x.id===editingId);
    if(exp){
      wireExperienceForm(showId, false, ()=>{ editingExpId=null; refreshFn(); }, exp, container);
    }
  }
  container.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=>{
      const [, expId] = btn.dataset.edit.split('|');
      editingExpId = expId;
      refreshFn();
    };
  });
}

document.addEventListener('click', (ev)=>{
  const delBtn = ev.target.closest('[data-del]');
  if(delBtn){
    const [showId, expId] = delBtn.dataset.del.split('|');
    if(confirm('Remove this logged experience?')){
      if(editingExpId === expId) editingExpId = null; // can't be mid-edit on something that no longer exists
      deleteExperience(showId, expId);
      // If a Library detail popup for this show is open, it has its own copy of the
      // experience list and won't update just because the page behind it re-renders.
      const modalBack = delBtn.closest('.modal-backdrop');
      if(modalBack) refreshLibDetailExp(modalBack, showId);
      if(document.getElementById('tab-library').classList.contains('active')) renderLibrary();
      if(document.getElementById('tab-review').classList.contains('active')) renderReview();
    }
  }
});

/*
  Shared low-level call used by both live features. Talks to
  api.anthropic.com directly from the browser using the saved personal
  key. The 'anthropic-dangerous-direct-browser-access' header is required
  on every request — it's Anthropic's documented way of saying "yes, a
  browser calling this with its own key is intentional," not a sign
  anything here is actually dangerous. Skipping it makes every call fail.
*/
async function callClaudeAPI({system, userText, useWebSearch}){
  const key = getApiKey();
  if(!key){ openApiKeyModal(); throw new Error('no-key'); }
  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 1000,
    system: system,
    messages: [{ role:'user', content:userText }]
  };
  if(useWebSearch){
    body.tools = [{ type:'web_search_20250305', name:'web_search' }];
  }
  let res;
  try{
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers: {
        'content-type':'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });
  }catch(networkErr){
    throw new Error("Could not reach Anthropic's servers — check your connection and try again.");
  }
  if(!res.ok){
    let detail = '';
    try{ const errJson = await res.json(); detail = (errJson && errJson.error && errJson.error.message) || ''; }catch(e){}
    if(res.status===401) throw new Error('That key was rejected (401) — double-check it was pasted in full, or generate a fresh one at platform.claude.com/settings/keys.');
    if(res.status===429) throw new Error("Rate-limited (429) — Anthropic says to slow down a bit. Try again in a moment.");
    throw new Error('API error ' + res.status + (detail ? ': ' + detail : '') + '.');
  }
  const data = await res.json();
  const text = (data.content || [])
    .filter(block => block.type === 'text')
    .map(block => block.text)
    .join('\n')
    .trim();
  return text;
}

async function findMoreShowsViaAPI(){
  const btn = document.getElementById('findMoreFromEmpty');
  const status = document.getElementById('findMoreStatus');
  if(!getApiKey()){ openApiKeyModal(); return; }
  const existingTitles = Object.values(allShows()).map(s=>s.title);
  if(btn){ btn.disabled = true; btn.textContent = 'asking Claude... (web search makes this take ~15–30s)'; }
  if(status) status.innerHTML = '';
  const system = `You are a theater-history-literate research assistant for a personal musical-theater tracking app.
Your only job: suggest NEW musicals that are NOT already in the user's list below.
Rules:
- Musicals only. Never straight plays.
- Never repeat a title already in the provided list (case-insensitive, ignore minor punctuation differences).
- Favor structurally or historically significant titles over obscure one-off regional shows, but mix eras.
- Use the web search tool to double-check year and creative-team credits before finalizing, especially for jukebox musicals, recent shows, or anything you're not fully sure of.
- Your FINAL reply must be ONLY a JSON array — no preamble, no markdown code fences, no explanation before or after. Exactly this shape:
[["Title", year_as_number_or_null, ["Composer","Lyricist","Book writer"], ["tag1","tag2"]], ...]
Suggest exactly 8 shows.`;
  const userText = `Here is the user's existing list of ${existingTitles.length} titles:\n${existingTitles.join('\n')}\n\nGive me 8 new musicals not on this list, as the JSON array described in your instructions.`;
  try{
    const raw = await callClaudeAPI({system, userText, useWebSearch:true});
    const cleaned = raw.replace(/```json|```/g,'').trim();
    let parsed;
    try{
      parsed = JSON.parse(cleaned);
    }catch(parseErr){
      if(status) status.innerHTML = `<div class="ai-response" style="text-align:left;">Claude answered, but it didn't come back as clean JSON — here's the raw reply so nothing's lost:<br><br>${escapeHtml(raw)}</div>`;
      return;
    }
    if(!Array.isArray(parsed)){
      if(status) status.innerHTML = `<div class="ai-response" style="text-align:left;">Claude answered, but not in the expected list format. Raw reply:<br><br>${escapeHtml(raw)}</div>`;
      return;
    }
    const seedSlugs = new Set(Object.keys(SEED_SHOWS));
    let added = 0, skipped = 0;
    parsed.forEach(entry=>{
      if(!Array.isArray(entry) || !entry[0]) return;
      const [title, year, team, tags] = entry;
      const slug = slugify(String(title));
      const isDupSeed = seedSlugs.has(slug);
      const isDupCustom = Object.values(DATA.customShows).some(cs=>slugify(cs.title)===slug);
      if(isDupSeed || isDupCustom){ skipped++; return; }
      const id = 'ai-' + slug + '-' + Date.now() + Math.floor(Math.random()*1000);
      DATA.customShows[id] = {
        id, title: String(title),
        year: (typeof year==='number') ? year : (year ? (Number(year)||null) : null),
        team: Array.isArray(team) ? team : [],
        tags: [...(Array.isArray(tags) ? tags : []), 'ai-suggested'],
        custom: true
      };
      added++;
    });
    saveData();
    currentReviewId = null;
    alert(`Added ${added} new show${added===1?'':'s'} to your deck${skipped?` (skipped ${skipped} already on your list)`:''}. They're tagged "ai-suggested" and deletable from the Library if one turns out wrong — same as any custom show.`);
    renderReview();
  }catch(err){
    if(err.message !== 'no-key' && status) status.innerHTML = `<div class="ai-response" style="text-align:left;">Something went wrong: ${escapeHtml(err.message)}</div>`;
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'ask Claude for more shows'; }
  }
}

let libFilter = { text:'', cap:null };
// custompending defaults OPEN (the other three stay closed) — unlike
// someday/scheduled/dontcare, this bucket only ever holds accidental junk
// (a duplicate add, an in-progress custom show abandoned mid-fill), and
// there's never a reason to want it hidden by default. This is what was
// actually missing for the BBAJ duplicates: the fix that routes them here
// worked, the section was just collapsed by default the same as the other
// three, making "nothing's here" and "something's here but hidden" look
// identical at a glance.
let libSectionOpen = { custompending:true, someday:false, scheduled:false, dontcare:false };

function renderLibrary(){
  const el = document.getElementById('tab-library');
  // BUG FIX (2026-06-27): this used to always render the search box blank and
  // every capacity chip unselected, no matter what libFilter actually held —
  // since libFilter is a module-level variable that's never reset on its own,
  // revisiting the tab (even just switching nav tabs and back) looked like a
  // clean slate while a stale text/cap filter silently kept suppressing
  // results underneath. Now the controls are drawn FROM libFilter, so a
  // leftover filter is always visible, and there's an explicit way to clear
  // it without needing to fully reload the app.
  const filtersActive = !!(libFilter.text || libFilter.cap);
  el.innerHTML = `
    <h2 class="section-title">Library</h2>
    <p class="section-sub">everything you've made a call on, plus search to add anything new</p>
    <div class="lib-controls">
      <input type="text" id="libSearch" placeholder="search title..." value="${escapeHtml(libFilter.text)}" style="flex:1;min-width:160px;font-family:var(--font-body);padding:8px 10px;border-radius:4px;border:1px solid var(--panel-line);background:var(--panel);color:var(--chalk);">
      ${filtersActive ? '<button class="btn ghost-dark small" id="libClearFilters">✕ clear filters</button>' : ''}
      <button class="btn ghost-dark small" id="libAddCustom">+ add a show</button>
    </div>
    <div class="lib-controls">
      ${CAPACITIES.map(c=>`<span class="chip lib-cap-filter${libFilter.cap===c.key?' on':''}" data-cap="${c.key}">${c.icon} ${c.label}</span>`).join('')}
    </div>
    <div id="libList"></div>

    <div class="lib-section-divider"></div>
    <div id="libSidelists"></div>
  `;
  document.getElementById('libSearch').oninput = (e)=>{ libFilter.text = e.target.value.toLowerCase(); renderLibList(); renderLibSidelists(); };
  document.getElementById('libAddCustom').onclick = ()=> openAddCustomModal((newId)=> openLibDetail(newId));
  const clearBtn = document.getElementById('libClearFilters');
  if(clearBtn) clearBtn.onclick = ()=>{ libFilter = {text:'', cap:null}; renderLibrary(); };
  document.querySelectorAll('.lib-cap-filter').forEach(chip=>{
    chip.onclick = ()=>{
      const c = chip.dataset.cap;
      libFilter.cap = (libFilter.cap===c) ? null : c;
      document.querySelectorAll('.lib-cap-filter').forEach(x=>x.classList.remove('on'));
      if(libFilter.cap) chip.classList.add('on');
      renderLibList();
    };
  });
  renderLibList();
  renderLibSidelists();
}

function renderLibList(){
  const listEl = document.getElementById('libList');
  const shows = Object.values(allShows());
  // This list is now exclusively shows with at least one logged experience.
  // Someday / scheduled / don't-care live in their own sections below, not interleaved here.
  const filtered = shows.filter(s=>{
    const st = getState(s.id);
    if(st.experiences.length===0) return false;
    if(libFilter.text && !s.title.toLowerCase().includes(libFilter.text)) return false;
    if(libFilter.cap && !st.experiences.some(e=>e.capacity===libFilter.cap)) return false;
    return true;
  });
  filtered.sort((a,b)=>a.title.localeCompare(b.title));
  if(filtered.length===0){
    listEl.innerHTML = `<div class="empty"><span class="bulb">🎫</span><p>Nothing here yet. Log something in Review, or add a show directly.</p></div>`;
    return;
  }
  listEl.innerHTML = filtered.map(s=>{
    const st = getState(s.id);
    const caps = [...new Set(st.experiences.map(e=>e.capacity))];
    const capIcons = caps.map(c=> (CAPACITIES.find(x=>x.key===c)||{}).icon || '').join(' ') + (st.experiences.some(e=>e.performedIn) ? ' 🎭' : '');
    return `
      <div class="lib-card" data-show="${s.id}">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="credits">${s.year?s.year+' · ':''}${s.team.map(escapeHtml).join(', ')}</div>
        <div class="cap-icons">${capIcons}</div>
      </div>
    `;
  }).join('');
  listEl.querySelectorAll('.lib-card').forEach(card=>{
    card.onclick = ()=> openLibDetail(card.dataset.show);
  });
}

/* Someday / scheduled / don't-care: each its own collapsible section, with its
   own visible count, so they don't get buried inside the (potentially much
   longer) list of actually-logged shows as that list grows.
   2026-06-27: added a fourth section, "pending custom shows" — custom shows
   with neither a status NOR a logged experience. This is the bucket a
   duplicate accidental add (e.g. the BBAJ add-modal bug, fixed in 25n) falls
   into: invisible to the main grid (no experience), invisible to the other
   three sections (no status), reachable before this fix only by randomly
   cycling Review's shuffled queue until it happened to come up. Its items
   are clickable, same reason as "scheduled" below — the only way out of
   this bucket is opening the show to delete it.
   2026-06-27, later same day: "scheduled" is now clickable too — closes the
   gap where a seed show flagged "on the calendar" via Review with nothing
   logged against it yet had no edit/cancel path anywhere once its date
   passed (the due-banner just nagged forever). Opens the same detail popup
   and calendar control every other reachable show already has; someday and
   don't-care deliberately stay non-clickable for now, scoped decision. */
function renderLibSidelists(){
  const host = document.getElementById('libSidelists');
  if(!host) return;
  const shows = Object.values(allShows());
  const textFilter = libFilter.text;
  const matchesText = s => !textFilter || s.title.toLowerCase().includes(textFilter);

  const pendingCustomShows = shows.filter(s=> s.custom && getState(s.id).status===null && getState(s.id).experiences.length===0 && matchesText(s))
    .sort((a,b)=>a.title.localeCompare(b.title));
  const somedayShows = shows.filter(s=> getState(s.id).status==='someday' && matchesText(s))
    .sort((a,b)=>a.title.localeCompare(b.title));
  const scheduledShows = shows.filter(s=> getState(s.id).status==='scheduled' && matchesText(s))
    .sort((a,b)=> (getState(a.id).scheduledDate||'').localeCompare(getState(b.id).scheduledDate||''));
  const dontcareShows = shows.filter(s=> getState(s.id).status==='dontcare' && matchesText(s))
    .sort((a,b)=>a.title.localeCompare(b.title));

  host.innerHTML =
    (pendingCustomShows.length ? `<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin:8px 0 2px;">Custom shows with no status and nothing logged yet — usually an accidental duplicate add. Tap one to open and delete it.</p>` : '') +
    libSectionHtml('custompending', 'pending custom shows', pendingCustomShows, ()=>'', true) +
    libSectionHtml('scheduled', 'scheduled', scheduledShows, s=>{
      const st = getState(s.id);
      return st.scheduledDate ? `<span class="sub-extra"> · on the calendar for ${escapeHtml(st.scheduledDate)}</span>` : '';
    }, true) +
    libSectionHtml('someday', 'someday', somedayShows, ()=>'') +
    libSectionHtml('dontcare', "don't care", dontcareShows, s=>{
      const st = getState(s.id);
      return st.dontcareReason ? `<span class="sub-extra"> · "${escapeHtml(st.dontcareReason)}"</span>` : '';
    });

  ['custompending','scheduled','someday','dontcare'].forEach(key=>{
    const header = document.getElementById('libSecHeader-'+key);
    if(header) header.onclick = ()=>{ libSectionOpen[key] = !libSectionOpen[key]; renderLibSidelists(); };
  });
  host.querySelectorAll('.lib-subitem-clickable').forEach(item=>{
    item.onclick = ()=> openLibDetail(item.dataset.show);
  });
}

function libSectionHtml(key, label, list, extraFn, clickable){

  return `

          : `<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);">none</p>`

// "On the calendar" control for Library's detail popup — the gap Cameron
// hit directly: once a show has any logged experience, Review's own
// someday/scheduled/dontcare/skip button row is permanently out of reach for

// there was previously no way at all to flag a real future date against a
// show you'd already partly experienced (OBC + pro-shot logged, but seeing
// it live for the first time next month). Deliberately scoped to JUST "on
// the calendar," not "someday" too — a literal future date is an
// independent fact that can coexist with experiences already logged in
// other capacities; "someday" stays what it's always meant, a flag
// exclusively for shows you haven't started anything with yet (addExperience()
// still clears it unconditionally the moment any experience is logged).
function ldCalendarHtml(showId){
  const st = getState(showId);
  if(st.status === 'scheduled'){
    return `<div class="ld-calendar-row" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--font-mono);font-size:12px;">
      <span>📅 <b>On the calendar for ${escapeHtml(st.scheduledDate||'')}</b></span>

      <button class="btn small" id="ld-cal-clear">remove</button>

  return `<div class="ld-calendar-row">
    <button class="btn ghost-dark small" id="ld-cal-set">+ it's on the calendar</button>

// Re-renders just #ld-calendar in place and re-wires it — same in-place-
// refresh pattern openEditCustomShowModal's onSaved callback already uses
// for #ld-credits/#ld-tags, so setting/changing/removing a date never closes
// or reloads the whole popup around it.
function wireLdCalendar(back, showId){
  const host = back.querySelector('#ld-calendar');
  if(!host) return;
  const refresh = ()=>{ host.innerHTML = ldCalendarHtml(showId); wireLdCalendar(back, showId); };
  const setBtn = host.querySelector('#ld-cal-set');
  const changeBtn = host.querySelector('#ld-cal-change');
  const clearBtn = host.querySelector('#ld-cal-clear');
  const openDatePrompt = (existingDate)=>{
    const todayStr = new Date().toISOString().slice(0,10);
    host.innerHTML = `
      <div class="field" style="margin:0 0 6px;">
        <label>What date is it on the calendar for?</label>
        <input type="date" id="ld-cal-date-input" value="${escapeHtml(existingDate||todayStr)}">
      </div>
      <div class="btnrow" style="margin-top:0;">
        <button class="btn amber small" id="ld-cal-confirm">Confirm</button>
        <button class="btn small" id="ld-cal-cancel">Cancel</button>
      </div>
    `;
    host.querySelector('#ld-cal-confirm').onclick = ()=>{
      const val = host.querySelector('#ld-cal-date-input').value;
      if(!val){ alert('Pick a date first, or cancel.'); return; }
      setScheduled(showId, val);
      refresh();
    };
    host.querySelector('#ld-cal-cancel').onclick = refresh;
  };
  if(setBtn) setBtn.onclick = ()=> openDatePrompt(null);
  if(changeBtn) changeBtn.onclick = ()=> openDatePrompt(getState(showId).scheduledDate);
  if(clearBtn) clearBtn.onclick = ()=>{
    // No confirm prompt (removed 2026-06-27, Cameron's call) — removing a
    // calendar date is low-stakes and instantly re-addable, the extra tap
    // wasn't earning its keep.
    setStatus(showId, null);
    refresh();
  };
}

/* ============================================================
   VIBE CHECK TAB
   ============================================================ */

// A single-show loyalty signal the collaborator card structurally can't see:
// a creative team that only ever wrote one or two shows total (Meredith
// Willson wrote three, period) can never clear that card's "2+ different
// shows" floor, no matter how hard you love their one show. This counts
// repeat return-trips to the SAME show instead — 3+ rated experiences logged
// against it, none below a 4 — and is shared by the stat card, the local
// Quick Check, and the live Computer Friend's data prep, written once here
// so the three can't quietly drift the way the collaborator floor once did.
/* ============================================================
   SHARED COLLABORATOR-CREDIT HELPERS
   Used by all three places that compute collaborator stats (the Vibe Check
   stat card, runLocalVibeCheck(), runLiveComputerFriend()) so the three
   can't drift the way the 2-show/50% floor itself once did.

   Two independent fixes live here:
   1. DUO MERGING — a name-pair that's co-credited on 2+ of your own logged
      shows (regardless of who else is on the team each time) gets treated
      as one combined entity ("Comden & Green") instead of two unrelated
      half-credits. Any OTHER show either half wrote without the other still
      credits that person solo — same person, two different lines, if and
      only if that's what your own logged data actually shows.
   2. SMALL-SAMPLE SHRINKAGE — the displayed bought-in rate / avg rating
      pulls toward your own overall numbers the thinner a name's sample is,
      so a lucky 2-show 100% can't outrank a real 8-show 87% just because
      the raw percentage is bigger. Barely moves once there's real history
      behind a name. Cameron's call (2026-06-27): go with the automatic
      version rather than a manual floor-raise or a label-only flag.
   ============================================================ */
const DUO_THRESHOLD = 2; // shared logged shows needed to count as a recurring pair
const SHRINK_K = 4; // "virtual" average-ish experiences blended in for shrinkage — higher = stronger pull toward your overall average for thin samples, smaller effect once a name has real history

// Finds every pair of names that's been credited together on 2+ of the
// user's own logged shows. Returns a map: name -> their one recognized
// partner (only set when BOTH sides agree on each other as their best/only
// qualifying partner — if A's strongest pairing is B but B's strongest
// pairing is someone else, neither merges; both stay solo rather than
// showing a one-sided pairing).
function getRecognizedDuos(loggedShows){
  const pairShowSets = {}; // "NameA||NameB" (alphabetical) -> Set of show titles
  loggedShows.forEach(s=>{
    const team = s.team.filter(p=>p!=='various' && p!=='various artists');
    for(let i=0;i<team.length;i++){
      for(let j=i+1;j<team.length;j++){
        const key = [team[i],team[j]].sort().join('||');
        if(!pairShowSets[key]) pairShowSets[key] = new Set();
        pairShowSets[key].add(s.title);
      }
    }
  });
  const candidatesByName = {};
  Object.entries(pairShowSets).forEach(([key, titles])=>{
    if(titles.size < DUO_THRESHOLD) return;
    const [a,b] = key.split('||');
    [[a,b],[b,a]].forEach(([self,partner])=>{
      if(!candidatesByName[self]) candidatesByName[self] = [];
      candidatesByName[self].push({partner, count:titles.size});
    });
  });
  const duoMap = {};
  Object.entries(candidatesByName).forEach(([name, candidates])=>{
    // More shared shows wins; alphabetical-by-partner-name is the tiebreaker
    // for the rare case of an exact tie — there's no principled reason to
    // prefer one pairing over another automatically beyond that.
    candidates.sort((a,b)=> b.count-a.count || a.partner.localeCompare(b.partner));
    duoMap[name] = candidates[0].partner;
  });
  Object.keys(duoMap).forEach(name=>{
    if(duoMap[duoMap[name]] !== name) delete duoMap[name];
  });
  return duoMap;
}

// Given one show's team and the recognized-duos map, returns the credit
// unit(s) for that show: a merged "A & B" unit for any recognized pair both
// present on this show's team, plus a solo unit for anyone else credited.
function creditUnitsForShow(team, duoMap){
  const cleanTeam = team.filter(p=>p!=='various' && p!=='various artists');
  const used = new Set();
  const units = [];
  cleanTeam.forEach(name=>{
    if(used.has(name)) return;
    const partner = duoMap[name];
    if(partner && cleanTeam.includes(partner) && !used.has(partner)){
      used.add(name); used.add(partner);
      const ordered = cleanTeam.indexOf(name) < cleanTeam.indexOf(partner) ? [name,partner] : [partner,name];
      units.push({names: ordered, displayName: ordered.join(' & ')});
    } else {
      used.add(name);
      units.push({names:[name], displayName:name});
    }
  });
  return units;
}

// Pulls a raw sum/count toward priorMean the thinner the sample (n) is —
// see SHRINK_K above. Degrades gracefully to priorMean itself at n=0.
function shrinkToward(sum, n, priorMean, k){
  if(n<=0) return priorMean;
  return (sum + k*priorMean) / (n + k);
}

// The "your overall average, full stop" numbers shrinkage pulls toward —
// computed once across every logged experience, not just ones from
// collaborators who already clear the 2-show floor (that would be circular).
function getGlobalCollabBaseline(loggedShows){
  let totalExp=0, totalBoughtIn=0, ratingSum=0, ratingCount=0;
  loggedShows.forEach(s=>{
    getState(s.id).experiences.forEach(e=>{
      totalExp++;
      if(e.verdict==='boughtIn' || e.verdict==='allIn') totalBoughtIn++;
      if(e.rating!=null){ ratingSum+=e.rating; ratingCount++; }
    });
  });
  return {
    meanRate: totalExp>0 ? totalBoughtIn/totalExp : 0.5,
    meanRating: ratingCount>0 ? ratingSum/ratingCount : null,
  };
}

function getComebackShows(loggedShows){
  return loggedShows.map(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    if(rated.length<3) return null;
    const ratings = rated.map(e=>e.rating);
    if(Math.min(...ratings)<4) return null;
    const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
    return {title:s.title, count:rated.length, avg};
  }).filter(Boolean).sort((a,b)=> b.avg-a.avg || b.count-a.count);
}

function renderVibe(){
  const el = document.getElementById('tab-vibe');
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);

  // collaborator stats — duo-merged credit units, shrunk toward the user's
  // own overall numbers the thinner a name's sample is (see the shared
  // helpers above for both mechanisms).
  const duoMap = getRecognizedDuos(loggedShows);
  const baseline = getGlobalCollabBaseline(loggedShows);
  const collabMap = {};
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const ratings = st.experiences.map(e=>e.rating).filter(r=>r!==null && r!==undefined);
    const boughtInCount = st.experiences.filter(e=>e.verdict==='boughtIn' || e.verdict==='allIn').length;
    const total = st.experiences.length;
    creditUnitsForShow(s.team, duoMap).forEach(unit=>{
      const key = unit.displayName;
      if(!collabMap[key]) collabMap[key] = {names:unit.names, ratings:[], boughtIn:0, total:0, shows:new Set(), breakdown:{}};
      collabMap[key].ratings.push(...ratings);
      collabMap[key].boughtIn += boughtInCount;
      collabMap[key].total += total;
      collabMap[key].shows.add(s.title);
      // Per-show experience list, for the audit popup. A show with 2+ logged
      // experiences (e.g. listened AND watched a bootleg) feeds 2+ data
      // points into this person's avg/bought-in numbers even though it's
      // still just 1 entry in `shows` — the popup used to only list show
      // titles, with no way to see that, which is exactly what made the
      // Laurents/Sondheim numbers confusing to audit by eye this session.
      if(!collabMap[key].breakdown[s.title]) collabMap[key].breakdown[s.title] = [];
      collabMap[key].breakdown[s.title].push(...st.experiences.map(e=>({rating:e.rating, verdict:e.verdict})));
    });
  });
  const collabStats = Object.entries(collabMap)
    .map(([name,v])=>{
      const rawAvg = v.ratings.length ? (v.ratings.reduce((a,b)=>a+b,0)/v.ratings.length) : null;
      const rawBoughtInRate = v.boughtIn / v.total;
      const boughtInRate = shrinkToward(v.boughtIn, v.total, baseline.meanRate, SHRINK_K);
      const avg = (rawAvg!=null && baseline.meanRating!=null) ? shrinkToward(v.ratings.reduce((a,b)=>a+b,0), v.ratings.length, baseline.meanRating, SHRINK_K) : rawAvg;
      const showBreakdown = [...v.shows].map(title=>({title, experiences: v.breakdown[title]||[]}));
      return {name, names:v.names, avg, rawAvg, boughtInRate, rawBoughtInRate, showCount: v.shows.size, showTitles: [...v.shows], showBreakdown};
    })
    // need 2+ DIFFERENT shows AND a real (shrinkage-adjusted) bought-in rate
    // of ≥50% — the floor itself now checks the adjusted number, not the raw
    // one, so a thin sample that only "looks" 50%+ on raw numbers alone can
    // fail to qualify. Same floor runLocalVibeCheck()/runLiveComputerFriend() apply.
    .filter(c=>c.showCount>=2 && c.boughtInRate>=0.5)
    .sort((a,b)=> b.boughtInRate - a.boughtInRate || (b.avg||0)-(a.avg||0))
    .slice(0,8);

  const comebackShows = getComebackShows(loggedShows);

  // "stuck at fine" flags
  const stuckFlags = [];
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    const distinctCaps = new Set(rated.map(e=>e.capacity));
    if(rated.length>=2 && distinctCaps.size>=2){
      const ratings = rated.map(e=>e.rating);
      const max = Math.max(...ratings), min = Math.min(...ratings);
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      if(max-min<=1 && avg>=2.5 && avg<=3.5){
        stuckFlags.push({title:s.title, formats:distinctCaps.size, avg});
      }
    }
  });

  el.innerHTML = `
    <h2 class="section-title">Vibe Check</h2>

      '',
      comebackShows.length ? comebackShows.map(c=>`<div class="flag-row"><b>${escapeHtml(c.title)}</b> — logged ${c.count} times, never below a 4 (avg ${c.avg.toFixed(1)}/5).</div>`).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No show has 3+ logged experiences with nothing below a 4 yet.</p>'
    )}

    ${statCardHtml('stuck', 'Stuck-at-fine flags',
      '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">Sitting flat in the "fine" band (2.5–3.5 avg, never swinging more than a point) across 2+ different formats — usually a quieter, more reliable sign of dislike than one bad rating, not actual neutrality.</p>',
      '',
      stuckFlags.length ? stuckFlags.map(f=>`<div class="flag-row"><b>${escapeHtml(f.title)}</b> — ${f.formats} formats logged, avg ${f.avg.toFixed(1)}/5.</div>`).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No "fine across every format" patterns yet. (You know which show eventually triggers this one.)</p>'

      `<div class="btnrow" style="margin-top:8px;">

        <button class="btn ghost-dark small" id="anchorAdd">add</button>

    <div class="stat-card ai-box">
      <h3>Computer Friend</h3>
      <p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">
        Two ways to ask. The quick check reads your data with a fixed local rule — no account, no key,

        using your own personal API key.
      </p>
      <div class="btnrow">
        <button class="btn ghost-dark" id="runVibeCheck">Quick check (instant, local, free)</button>

      <div class="vibe-tab-row">
        <button class="vibe-tab-pill${vibeActiveTab==='local'?' active':''}" data-vibe-tab="local">Quick check</button>
        <button class="vibe-tab-pill${vibeActiveTab==='live'?' active':''}" data-vibe-tab="live">Computer Friend (live)</button>

  el.querySelectorAll('[data-vibe-card-toggle]').forEach(h=>{

  document.getElementById('anchorAdd').onclick = ()=>{
    const inp = document.getElementById('anchorInput');
    const val = inp.value.trim();
    if(val){
      DATA.anchors.push({id:'a'+Date.now(), name:val});

      inp.value='';
      renderAnchors();

  document.getElementById('runVibeCheck').onclick = ()=> runLocalVibeCheck();
