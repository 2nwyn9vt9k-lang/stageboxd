// A single-show loyalty signal the collaborator card structurally can't see:
// a creative team that only ever wrote one or two shows total (Meredith
// Willson wrote three, period) can never clear that card's "2+ different
// shows" floor, no matter how hard you love their one show. This counts
// repeat return-trips to the SAME show instead — 3+ rated experiences logged
// against it, none below a 4 — and is shared by the stat card, the local
// Quick Check, and the live Computer Friend's data prep, written once here
// so the three can't quietly drift the way the collaborator floor once did.
/* ============================================================
   SHARED COLLABORATOR-CREDIT HELPERS
   Used by all three places that compute collaborator stats (the Vibe Check
   stat card, runLocalVibeCheck(), runLiveComputerFriend()) so the three
   can't drift the way the 2-show/50% floor itself once did.

   Two independent fixes live here:
   1. DUO MERGING — a name-pair that's co-credited on 2+ of your own logged
      shows (regardless of who else is on the team each time) gets treated
      as one combined entity ("Comden & Green") instead of two unrelated
      half-credits. Any OTHER show either half wrote without the other still
      credits that person solo — same person, two different lines, if and
      only if that's what your own logged data actually shows.
   2. SMALL-SAMPLE SHRINKAGE — the displayed bought-in rate / avg rating
      pulls toward your own overall numbers the thinner a name's sample is,
      so a lucky 2-show 100% can't outrank a real 8-show 87% just because
      the raw percentage is bigger. Barely moves once there's real history
      behind a name. Cameron's call (2026-06-27): go with the automatic
      version rather than a manual floor-raise or a label-only flag.
   ============================================================ */
const DUO_THRESHOLD = 2; // shared logged shows needed to count as a recurring pair — a floor underneath DUO_AFFINITY_THRESHOLD below, so two people whose only logged show together is the only show either of them has logged can't compute as 100% mutual affinity off one data point.
const DUO_AFFINITY_THRESHOLD = 0.5; // (2026-06-30) a pair only auto-merges if their shared shows are a clear MAJORITY of BOTH people's own total logged shows, checked mutually — not just a raw share-count floor. Replaces SHRINK_K-based shrinkage as the small-sample-bias fix entirely (see WILSON_Z below for what replaced it on the ranking side). Picked, not derived, same starting-guess status as DUO_THRESHOLD — >50% means an exact 50/50 split between two partners never auto-merges either one.
const LIVE_REPEAT_WEIGHT = 2; // a Live experience flagged "seen multiple times" counts as this many toward collaborator math and the comeback-show floor, instead of the flat 1 every other experience counts as. Same starting-guess status as the other constants here — picked, not derived.

function pairKey(a,b){ return [a,b].sort().join('||'); }

// Per-pair show counts from the user's own logged data, regardless of
// DUO_THRESHOLD or the denylist — shared by getRecognizedDuos() and the
// "review detected pairs" management list, which needs raw counts for
// denied pairs too (so a denial can be reviewed/reversed later).
function getDuoPairCounts(loggedShows){
  const pairShowSets = {};
  loggedShows.forEach(s=>{
    const team = s.team.filter(p=>p!=='various' && p!=='various artists');
    for(let i=0;i<team.length;i++){
      for(let j=i+1;j<team.length;j++){
        const key = pairKey(team[i],team[j]);
        if(!pairShowSets[key]) pairShowSets[key] = new Set();
        pairShowSets[key].add(s.title);
      }
    }
  });
  return pairShowSets;
}

// Distinct logged-show count per credited name — the denominator for
// mutual-affinity duo detection below. How much of THIS person's own
// catalog the shared shows actually represent, not just a raw pair count.
function getShowCountsByName(loggedShows){
  const counts = {};
  loggedShows.forEach(s=>{
    const team = s.team.filter(p=>p!=='various' && p!=='various artists');
    new Set(team).forEach(name=>{ counts[name] = (counts[name]||0) + 1; });
  });
  return counts;
}

// Finds every pair of names that's a real recurring creative TEAM, not just
// two people who've crossed paths a few times. Returns a map: name -> their
// one recognized partner (only set when BOTH sides agree on each other as
// their best/only qualifying partner — if A's strongest pairing is B but
// B's strongest pairing is someone else, neither merges; both stay solo
// rather than showing a one-sided pairing).
// Mutual affinity (2026-06-30): replaces the old "any 2+ shared shows"
// floor, which forced constant manual denylisting of real-but-prolific
// people (Sondheim sharing exactly 2 shows each with Furth, Lapine, AND
// Laurents — three separate false-positive "duos" off one person's normal
// career breadth) rather than catching a single true team. A pair now only
// qualifies if the shared shows are a clear MAJORITY of BOTH people's own
// total logged catalogs (DUO_AFFINITY_THRESHOLD), checked independently in
// each direction — Comden & Green or Rodgers & Hammerstein clear this
// easily since that's nearly their whole logged output together; Sondheim
// clears it with no one, since none of his individual partners account for
// more than a fraction of his much broader catalog. DUO_THRESHOLD (2 shared
// shows) still applies underneath as a floor, so a pair sharing their only
// logged show each can't compute as 100% mutual affinity off one data
// point. DATA.duoDenylist remains as a manual safety valve on top of all of
// this for the rare case the math still gets a specific pair wrong.
function getRecognizedDuos(loggedShows){
  const pairShowSets = getDuoPairCounts(loggedShows);
  const showCounts = getShowCountsByName(loggedShows);
  const denylist = new Set(DATA.duoDenylist || []);
  const candidatesByName = {};
  Object.entries(pairShowSets).forEach(([key, titles])=>{
    const shared = titles.size;
    if(shared < DUO_THRESHOLD) return;
    const [a,b] = key.split('||');
    const affinityA = shared / (showCounts[a] || shared);
    const affinityB = shared / (showCounts[b] || shared);
    if(affinityA <= DUO_AFFINITY_THRESHOLD || affinityB <= DUO_AFFINITY_THRESHOLD) return;
    [[a,b],[b,a]].forEach(([self,partner])=>{
      if(!candidatesByName[self]) candidatesByName[self] = [];
      candidatesByName[self].push({partner, count:shared});
    });
  });
  const duoMap = {};
  Object.entries(candidatesByName).forEach(([name, candidates])=>{
    // More shared shows wins; alphabetical-by-partner-name is the tiebreaker
    // for the rare case of an exact tie — there's no principled reason to
    // prefer one pairing over another automatically beyond that.
    candidates.sort((a,b)=> b.count-a.count || a.partner.localeCompare(b.partner));
    const best = candidates.find(c=> !denylist.has(pairKey(name,c.partner)));
    if(best) duoMap[name] = best.partner;
  });
  Object.keys(duoMap).forEach(name=>{
    if(duoMap[duoMap[name]] !== name) delete duoMap[name];
  });
  return duoMap;
}

// Every pair currently worth showing in the "review detected pairs" manager:
// either actively merged right now (per getRecognizedDuos() above) or sitting
// in the denylist with enough shared shows to still be a real candidate —
// union of both, so a denied pair stays reviewable/reversible even after a
// name's fallen through to a different partner, and a newly-active pair
// (e.g. the fallback itself) is reachable too. This has to work independent
// of whether a pair's merged row currently renders on the collaborator card —
// a pair that fails the card's own qualifying floor (2+ shows, ≥50% bought-in)
// never gets a row to click into at all, which is exactly what made the
// Sondheim/Laurents case invisible in the first place.
function getDuoManagementList(loggedShows){
  const pairShowSets = getDuoPairCounts(loggedShows);
  const denylist = new Set(DATA.duoDenylist || []);
  const activeDuoMap = getRecognizedDuos(loggedShows);
  const keys = new Set();
  Object.entries(activeDuoMap).forEach(([name,partner])=> keys.add(pairKey(name,partner)));
  denylist.forEach(key=>{ if(pairShowSets[key] && pairShowSets[key].size>=DUO_THRESHOLD) keys.add(key); });
  const rows = Array.from(keys).map(key=>{
    const [a,b] = key.split('||');
    return { a, b, key, count: pairShowSets[key].size, denied: denylist.has(key) };
  });
  rows.sort((x,y)=> y.count-x.count || x.a.localeCompare(y.a));
  return rows;
}

// Given one show's team and the recognized-duos map, returns the credit
// unit(s) for that show: a merged "A & B" unit for any recognized pair both
// present on this show's team, plus a solo unit for anyone else credited.
function creditUnitsForShow(team, duoMap){
  const cleanTeam = team.filter(p=>p!=='various' && p!=='various artists');
  const used = new Set();
  const units = [];
  cleanTeam.forEach(name=>{
    if(used.has(name)) return;
    const partner = duoMap[name];
    if(partner && cleanTeam.includes(partner) && !used.has(partner)){
      used.add(name); used.add(partner);
      const ordered = cleanTeam.indexOf(name) < cleanTeam.indexOf(partner) ? [name,partner] : [partner,name];
      units.push({names: ordered, displayName: ordered.join(' & ')});
    } else {
      used.add(name);
      units.push({names:[name], displayName:name});
    }
  });
  return units;
}

/* ---- ROLE TAGGING (2026-06-28): who specifically did what on a show's
   credited team — composer, lyricist, book writer, any combination. Additive
   and sparse, sitting alongside `team` on purpose: doesn't change team's
   shape, so duo detection / the credits line / search / "find more shows"
   pairing are all untouched by this.
   Storage is two-layer: seed shows ship with Claude-researched defaults baked
   into RAW_SEED's 5th tuple element (same unverified-against-a-real-database
   status as team/tags themselves — see Known Limitations); a per-show
   `roleOverrides` map on the override record takes full precedence per name
   when Cameron corrects one via "Edit credits". Custom shows have no seed
   layer to override, so their `roles` field is just the data directly, same
   relationship custom shows already have with team/tags via "Edit details".
   Deliberately three independent booleans (music/lyrics/book) rather than a
   fixed set of named categories — a fixed-category version of this missed
   how often someone holds two of the three (Comden & Green, Eric Idle, Lisa
   Kron...), which is exactly the kind of flattening that made Sondheim's
   lyrics-only Gypsy/West Side Story credits indistinguishable from his
   music-and-lyrics Company/Merrily credits in the first place. */
function getRoles(show){
  if(!show) return {};
  if(show.custom) return show.roles || {};
  const override = (DATA.overrides[show.id] || {}).roleOverrides || {};
  return Object.assign({}, show.roles || {}, override);
}
function setShowRoles(showId, name, roleObj){
  if(DATA.customShows[showId]){
    if(!DATA.customShows[showId].roles) DATA.customShows[showId].roles = {};
    DATA.customShows[showId].roles[name] = roleObj;
  } else {
    const o = ensureOverride(showId);
    if(!o.roleOverrides) o.roleOverrides = {};
    o.roleOverrides[name] = roleObj;
  }
  saveData();
}
// Composes a display label from the three atomic flags — "Music", "Lyrics &
// Book", "Music, Lyrics & Book" — or null if nothing's tagged yet, so call
// sites can skip rendering anything rather than show an empty label.
function roleLabel(r){
  if(!r) return null;
  const parts = [];
  if(r.music) parts.push('Music');
  if(r.lyrics) parts.push('Lyrics');
  if(r.book) parts.push('Book');
  if(!parts.length) return null;
  if(parts.length===1) return parts[0];
  return parts.slice(0,-1).join(', ') + ' & ' + parts[parts.length-1];
}
// Role text for a collab-card audit-popup row, covering both solo names and
// merged duo units. A duo only gets one combined label when both halves are
// tagged identically on this specific show (the common case for a real
// writing team); if they differ, each gets its own name:label pair instead
// of silently picking one.
function rolesTextForShow(names, show){
  const roles = getRoles(show);
  const labeled = names.map(n=>({name:n, label: roleLabel(roles[n])})).filter(x=>x.label);
  if(!labeled.length) return '';
  if(labeled.length===1) return ` (${labeled[0].label})`;
  if(labeled[0].label === labeled[1].label) return ` (${labeled[0].label})`;
  return ` (${labeled.map(l=>`${l.name}: ${l.label}`).join(', ')})`;
}

// Confidence-bound ranking (2026-06-30): replaces shrinkage as the
// collaborator leaderboard's SORT key. Shrinkage only ever asked "is this
// rate trustworthy" by pulling a thin sample toward the user's overall
// average — useful for not overstating a lucky small sample, but it never
// gave credit for a LARGE sample's accumulated evidence, which is what let
// a 2-show creator with one mixed result get pulled UPWARD toward a high
// overall average and outrank a real 7-show track record on a rate-only
// sort. The Wilson lower bound asks a different question: not "what's the
// percentage," but "how low could the true rate plausibly be, given how
// much evidence backs it." More evidence narrows that range and lets a
// good-but-not-perfect rate rank where it should; a thin sample's wide
// range keeps it from punching above its weight even if the raw number
// looks shiny — same goal shrinkage had, plus the volume credit it never
// had. WILSON_Z=1.96 (95% confidence) is a reasonable starting pick, not a
// derived value — same status as DUO_THRESHOLD/DUO_AFFINITY_THRESHOLD,
// revisit if a ranking ever looks visibly wrong in practice. This score is
// the SORT key only — the card displays plain literal counts (see
// renderVibe), not this number, so nothing on screen requires explaining it.
const WILSON_Z = 1.96;
function wilsonLowerBound(positive, total){
  if(total<=0) return 0;
  const p = positive/total;
  const z2 = WILSON_Z*WILSON_Z;
  const denom = 1 + z2/total;
  const center = p + z2/(2*total);
  const margin = WILSON_Z * Math.sqrt((p*(1-p) + z2/(4*total))/total);
  return (center - margin) / denom;
}

// Repeat-viewing (2026-06-28h): a Live experience flagged "seen multiple
// times" (repeatLive) counts as LIVE_REPEAT_WEIGHT toward collaborator math
// and the comeback-show floor, instead of the flat 1 every other experience
// counts as. Recording/movie/pro-shot repeats are untouched on purpose — see
// Known Limitations for the cost/access reasoning that scoped this to Live.
function expWeight(e){
  return (e.capacity==='live' && e.repeatLive) ? LIVE_REPEAT_WEIGHT : 1;
}

// Shared weighted accumulator for a show's experience list — used at every
// collaborator-math accumulation point (the stat card, Quick Check, live
// Computer Friend) plus getComebackShows(), so LIVE_REPEAT_WEIGHT only has
// to be applied in one place instead of copy-pasted across call sites.
function weightedExpStats(experiences){
  let ratingSum=0, ratingWeight=0, boughtInWeight=0, totalWeight=0;
  experiences.forEach(e=>{
    const w = expWeight(e);
    totalWeight += w;
    if(e.verdict==='boughtIn' || e.verdict==='allIn') boughtInWeight += w;
    if(e.rating!=null){ ratingSum += e.rating*w; ratingWeight += w; }
  });
  return {ratingSum, ratingWeight, boughtInWeight, totalWeight};
}

function getComebackShows(loggedShows){
  return loggedShows.map(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    if(!rated.length) return null;
    const ratings = rated.map(e=>e.rating);
    if(Math.min(...ratings)<4) return null;
    // Effective weighted count/average (2026-06-28h), not raw experience
    // count — a repeat-flagged Live entry counts as LIVE_REPEAT_WEIGHT here
    // too, via the shared weightedExpStats() helper. Every entry in `rated`
    // already has a rating, so ratingWeight===totalWeight below. Confirmed
    // and wanted: a single doubled entry alone (effective weight 2) still
    // can't clear the 3+ floor on its own — see Known Limitations.
    const w = weightedExpStats(rated);
    if(w.totalWeight<3) return null;
    const avg = w.ratingSum/w.ratingWeight;
    return {title:s.title, count:w.totalWeight, avg};
  }).filter(Boolean).sort((a,b)=> b.avg-a.avg || b.count-a.count);
}

function renderVibe(){
  const el = document.getElementById('tab-vibe');
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);

  // collaborator stats — duo-merged credit units (mutual-affinity teams
  // only, see getRecognizedDuos), ranked by confidence-bound score (see
  // wilsonLowerBound above) rather than a shrunk rate. The card displays
  // plain literal counts; the ranking math stays invisible on purpose.
  const duoMap = getRecognizedDuos(loggedShows);
  const collabMap = {};
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const wstats = weightedExpStats(st.experiences);
    creditUnitsForShow(s.team, duoMap).forEach(unit=>{
      const key = unit.displayName;
      if(!collabMap[key]) collabMap[key] = {names:unit.names, ratingSum:0, ratingWeight:0, boughtIn:0, total:0, shows:new Set(), breakdown:{}};
      collabMap[key].ratingSum += wstats.ratingSum;
      collabMap[key].ratingWeight += wstats.ratingWeight;
      collabMap[key].boughtIn += wstats.boughtInWeight;
      collabMap[key].total += wstats.totalWeight;
      collabMap[key].shows.add(s.title);
      // Per-show experience list, for the audit popup. A show with 2+ logged
      // experiences (e.g. listened AND watched a bootleg) feeds 2+ data
      // points into this person's avg/bought-in numbers even though it's
      // still just 1 entry in `shows` — the popup used to only list show
      // titles, with no way to see that, which is exactly what made the
      // Laurents/Sondheim numbers confusing to audit by eye this session.
      // Keyed by show id (not just title) since build 2026-06-28f needs the
      // id to look up that show's per-name role tags for this same popup.
      // `repeatLive` (build 2026-06-28h) lets the audit popup mark which
      // entry is being counted twice, instead of the doubling being invisible.
      if(!collabMap[key].breakdown[s.id]) collabMap[key].breakdown[s.id] = {title:s.title, experiences:[]};
      collabMap[key].breakdown[s.id].experiences.push(...st.experiences.map(e=>({rating:e.rating, verdict:e.verdict, repeatLive: !!(e.capacity==='live' && e.repeatLive)})));
    });
  });
  const collabStats = Object.entries(collabMap)
    .map(([name,v])=>{
      const avg = v.ratingWeight ? (v.ratingSum/v.ratingWeight) : null;
      const boughtInRate = v.total ? (v.boughtIn/v.total) : 0;
      const boughtInCount = Math.round(v.boughtIn);
      const totalCount = Math.round(v.total);
      const confidence = wilsonLowerBound(v.boughtIn, v.total);
      const showBreakdown = Object.entries(v.breakdown).map(([showId,b])=>({showId, title:b.title, experiences:b.experiences}));
      return {name, names:v.names, avg, boughtInRate, boughtInCount, totalCount, confidence, showCount: v.shows.size, showTitles: [...v.shows], showBreakdown};
    })
    // need 2+ DIFFERENT shows AND a real bought-in rate of ≥50% — a plain,
    // checkable floor on the literal numbers. Ranking among everyone who
    // clears it is handled separately, below, by the confidence score.
    .filter(c=>c.showCount>=2 && c.boughtInRate>=0.5)
    .sort((a,b)=> b.confidence - a.confidence)
    .slice(0,8);

  const comebackShows = getComebackShows(loggedShows);

  // "stuck at fine" flags
  const stuckFlags = [];
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    const distinctCaps = new Set(rated.map(e=>e.capacity));
    if(rated.length>=2 && distinctCaps.size>=2){
      const ratings = rated.map(e=>e.rating);
      const max = Math.max(...ratings), min = Math.min(...ratings);
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      if(max-min<=1 && avg>=2.5 && avg<=3.5){
        stuckFlags.push({title:s.title, formats:distinctCaps.size, avg});
      }
    }
  });

  el.innerHTML = `
    <h2 class="section-title">Vibe Check</h2>
    <p class="section-sub">what the ledger says about your actual taste, not the popular consensus</p>

    ${statCardHtml('collab', 'Creative collaborators you keep buying into',
      '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">Composers, lyricists, and book writers you actually keep buying into — not just people you\'ve crossed paths with a lot. Click a name for the real story behind the number.</p>',
      '<button class="btn ghost-dark small" id="manageDuoPairsBtn" style="margin-bottom:6px;">review detected pairs</button>',
      collabStats.length ? collabStats.map((c,i)=>`
        <div class="collab-row"><span><button class="collab-name-btn" data-collab-idx="${i}">${escapeHtml(c.name)}</button> <span style="color:var(--chalk-dim)">(${c.showCount} show${c.showCount===1?'':'s'})</span></span>
        <span>${c.boughtInCount} of ${c.totalCount} experiences bought-in or All In${c.avg?' · '+c.avg.toFixed(1)+'/5 avg':''}</span></div>
      `).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">Log a few experiences and this fills in.</p>'
    )}

    ${statCardHtml('comeback', 'Shows you keep coming back to',
      '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">A single-show loyalty signal the collaborator card above structurally can\'t catch — a show you keep returning to and rating high, even if its creative team never wrote anything else you\'ve logged.</p>',
      '',
      comebackShows.length ? comebackShows.map(c=>`<div class="collab-row"><span><b>${escapeHtml(c.title)}</b></span><span>logged ${c.count}x · never below a 4 · avg ${c.avg.toFixed(1)}/5</span></div>`).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No show has 3+ logged experiences with nothing below a 4 yet.</p>'
    )}

    ${statCardHtml('stuck', 'Stuck-at-fine flags',
      '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">Sitting flat in the "fine" band (2.5–3.5 avg, never swinging more than a point) across 2+ different formats — usually a quieter, more reliable sign of dislike than one bad rating, not actual neutrality.</p>',
      '',
      stuckFlags.length ? stuckFlags.map(f=>`<div class="collab-row"><span><b>${escapeHtml(f.title)}</b></span><span>${f.formats} formats logged · avg ${f.avg.toFixed(1)}/5</span></div>`).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No "fine across every format" patterns yet. (You know which show eventually triggers this one.)</p>'
    )}

    ${statCardHtml('anchors', 'Non-theater anchors',
      '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">Stuff outside theater entirely that explains your taste better than any genre tag — a show, a band, a TV writer. This is how "computer friend" catches the Schlesinger-shaped connections.</p>',
      `<div class="btnrow" style="margin-top:8px;">
        <input type="text" id="anchorInput" placeholder="e.g. Crazy Ex-Girlfriend" style="flex:1;font-family:var(--font-body);padding:8px 10px;border-radius:4px;border:1px solid var(--panel-line);background:var(--stage);color:var(--chalk);">
        <button class="btn ghost-dark small" id="anchorAdd">add</button>
      </div>`,
      `<div id="anchorList" style="margin-top:10px;"></div>`
    )}

    <div class="stat-card ai-box">
      <h3>Computer Friend</h3>
      <p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">
        Two ways to ask. The quick check reads your data with a fixed local rule — no account, no key,
        no network call, ever. The live version sends a summary of the same data straight to Claude and
        can reason past the seed list entirely — including real cross-medium connections to your anchors —
        using your own personal API key.
      </p>
      <div class="btnrow">
        <button class="btn ghost-dark" id="runVibeCheck">Quick check (instant, local, free)</button>
        <button class="btn amber" id="runLiveComputerFriend">Ask Computer Friend (live)</button>
      </div>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin:10px 0 0;">switch between your last two results — free, doesn't re-run or re-spend anything:</p>
      <div class="vibe-tab-row">
        <button class="vibe-tab-pill${vibeActiveTab==='local'?' active':''}" data-vibe-tab="local">Quick check</button>
        <button class="vibe-tab-pill${vibeActiveTab==='live'?' active':''}" data-vibe-tab="live">Computer Friend (live)</button>
        <button class="btn ghost-dark small" id="vibeHistBtn" style="margin-left:auto;">past runs</button>
      </div>
      <div id="vibeResultHost"></div>
    </div>
  `;
  renderAnchors();
  el.querySelectorAll('.collab-name-btn[data-collab-idx]').forEach(btn=>{
    btn.onclick = ()=> openCollabShowsModal(collabStats[Number(btn.dataset.collabIdx)]);
  });
  el.querySelectorAll('[data-vibe-card-toggle]').forEach(h=>{
    h.onclick = ()=>{
      const key = h.dataset.vibeCardToggle;
      vibeCardOpen[key] = !vibeCardOpen[key];
      renderVibe();
    };
  });
  document.getElementById('anchorAdd').onclick = ()=>{
    const inp = document.getElementById('anchorInput');
    const val = inp.value.trim();
    if(val){
      DATA.anchors.push({id:'a'+Date.now(), name:val});
      saveData();
      inp.value='';
      renderAnchors();
    }
  };
  document.getElementById('runVibeCheck').onclick = ()=> runLocalVibeCheck();
  document.getElementById('runLiveComputerFriend').onclick = ()=> runLiveComputerFriend();
  document.getElementById('vibeHistBtn').onclick = ()=> openVibeHistoryModal();
  document.getElementById('manageDuoPairsBtn').onclick = ()=> openDuoManagementModal(loggedShows);
  el.querySelectorAll('.vibe-tab-pill').forEach(p=>{
    p.onclick = ()=> setVibeActiveTab(p.dataset.vibeTab);
  });

  // Persistence: redisplay whichever tier's last saved run vibeActiveTab
  // currently points to (defaults to 'local' on a fresh page load), instead
  // of needing a re-click just to see what's already there.
  renderVibeResultBox();
}

// Generic wrapper for the four stat cards: title + description (and any
// always-visible controls, like the anchors card's add-input) stay on
// screen no matter what; the actual list sits behind a tap, collapsed by
// default so the page doesn't read as "busy" the moment real data piles up.
function statCardHtml(key, title, descriptionHtml, alwaysVisibleHtml, collapsibleBodyHtml){
  const open = vibeCardOpen[key];
  return `
    <div class="stat-card">
      <div class="stat-card-header" data-vibe-card-toggle="${key}">
        <h3>${title}</h3>
        <span class="stat-card-toggle">${open ? '▾ hide' : '▸ show'}</span>
      </div>
      ${descriptionHtml || ''}
      ${alwaysVisibleHtml || ''}
      ${open ? collapsibleBodyHtml : ''}
    </div>
  `;
}

function openCollabShowsModal(c){
  if(!c) return;
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  const breakdownHtml = (c.showBreakdown && c.showBreakdown.length)
    ? c.showBreakdown.map(sb=>{
        const expCount = sb.experiences.length;
        const expLines = sb.experiences.map(e=>{
          const ratingText = (e.rating!==null && e.rating!==undefined) ? `${RATING_LABELS[e.rating]} (${e.rating}/5)` : 'no rating';
          const verdictLabel = (VERDICTS.find(v=>v.key===e.verdict)||{}).label || 'no verdict';
          const repeatTag = e.repeatLive ? ' (counted 2x — seen live more than once)' : '';
          return `${ratingText} · ${verdictLabel}${repeatTag}`;
        }).join(', ');
        const show = getShow(sb.showId);
        const roleText = show ? rolesTextForShow(c.names, show) : '';
        return `<div class="lib-subitem"><b>${escapeHtml(sb.title)}</b><span style="color:var(--chalk-dim);">${escapeHtml(roleText)}</span> <span class="sub-extra">— ${expCount} experience${expCount===1?'':'s'} logged: ${expLines}</span></div>`;
      }).join('')
    : (c.showTitles||[]).map(t=>`<div class="lib-subitem">${escapeHtml(t)}</div>`).join('') || '<p style="font-size:13px;color:#7a756d;">No titles recorded.</p>';
  back.innerHTML = `
    <div class="modal">
      <h2 class="section-title" style="color:var(--ink)">${escapeHtml(c.name)}</h2>
      <p style="font-family:var(--font-mono);font-size:11px;color:#5a5550;margin-top:-6px;">${c.showCount} show${c.showCount===1?'':'s'} behind this stat · ${c.boughtInCount} of ${c.totalCount} experiences bought-in or All In${c.avg?' · '+c.avg.toFixed(1)+'/5 avg':''}</p>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin-top:-4px;">Counted per logged experience, not per show — a show logged more than once (e.g. listened AND watched) contributes more than one data point below.</p>
      <div>${breakdownHtml}</div>
      <div class="btnrow"><button class="btn small" id="collabModalClose">Close</button></div>
    </div>
  `;
  document.body.appendChild(back);
  back.querySelector('#collabModalClose').onclick = ()=> back.remove();
}

// "Review detected pairs" (2026-06-28): lists every pair the algorithm has
// either actively merged or previously had denied, with a toggle per row —
// reachable independent of whether a pair's merged row renders on the
// collaborator card itself, since a pair that fails the card's own
// qualifying floor never gets a row to click into (the Sondheim/Laurents
// case that motivated this feature).
function openDuoManagementModal(loggedShows){
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  const rows = getDuoManagementList(loggedShows);
  const rowsHtml = rows.length ? rows.map(r=>`
    <div class="lib-subitem" style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <span>${escapeHtml(r.a)} & ${escapeHtml(r.b)} <span class="sub-extra">— ${r.count} shared show${r.count===1?'':'s'}${r.denied?' · currently kept solo':''}</span></span>
      <button class="btn ghost-dark small" data-duo-toggle="${escapeHtml(r.key)}" style="white-space:nowrap;">${r.denied ? 're-enable as duo' : 'not actually a duo'}</button>
    </div>
  `).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No recurring pairs detected from your logged data yet — needs 2+ shared shows between two names.</p>';
  back.innerHTML = `
    <div class="modal">
      <h2 class="section-title" style="color:var(--ink)">Review detected pairs</h2>
      <p style="font-family:var(--font-mono);font-size:11px;color:#5a5550;margin-top:-6px;">Recurring pairs are detected automatically now — a pairing only forms if the shared shows are a clear majority of BOTH people's own catalogs, so most one-off overlaps never show up here at all. This list is the manual safety valve for when the math still gets a specific pair wrong: anyone currently merged, plus anyone you've previously forced solo. Mark one "not actually a duo" to keep both names credited solo regardless of the math; the change is permanent until you reverse it here.</p>
      <div>${rowsHtml}</div>
      <div class="btnrow"><button class="btn small" id="duoManageModalClose">Close</button></div>
    </div>
  `;
  document.body.appendChild(back);
  back.querySelectorAll('[data-duo-toggle]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.duoToggle;
      const i = DATA.duoDenylist.indexOf(key);
      if(i>=0) DATA.duoDenylist.splice(i,1); else DATA.duoDenylist.push(key);
      saveData();
      back.remove();
      openDuoManagementModal(loggedShows);
      renderVibe();
    };
  });
  back.querySelector('#duoManageModalClose').onclick = ()=>{ back.remove(); renderVibe(); };
}

function renderAnchors(){
  const el = document.getElementById('anchorList');
  if(!el) return;
  el.innerHTML = DATA.anchors.map(a=>`
    <span class="anchor-tag">${escapeHtml(a.name)} <button data-anchor-del="${a.id}">✕</button></span>
  `).join('') || '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);">none yet</p>';
  el.querySelectorAll('[data-anchor-del]').forEach(btn=>{
    btn.onclick = ()=>{
      DATA.anchors = DATA.anchors.filter(a=>a.id!==btn.dataset.anchorDel);
      saveData();
      renderAnchors();
    };
  });
}

function runLocalVibeCheck(){
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);
  if(loggedShows.length===0){
    setVibeActiveTab('local');
    const host = document.getElementById('vibeResultHost');
    if(host) host.innerHTML = `<div class="ai-response">Log a few experiences first — there's nothing to read your taste off of yet.</div>`;
    return;
  }

  // ---- collaborator stats, same rule as the card above, recomputed here
  // so this function can stand alone ----
  const duoMap = getRecognizedDuos(loggedShows);
  const collabMap = {};
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const wstats = weightedExpStats(st.experiences);
    creditUnitsForShow(s.team, duoMap).forEach(unit=>{
      const key = unit.displayName;
      if(!collabMap[key]) collabMap[key] = {names:unit.names, ratingSum:0, ratingWeight:0, boughtIn:0, total:0, shows:new Set()};
      collabMap[key].ratingSum += wstats.ratingSum;
      collabMap[key].ratingWeight += wstats.ratingWeight;
      collabMap[key].boughtIn += wstats.boughtInWeight;
      collabMap[key].total += wstats.totalWeight;
      collabMap[key].shows.add(s.title);
    });
  });
  const collabStats = Object.entries(collabMap)
    .map(([name,v])=>{
      const avg = v.ratingWeight ? v.ratingSum/v.ratingWeight : null;
      const boughtInRate = v.total ? v.boughtIn/v.total : 0;
      return {
        name,
        names: v.names,
        avg,
        boughtInRate,
        boughtInCount: Math.round(v.boughtIn),
        totalCount: Math.round(v.total),
        confidence: wilsonLowerBound(v.boughtIn, v.total),
        showCount: v.shows.size,
        showTitles: [...v.shows],
      };
    })
    // need 2+ DIFFERENT shows AND a real bought-in rate ≥50%
    .filter(c=>c.showCount>=2 && c.boughtInRate>=0.5)
    .sort((a,b)=> b.confidence - a.confidence);

  // ---- stuck-at-fine, same rule as the flag card ----
  const stuckTitles = [];
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    const distinctCaps = new Set(rated.map(e=>e.capacity));
    if(rated.length>=2 && distinctCaps.size>=2){
      const ratings = rated.map(e=>e.rating);
      const max = Math.max(...ratings), min = Math.min(...ratings);
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      if(max-min<=1 && avg>=2.5 && avg<=3.5) stuckTitles.push(s.title);
    }
  });

  // ---- comeback shows, same rule as the stat card ----
  const comebackShows = getComebackShows(loggedShows);

  // ---- recommendations: unlogged shows sharing a top collaborator,
  // excluding anything already flagged don't-care ----
  const dontcareIds = new Set(Object.values(allShows()).filter(s=>getState(s.id).status==='dontcare').map(s=>s.id));
  // touchedIds intentionally does NOT count 'noopinion' as touched (2026-06-28
  // correction) — "no opinion" means zero knowledge/feeling about a show, not
  // a rejection of it, so it stays recommendable. Don't-care is the real
  // rejection signal; someday/scheduled stay excluded too (already a planned
  // or wanted show, a fresh rec there would be redundant, not wrong).
  const touchedIds = new Set(Object.values(allShows()).filter(s=>{
    const st = getState(s.id);
    return st.experiences.length>0 || (st.status && st.status!=='noopinion');
  }).map(s=>s.id));
  const recs = [];
  outer:
  for(const c of collabStats){
    // No boughtInRate<0.5 check needed here — collabStats itself is already gated to ≥50% above.
    for(const s of Object.values(allShows())){
      if(touchedIds.has(s.id) || dontcareIds.has(s.id)) continue;
      if(c.names.every(n=>s.team.includes(n))){
        recs.push({title:s.title, because:c.name, showId:s.id}); // local recs are always an existing show, never need the lazy-create path live recs sometimes do
        if(recs.length>=3) break outer;
      }
    }
  }

  // ---- write it up, Computer Friend voice: no flattery, cite specifics ----
  const lines = [];
  if(collabStats.length){
    const top = collabStats[0];
    const titles = top.showTitles.slice(0,3).join(', ') + (top.showTitles.length>3 ? ', …' : '');
    lines.push(`You buy into ${top.name} more than almost anyone else logged here — ${top.boughtInCount} of ${top.totalCount} experiences bought-in or better across ${top.showCount} show${top.showCount===1?'':'s'} (${titles}).`);
  } else {
    lines.push(`No repeat collaborator shows up enough yet to call a real pattern — most names here only have one logged credit. Give it more shows before trusting this card.`);
  }
  if(comebackShows.length){
    const topComeback = comebackShows[0];
    lines.push(`${topComeback.title} is a show you keep returning to and rating high every time (${topComeback.count} logged experiences, avg ${topComeback.avg.toFixed(1)}/5, none below a 4) — a real favorite the collaborator stat above can't catch if its creative team never wrote a second show you've logged.`);
  }
  if(stuckTitles.length){
    lines.push(`${stuckTitles.join(' and ')} ${stuckTitles.length===1?'is':'are'} sitting flat in the "fine" band across multiple formats. By the rule this app runs on, that's quiet dislike, not neutrality — it shouldn't keep getting credit for a so-so number.`);
  }
  if(recs.length){
    lines.push(`Worth a look, going strictly off your own data: ${recs.map(r=>`${r.title} (${r.because} again)`).join('; ')}.`);
  } else if(collabStats.length){
    lines.push(`Nothing left on the seed list shares a collaborator you're actually high on and haven't already logged or flagged — you've mined this list pretty thoroughly.`);
  }
  if(DATA.anchors.length){
    lines.push(`(You've also got ${DATA.anchors.map(a=>a.name).join(', ')} logged as non-theater anchors. This local version can only match by name on the seed list's own creative-team data — it can't reason across mediums the way a live model could. The connection's still there for you to draw yourself.)`);
  }

  const entry = { id:'vh'+Date.now(), ts:Date.now(), tier:'local', lines, recs };
  pushVibeHistory(entry);
  setVibeActiveTab('local');
  vibeResultCollapsed = false;
  renderVibeResultBox();
}

// Matches a title (from a live Computer Friend recommendation) against the
// SAME slug-based duplicate check the add-show modal and "find more shows"
// already use, so a rec that's secretly already a known show resolves to
// its real id instead of looking like something brand new.
function resolveShowIdByTitle(title){
  const slug = slugify(String(title));
  if(SEED_SHOWS[slug]) return SEED_SHOWS[slug].id;
  const customMatch = Object.values(DATA.customShows).find(cs=>slugify(cs.title)===slug);
  return customMatch ? customMatch.id : null;
}

// Saves one Quick Check / Computer Friend run into DATA.vibeHistory. Capped
// at the last 10 runs PER TIER (not 10 combined) — Quick Check is free and
// likely to get clicked far more often than the live tier, so a shared cap
// could otherwise let local runs quietly push the rare, real-money live
// results out of storage entirely.
function pushVibeHistory(entry){
  DATA.vibeHistory = DATA.vibeHistory || [];
  DATA.vibeHistory.push(entry);
  ['local','live'].forEach(tier=>{
    const idxs = DATA.vibeHistory.map((e,i)=>i).filter(i=>DATA.vibeHistory[i].tier===tier);
    if(idxs.length>10){
      const drop = new Set(idxs.slice(0, idxs.length-10));
      DATA.vibeHistory = DATA.vibeHistory.filter((_,i)=>!drop.has(i));
    }
  });
  saveData();
}

function getLatestVibeEntry(tier){
  const list = (DATA.vibeHistory||[]).filter(e=>e.tier===tier);
  return list.length ? list[list.length-1] : null;
}

// Switches which tier's saved result is on screen — free, no re-run, no API
// call. Separate on purpose from the two run buttons above it: re-running
// the live tier costs real money, so "let me just glance back at what I
// already have" can't share a control with "go get me a fresh answer."
function setVibeActiveTab(tier){
  vibeActiveTab = tier;
  document.querySelectorAll('.vibe-tab-pill').forEach(p=>{
    p.classList.toggle('active', p.dataset.vibeTab===tier);
  });
  renderVibeResultBox();
}

// One rec row, for either tier. Looks up the show's CURRENT status live
// rather than trusting whatever was true when the run was saved, so an old
// persisted run never shows a stale "Someday" button for a show you've
// since logged, don't-cared, or already rated someday from somewhere else.
// `rec.showId` is null only for a live-tier title that isn't anywhere in
// your data yet — nothing gets created for it until "Someday" is actually
// tapped (see renderVibeResultBox()'s click handler).
function vibeRecRowHtml(entry, rec, idx){
  const someKey = `${entry.id}|${idx}`;
  if(!rec.showId){
    return `<div class="flag-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
      <span><i>${escapeHtml(rec.title)}</i> <span style="color:var(--chalk-dim);font-size:11px;">(via ${escapeHtml(rec.because||'')} · not in your library yet)</span></span>
      <span style="display:inline-flex;gap:6px;">
        <button class="btn ghost-dark small" data-vibe-rec-log="${someKey}">Log it</button>
        <button class="btn ghost-dark small" data-vibe-rec-someday="${someKey}">Someday</button>
      </span>
    </div>`;
  }
  const show = getShow(rec.showId);
  if(!show){
    return `<div class="flag-row" style="opacity:.6;"><i>${escapeHtml(rec.title)}</i> — no longer in your data.</div>`;
  }
  const st = getState(rec.showId);
  let rightSide;
  if(st.experiences.length>0){
    rightSide = `<span style="color:var(--chalk-dim);font-size:11px;">already logged</span>`;
  } else if(st.status==='someday'){
    rightSide = `<span style="color:var(--chalk-dim);font-size:11px;">✓ someday</span>`;
  } else if(st.status==='dontcare'){
    rightSide = `<span style="color:var(--chalk-dim);font-size:11px;">marked don't-care</span>`;
  } else if(st.status==='scheduled'){
    rightSide = `<span style="color:var(--chalk-dim);font-size:11px;">on the calendar</span>`;
  } else {
    // Nothing logged, no status — the case that, before this fix, only ever
    // offered "Someday" plus a clickable title that's easy to miss as the
    // actual way in. "Log it" jumps straight into the experience form for a
    // show you've genuinely already seen, instead of two indirect taps
    // (title, then "I've experienced this") with no obvious signal either
    // step exists.
    rightSide = `<span style="display:inline-flex;gap:6px;">
      <button class="btn ghost-dark small" data-vibe-rec-log="${someKey}">Log it</button>
      <button class="btn ghost-dark small" data-vibe-rec-someday="${someKey}">Someday</button>
    </span>`;
  }
  return `<div class="flag-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
    <span><button class="collab-name-btn" data-vibe-rec-go="${rec.showId}">${escapeHtml(rec.title)}</button> <span style="color:var(--chalk-dim);font-size:11px;">(via ${escapeHtml(rec.because||'')})</span></span>
    ${rightSide}
  </div>`;
}

// Shared wiring for a rendered batch of rec rows (vibeRecRowHtml output) —
// used by both the main result box and the past-runs history modal, so
// "Log it"/"Someday" behave identically wherever a rec is shown. refreshFn
// is called after a "Someday" tap so whichever view is currently showing
// (the live result box, or a specific past-run detail screen) redraws
// itself; "Log it" always navigates away to the logging form, so it doesn't
// need a refresh callback at all.
function wireVibeRecButtons(container, refreshFn){
  container.querySelectorAll('[data-vibe-rec-go]').forEach(btn=>{
    btn.onclick = ()=> goToShowFromVibe(btn.dataset.vibeRecGo);
  });
  container.querySelectorAll('[data-vibe-rec-log]').forEach(btn=>{
    btn.onclick = ()=>{
      const [entryId, idxStr] = btn.dataset.vibeRecLog.split('|');
      const targetEntry = (DATA.vibeHistory||[]).find(e=>e.id===entryId);
      const rec = targetEntry && targetEntry.recs[Number(idxStr)];
      if(!rec) return;
      if(!rec.showId){
        // Same lazy-add Someday already used — a live-tier title with
        // nothing in your data yet only becomes a real custom show (tagged
        // ai-suggested) at the moment you actually act on it.
        rec.showId = addCustomShow({title:rec.title, year:rec.pendingYear||null, team:rec.pendingTeam||[], tags:['ai-suggested']});
        delete rec.pendingYear;
        delete rec.pendingTeam;
        saveData();
      }
      goToShowFromVibeToLog(rec.showId);
    };
  });
  container.querySelectorAll('[data-vibe-rec-someday]').forEach(btn=>{
    btn.onclick = ()=>{
      const [entryId, idxStr] = btn.dataset.vibeRecSomeday.split('|');
      const targetEntry = (DATA.vibeHistory||[]).find(e=>e.id===entryId);
      const rec = targetEntry && targetEntry.recs[Number(idxStr)];
      if(!rec) return;
      if(!rec.showId){
        // The lazy-add this was built for: a live-tier title with nothing in
        // your data yet only becomes a real custom show (tagged ai-suggested)
        // at the moment you actually act on it, not the instant it was named.
        rec.showId = addCustomShow({title:rec.title, year:rec.pendingYear||null, team:rec.pendingTeam||[], tags:['ai-suggested']});
        delete rec.pendingYear;
        delete rec.pendingTeam;
      }
      setStatus(rec.showId, 'someday'); // also saves DATA, including the rec.showId mutation just above
      refreshFn();
    };
  });
}

// Renders whichever tier vibeActiveTab points to into the single shared
// #vibeResultHost — called on tab-open (restoring the last saved run for
// the default tab), right after a fresh run, and on every tab-pill click
// (just a free switch, no re-run). Also handles the minimize toggle.
function renderVibeResultBox(){
  const host = document.getElementById('vibeResultHost');
  if(!host) return;
  const entry = getLatestVibeEntry(vibeActiveTab);
  if(!entry){
    host.innerHTML = `<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:10px;">${vibeActiveTab==='local' ? 'No Quick check run yet — tap the button above.' : 'No live Computer Friend run yet — tap the button above.'}</p>`;
    return;
  }
  const when = new Date(entry.ts).toLocaleString();
  const tierLabel = entry.tier==='live' ? 'Computer Friend (live)' : 'Quick check';
  host.innerHTML = `
    <div class="vibe-result-header" data-vibe-result-collapse>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);">${escapeHtml(tierLabel)} · last checked ${escapeHtml(when)}</span>
      <button class="vibe-result-collapse-btn">${vibeResultCollapsed?'▸ show':'▾ hide'}</button>
    </div>
    ${vibeResultCollapsed ? '' : `
      <div class="ai-response">${entry.lines.map(l=>escapeHtml(l)).join('</div><div class="ai-response" style="margin-top:8px;">')}</div>
      ${entry.recs && entry.recs.length ? `<div style="margin-top:10px;">${entry.recs.map((rec,idx)=>vibeRecRowHtml(entry,rec,idx)).join('')}</div>` : ''}
    `}
  `;
  host.querySelector('[data-vibe-result-collapse]').onclick = ()=>{
    vibeResultCollapsed = !vibeResultCollapsed;
    renderVibeResultBox();
  };
  if(vibeResultCollapsed) return;
  wireVibeRecButtons(host, renderVibeResultBox);
}

// Past-runs browser (2026-06-27). Vibe history already stores up to 10 runs
// per tier; this is just the missing window onto it — pick a run from a
// list, see its full text + recs (still actionable, same Log it/Someday
// buttons via the shared wireVibeRecButtons above), or go back to the list.
// Doesn't touch which run counts as "latest" anywhere — purely a read/act
// surface on top of data that already existed since build 27f.
function openVibeHistoryModal(){
  const tier = vibeActiveTab;
  const list = (DATA.vibeHistory||[]).filter(e=>e.tier===tier).slice().reverse();
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `
    <div class="modal" style="max-width:600px;">
      <h2 class="section-title" style="color:var(--ink)">Past ${tier==='live'?'Computer Friend (live)':'Quick check'} runs</h2>
      <p style="font-family:var(--font-mono);font-size:11px;color:#5a5550;margin-top:-6px;">${list.length} saved, newest first. Up to 10 are kept per tier — older ones roll off automatically.</p>
      <div id="vibeHistBody"></div>
      <div class="btnrow"><button class="btn small" id="vibeHistClose">Close</button></div>
    </div>
  `;
  document.body.appendChild(back);
  const bodyEl = back.querySelector('#vibeHistBody');

  function showList(){
    bodyEl.innerHTML = list.length ? list.map((entry,i)=>`
      <div class="lib-subitem lib-subitem-clickable" data-hist-idx="${i}">
        <b>${escapeHtml(new Date(entry.ts).toLocaleString())}</b>
        <div style="font-size:11px;color:var(--chalk-dim);margin-top:2px;">${escapeHtml((entry.lines[0]||'').slice(0,90))}${(entry.lines[0]||'').length>90?'…':''}</div>
      </div>
    `).join('') : '<p style="font-size:13px;color:#7a756d;">Nothing saved yet for this tier.</p>';
    bodyEl.querySelectorAll('[data-hist-idx]').forEach(item=>{
      item.onclick = ()=> showDetail(list[Number(item.dataset.histIdx)]);
    });
  }
  function showDetail(entry){
    bodyEl.innerHTML = `
      <button class="btn ghost-dark small" id="vibeHistBack" style="margin-bottom:8px;">← back to list</button>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);">${escapeHtml(new Date(entry.ts).toLocaleString())}</p>
      <div class="ai-response">${entry.lines.map(l=>escapeHtml(l)).join('</div><div class="ai-response" style="margin-top:8px;">')}</div>
      ${entry.recs && entry.recs.length ? `<div style="margin-top:10px;">${entry.recs.map((rec,idx)=>vibeRecRowHtml(entry,rec,idx)).join('')}</div>` : ''}
    `;
    bodyEl.querySelector('#vibeHistBack').onclick = showList;
    wireVibeRecButtons(bodyEl, ()=> showDetail(entry));
  }
  showList();
  back.querySelector('#vibeHistClose').onclick = ()=>{
    back.remove();
    renderVibeResultBox(); // in case acting on a rec in here changed something the main box should reflect
  };
}

async function runLiveComputerFriend(){
  const btn = document.getElementById('runLiveComputerFriend');
  if(!getApiKey()){ openApiKeyModal(); return; }
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);
  if(loggedShows.length===0){
    setVibeActiveTab('live');
    const emptyHost = document.getElementById('vibeResultHost');
    if(emptyHost) emptyHost.innerHTML = `<div class="ai-response">Log a few experiences first — there's nothing for Computer Friend to read yet.</div>`;
    return;
  }

  // same math as the local quick-check, just packaged up to hand to Claude
  // instead of being turned into hardcoded sentences here.
  const duoMap = getRecognizedDuos(loggedShows);
  const collabMap = {};
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const wstats = weightedExpStats(st.experiences);
    creditUnitsForShow(s.team, duoMap).forEach(unit=>{
      const key = unit.displayName;
      if(!collabMap[key]) collabMap[key] = {names:unit.names, ratingSum:0, ratingWeight:0, boughtIn:0, total:0, shows:new Set()};
      collabMap[key].ratingSum += wstats.ratingSum;
      collabMap[key].ratingWeight += wstats.ratingWeight;
      collabMap[key].boughtIn += wstats.boughtInWeight;
      collabMap[key].total += wstats.totalWeight;
      collabMap[key].shows.add(s.title);
    });
  });
  const collabStats = Object.entries(collabMap)
    .map(([name,v])=>{
      const avg = v.ratingWeight ? +(v.ratingSum/v.ratingWeight).toFixed(2) : null;
      const boughtInRate = v.total ? +(v.boughtIn/v.total).toFixed(2) : 0;
      return {
        name,
        names: v.names,
        avg,
        boughtInRate,
        boughtInCount: Math.round(v.boughtIn),
        totalCount: Math.round(v.total),
        confidence: wilsonLowerBound(v.boughtIn, v.total),
        showCount: v.shows.size,
        showTitles: [...v.shows],
      };
    })
    // need 2+ DIFFERENT shows AND a real bought-in rate ≥50%
    .filter(c=>c.showCount>=2 && c.boughtInRate>=0.5)
    .sort((a,b)=> b.confidence - a.confidence);

  const stuckTitles = [];
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    const distinctCaps = new Set(rated.map(e=>e.capacity));
    if(rated.length>=2 && distinctCaps.size>=2){
      const ratings = rated.map(e=>e.rating);
      const max = Math.max(...ratings), min = Math.min(...ratings);
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      if(max-min<=1 && avg>=2.5 && avg<=3.5) stuckTitles.push(s.title);
    }
  });

  const comebackShows = getComebackShows(loggedShows);

  // The actual root-cause fix: previously this function only ever sent
  // aggregate per-collaborator percentages and bare show titles — nothing
  // granular enough to answer a question like "which show got the stronger
  // reaction, X or Y." The model would reach for that specificity anyway and
  // fabricate it. This gives it the real number for every logged experience,
  // so any claim it makes can be checked against data that's actually there.
  const showBreakdown = loggedShows.map(s=>{
    const st = getState(s.id);
    const expLines = st.experiences.map(e=>{
      const capLabel = (CAPACITIES.find(c=>c.key===e.capacity)||{}).label || e.capacity;
      const verdictLabel = (VERDICTS.find(v=>v.key===e.verdict)||{}).label || (e.verdict || 'no verdict given');
      const ratingText = (e.rating!==null && e.rating!==undefined) ? `${e.rating}/5` : 'no rating given';
      const performedTag = e.performedIn ? ', performed in this one' : '';
      const repeatTag = (e.capacity==='live' && e.repeatLive) ? ', seen live more than once' : '';
      return `${capLabel}: ${ratingText}, ${verdictLabel}${performedTag}${repeatTag}`;
    });
    return `${s.title} — ${expLines.join('; ')}`;
  });

  const dontcareEntries = Object.values(allShows()).filter(s=>getState(s.id).status==='dontcare').map(s=>{
    const reason = getState(s.id).dontcareReason;
    return reason ? `${s.title} (reason: ${reason})` : s.title;
  });
  // CORRECTION (2026-06-28): the 2026-06-27 "bug fix" below had the intent
  // backwards. No-opinion means zero knowledge/feeling about a show, not a
  // rejection of it — it should stay recommendable, the same way it's a show
  // a fresh recommendation engine would have no reason to avoid. Don't-care
  // (an actual, sometimes-reasoned rejection) is the real "never recommend"
  // signal and is unaffected by this correction.
  const loggedTitles = loggedShows.map(s=>s.title);
  const anchors = DATA.anchors.map(a=>a.name);

  const system = `You are "Computer Friend," a blunt, no-flattery analysis voice inside a personal musical-theater tracking app called The Underscore. You read the user's own logged taste data — provided below — and tell them what it actually says, citing specific shows, collaborators, and numbers by name.
Rules:
- No flattery, no hedging filler. Lead with the finding.
- A full per-show breakdown — title, format, rating, verdict — is provided below for every logged experience. You may ONLY cite a specific rating or verdict if it appears literally in that breakdown. Never infer, estimate, or guess a number for any show — including ones also mentioned elsewhere in this data, like a collaborator credit or a flag — those summaries are derived from the same breakdown and aren't a substitute for checking it directly. If you want to compare two shows, look up both in the breakdown before claiming which got the stronger reaction.
- Treat a show sitting in the "fine" (3/5) band across two or more different formats as a real signal of quiet dislike, not neutrality — name it directly if one is given to you.
- Treat a show logged 3+ times with nothing rated below a 4 as a real, strong favorite in its own right — even if its creative team doesn't otherwise appear among the top collaborators. A one- or two-show creative team can legitimately never clear the collaborator-level bar, so don't undersell this signal just because it's tied to a single title.
- The collaborator list below is already filtered to people with a real, qualifying track record and ranked by how well-supported that track record is, not just by raw percentage — a name with fewer logged shows needed a cleaner record to make this list at all. Cite the literal counts and percentage given, don't second-guess or re-derive them.
- A Live experience marked "seen live more than once" in the breakdown below counts as 2 toward the collaborator and comeback-show totals, not 1 — that's intentional weighting, not a discrepancy to flag if the totals don't match a literal count of breakdown lines.
- Never recommend anything on the "don't care" list provided below.
- Where a don't-care entry includes a stated reason, use it to reason about whether a new recommendation risks the same objection (e.g. premise-level, creator-level, genre-level) — but the reason is never grounds to recommend the don't-care show itself.
- Never recommend anything on the "already logged" list provided below.
- You MAY and SHOULD recommend musicals beyond anything mentioned in the data, drawing on your own general knowledge — that's the whole point of this live version versus a static lookup. Specifically look for genuine cross-medium connections to the "non-theater anchors" listed below (a TV writer, a band, etc. that explains taste better than a genre tag would) — real reasoning about why, not a coincidence of shared words.
- Musicals only — never recommend a straight play.
- Keep your "reply" text under 200 words, plain prose, no headers or bullet lists.
- Your FINAL output must be ONLY a JSON object — no preamble, no markdown code fences, no explanation before or after, no draft attempt, no self-correction, no "let me redo this" — think it through silently and output the finished JSON object exactly once. Exactly this shape:
{"reply": "your full plain-prose answer, as described above", "recommendations": [{"title": "Show Title", "year": year_as_number_or_null, "team": ["Composer","Lyricist"], "because": "a few-word reason, e.g. a collaborator name or anchor connection"}]}
List 1-3 entries in "recommendations" — the same shows you're recommending in "reply," not additional ones not mentioned there. If you have nothing to recommend, use an empty array.`;

  const userText = `Full per-show breakdown — the ONLY source you may cite a specific rating or verdict from:
${showBreakdown.join('\n')}

Collaborators with 2+ different shows logged AND a ≥50% bought-in rate, ranked by how well-supported that track record is:
${collabStats.length ? collabStats.map(c=>`- ${c.name}: ${c.boughtInCount} of ${c.totalCount} experiences bought-in or better, avg rating ${c.avg ?? 'n/a'}, across ${c.showCount} show(s): ${c.showTitles.join(', ')}`).join('\n') : '(none yet — no repeat collaborators logged)'}

Shows logged 3+ times with nothing rated below a 4 — a real personal favorite even when its creative team never wrote a second show worth flagging above: ${comebackShows.length ? comebackShows.map(c=>`${c.title} (avg ${c.avg.toFixed(2)}, ${c.count} experiences)`).join(', ') : '(none yet)'}

Shows stuck in the "fine" band across 2+ formats: ${stuckTitles.length ? stuckTitles.join(', ') : '(none)'}

Already logged, do not recommend: ${loggedTitles.join(', ') || '(none)'}

Don't-care list, never recommend: ${dontcareEntries.join(', ') || '(none)'}

Non-theater anchors, use for cross-medium reasoning if relevant: ${anchors.join(', ') || '(none logged)'}

What does this data say about my taste, and what should I check out next?`;

  if(btn){ btn.disabled = true; btn.textContent = 'thinking...'; }
  try{
    const raw = await callClaudeAPI({system, userText, useWebSearch:false});
    const parsed = extractJsonValue(raw, '{', '}', p => p && typeof p.reply === 'string');

    let lines, recs;
    if(parsed){
      lines = [parsed.reply.trim()];
      const rawRecs = Array.isArray(parsed.recommendations) ? parsed.recommendations : [];
      recs = rawRecs.filter(r=>r && r.title).slice(0,3).map(r=>{
        const title = String(r.title);
        const existingId = resolveShowIdByTitle(title);
        if(existingId){
          return { title, because: r.because || '', showId: existingId };
        }
        // Not auto-added here — only created later, lazily, if "Someday" is
        // actually tapped on this specific rec (see renderVibeResultBox()).
        return {
          title, because: r.because || '', showId: null,
          pendingYear: (typeof r.year==='number') ? r.year : (r.year ? (Number(r.year)||null) : null),
          pendingTeam: Array.isArray(r.team) ? r.team : [],
        };
      });
    } else {
      // Claude answered, but not in the expected JSON shape — show the raw
      // reply rather than losing it, just without clickable recs this time.
      lines = [raw.trim()];
      recs = [];
    }

    const entry = { id:'vh'+Date.now(), ts:Date.now(), tier:'live', lines, recs };
    pushVibeHistory(entry);
    setVibeActiveTab('live');
    vibeResultCollapsed = false;
    renderVibeResultBox();
  }catch(err){
    if(err.message !== 'no-key'){
      setVibeActiveTab('live');
      const errHost = document.getElementById('vibeResultHost');
      if(errHost) errHost.innerHTML = `<div class="ai-response">Something went wrong: ${escapeHtml(err.message)}</div>`;
    }
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'Ask Computer Friend (live)'; }
  }
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'the-underscore-backup.json';
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('apiKeyBtn').onclick = ()=> openApiKeyModal();
document.getElementById('importFile').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!confirm('This will replace your current ledger data with the imported file. Continue?')) return;
      DATA = Object.assign({overrides:{}, customShows:{}, anchors:[], vibeHistory:[], duoDenylist:[]}, parsed);
      saveData();
      currentReviewId = null;
      renderReview();
      renderLibrary();
      renderVibe();
      alert('Imported.');
    }catch(err){
      alert('That file did not parse as valid ledger JSON.');
    }
  };
  reader.readAsText(file);
};

/* ============================================================
   UTIL + INIT
   ============================================================ */
function escapeHtml(str){
  if(str===null || str===undefined) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

(async function init(){
  document.getElementById('tab-review').innerHTML = `<div class="empty"><p>loading the ledger...</p></div>`;
  checkStorageHealth();
  await loadData();
  renderReview();
})();
</script>
