<style>
  /* Single fixed palette — Bright Turquoise & Gold. (WARM/dark mode and the
     toggle were removed by request; colors still route through these CSS
     custom properties rather than being hardcoded in rules, in case a second
     palette is ever wanted again.)
     2026-06-27: --chalk and --chalk-dim were darkened well past --ink for
     real contrast against the teal --stage/--panel backgrounds (chalk-dim
     used to be LIGHTER than chalk, which is why it was nearly invisible —
     "dim" was being read as "lower contrast" instead of "less saturated/
     less prominent but still legible"). --ink, --amber, and --amber-dim are
     untouched — ink already had huge headroom on the cream --paper
     background, and the gold accent was working as intended.
     2026-06-27 (later): marquee h1 sized up and given a crisp no-blur
     depth shadow alongside the existing soft glow — see --title-glow's
     comment at its declaration for why blur radius itself was left
     alone. */
  :root{
    --stage:#1E9E99;
    --panel:#178F8A;
    --panel-line:#0F6E69;
    --paper:#FFF6DC;
    --paper-line:#F0DCA0;
    --amber:#FFC93D;
    --amber-dim:#E0A92E;
    --curtain:#C2613D;
    --pink:#FF4FA0;
    --ink:#0A3F3C;
    --chalk:#04211F;
    --chalk-dim:#082E2B;
    /* Wrapped-tab chart accents only — not part of the core UI palette lock,
       not used anywhere outside the Wrapped tab's charts. */
    --chart-sky:#6E9BC7;
    --chart-sage:#93A876;
    /* Blur radius (6px) is the parameter that caused the old "jumbled,
       illegible" glow — it's what fills in the gaps between letters on a
       bold condensed face. Left untouched on purpose; only opacity moved. */
    --title-glow:0 0 6px rgba(255,201,61,0.42);
    --font-display:Impact, Haettenschweiler, 'Anton', 'Arial Narrow Bold', sans-serif;
    --font-body:'Source Serif 4', Georgia, serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--stage);
    color:var(--chalk);
    font-family:var(--font-body);
    line-height:1.5;
  }
  ::selection{ background:var(--amber); color:var(--ink); }

  /* ---------- marquee header ---------- */
  .marquee{
    background:var(--panel);
    border-bottom:3px solid var(--amber-dim);
    padding:22px 20px 16px;
    text-align:center;
    position:relative;
  }
  .marquee h1{
    font-family:var(--font-display);
    font-size:clamp(32px,7.5vw,54px);
    letter-spacing:3px;
    margin:0;
    color:var(--amber);
    text-shadow:1px 2px 0 var(--panel-line), var(--title-glow);
    text-transform:uppercase;
  }
  .marquee .sub{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin-top:6px;
  }
  .bottom-actions{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:30;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    background:var(--panel);
    border-top:1px solid var(--panel-line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  }
  .bottom-actions-group{ display:flex; gap:8px; }
  .bottom-actions button{
    background:none;
    border:1px solid var(--panel-line);
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1px;
    padding:8px 14px;
    border-radius:4px;
    cursor:pointer;
  }
  .bottom-actions button:hover{ border-color:var(--amber); color:var(--amber); }

  /* ---------- nav ---------- */
  nav{
    display:flex;
    justify-content:center;
    background:var(--panel);
    border-bottom:1px solid var(--panel-line);
    position:sticky; top:0; z-index:20;
  }
  nav button{
    background:none; border:none;
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:13px 18px;
    cursor:pointer;
    border-bottom:3px solid transparent;
  }
  nav button.active{
    color:var(--amber);
    border-bottom-color:var(--amber);
  }
  @media (max-width:420px){
    nav{
      justify-content:space-between;
      padding:0 16px;
    }
    nav button{
      padding:13px 6px;
      font-size:12px;
      letter-spacing:1.2px;
    }
  }

  /* ---------- wrapped (build 2026-07-09d): paired stat tiles + chart
     placeholders, in the Layout B order Cameron picked — a stat pair sits
     right above the chart it explains rather than all 8 tiles bunched at
     the top. Charts themselves aren't built yet; this is structure only. */
  .wrapped-pair{
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
    margin:22px 0 8px;
  }
  .wrapped-pair:first-child{ margin-top:0; }
  .wrapped-tile{
    background:var(--paper); border:1px solid var(--paper-line);
    border-radius:6px; padding:10px 12px; text-align:center;
  }
  .wrapped-tile .num{
    font-family:var(--font-mono); font-size:18px; font-weight:700;
    color:var(--ink); display:block;
  }
  /* Some stat tiles show a show title + year rather than a bare count
     (oldest/newest show, etc, build 2026-07-09g) — same tile, smaller/
     tighter text so a long title doesn't dwarf the neighboring number
     tiles or wrap awkwardly. */
  .wrapped-tile .num.text{
    font-size:13px; line-height:1.3; font-weight:600;
  }
  .wrapped-tile .label{
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.5px;
    text-transform:uppercase; color:var(--chalk-dim); display:block; margin-top:2px;
  }
  .wrapped-chart-placeholder{
    border:1px dashed var(--panel-line); border-radius:8px;
    padding:32px 12px; text-align:center;
    font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim);
    margin-bottom:6px;
  }
  /* Format Footprint donut (build 2026-07-09e): a plain CSS conic-gradient
     ring, no chart library. Card wrapper matches .wrapped-tile's paper/
     border convention so it reads as part of the same page, not a foreign
     element. */
  .wf-card{
    background:var(--paper); border:1px solid var(--paper-line);
    border-radius:8px; padding:16px 12px; margin-bottom:6px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .wf-donut-outer{
    width:140px; height:140px; border-radius:50%;
    position:relative;
  }
  .wf-donut-hole{
    position:absolute; top:22px; left:22px; width:96px; height:96px;
    border-radius:50%; background:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim);
    text-align:center; line-height:1.3;
  }
  .wf-legend{
    display:flex; flex-wrap:wrap; justify-content:center; gap:10px 16px;
    width:100%;
  }
  .wf-legend-item{
    display:flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:11px; color:var(--ink);
  }
  .wf-legend-swatch{
    width:10px; height:10px; border-radius:2px; flex-shrink:0;
  }
  /* Venue Footprint 100%-stacked bar (build 2026-07-09f): a single full-
     width bar split into 6 proportional segments, legend below. First
     chart to use the new --chart-sky/--chart-sage accents, since 6
     categories exceeds what the 4 non-reserved core colors can cover
     without repeats. */
  .vf-card{
    background:var(--paper); border:1px solid var(--paper-line);
    border-radius:8px; padding:16px 12px; margin-bottom:6px;
  }
  .vf-bar{
    display:flex; width:100%; height:22px; border-radius:5px;
    overflow:hidden; margin-bottom:14px;
  }
  .vf-bar-seg{ height:100%; }
  .vf-legend{
    display:flex; flex-wrap:wrap; justify-content:center; gap:8px 14px;
  }
  .vf-legend-item{
    display:flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:11px; color:var(--ink);
  }
  .vf-legend-swatch{
    width:10px; height:10px; border-radius:2px; flex-shrink:0;
  }
  /* Decades Wheel waffle grid (build 2026-07-09h): one row per decade, one
     small square per qualifying UNIQUE show (not per experience). Single
     hue (sage) ramped light-to-dark across the 11 decades, since it's one
     continuous timeline rather than separate categories. */
  .dw-card{
    background:var(--paper); border:1px solid var(--paper-line);
    border-radius:8px; padding:16px 12px; margin-bottom:6px;
  }
  .dw-row{
    display:flex; align-items:center; gap:8px; margin-bottom:6px;
  }
  .dw-row:last-child{ margin-bottom:0; }
  .dw-row-label{
    font-family:var(--font-mono); font-size:10px; color:var(--chalk-dim);
    width:38px; flex-shrink:0; text-align:right;
  }
  .dw-row-squares{
    display:flex; flex-wrap:wrap; gap:3px; flex:1;
  }
  .dw-sq{
    width:10px; height:10px; border-radius:2px; flex-shrink:0;
  }
  .dw-row-empty{
    font-family:var(--font-mono); font-size:10px; color:var(--paper-line);
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:24px 16px 120px;
  }
  .tab{ display:none; }
  .tab.active{ display:block; animation:fadein .25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  h2.section-title{
    font-family:var(--font-mono);
    font-weight:700;
    color:var(--chalk);
    letter-spacing:2px;
    font-size:16px;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .section-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    margin:0 0 18px;
  }

  /* ---------- ticket stub card (signature element) ---------- */
  .ticket{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    position:relative;
    padding:18px 20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.35);
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:18px; height:18px;
    background:var(--stage);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-9px; }
  .ticket::after{ right:-9px; }
  .ticket .perf{
    border-top:2px dashed var(--paper-line);
    margin:14px 0;
  }
  .ticket .show-title{
    font-family:var(--font-display);
    font-size:24px;
    letter-spacing:.5px;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .ticket .credits{
    font-family:var(--font-mono);
    font-size:11px;
    color:#5a5550;
    letter-spacing:.3px;
  }
  .ticket .tags{ margin-top:6px; }
  .ticket .premise, .modal .premise{
    font-family:var(--font-mono);
    font-size:11px;
    font-style:italic;
    color:#7a756d;
    line-height:1.45;
    margin-top:8px;
  }
  .tag-pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.5px;
    background:rgba(0,0,0,0.06);
    border-radius:10px;
    padding:2px 8px;
    margin:0 4px 4px 0;
    color:#5a5550;
  }

  /* ---------- buttons / chips ---------- */
  .btnrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .btn{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.5px;
    padding:9px 14px;
    border-radius:5px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
  }
  .btn:hover{ border-color:var(--ink); }
  .btn.primary{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .btn.amber{ background:var(--amber); color:var(--ink); border-color:var(--amber); font-weight:700; }
  .btn.ghost-dark{
    background:transparent; color:var(--chalk); border:1px solid var(--panel-line);
  }
  .btn.ghost-dark:hover{ border-color:var(--amber); color:var(--amber); }
  .btn.danger{ color:var(--curtain); border-color:var(--curtain); background:#fff; }
  .btn.small{ padding:5px 10px; font-size:11px; }
  .btn:disabled{ opacity:.4; cursor:default; }

  .chip{
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 11px;
    border-radius:14px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    display:inline-block;
  }
  .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .verdict-chip[data-v="allIn"].on{ background:var(--pink); border-color:var(--pink); color:#fff; }

  /* ---------- form elements ---------- */
  .field{ margin:14px 0; }
  .field label{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:#5a5550;
    margin-bottom:6px;
  }
  .field input[type=text], .field input[type=date], .field textarea, .field select{
    width:100%;
    font-family:var(--font-body);
    font-size:16px;
    padding:9px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:64px; }
  .capacity-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .capacity-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .capacity-grid .cap-chip{ display:flex; align-items:center; justify-content:center; text-align:center; border-radius:8px; padding:16px 10px; min-height:60px; }
  .rating-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .rate-btn{
    font-family:var(--font-mono);
    font-size:11px;
    padding:7px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    cursor:pointer;
  }
  .rate-btn.on{ background:var(--amber); border-color:var(--amber); font-weight:700; }
  .rate-hint{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:4px; }

  /* ---------- logged experience entries ---------- */
  .exp-entry{
    background:rgba(0,0,0,0.04);
    border-left:3px solid var(--amber);
    border-radius:4px;
    padding:10px 12px;
    margin-top:10px;
  }
  .exp-entry.verdict-didntBuy{ border-left-color:var(--curtain); }
  .exp-entry.verdict-allIn{ border-left-color:var(--pink); box-shadow:0 0 0 1px rgba(255,79,160,0.18), 0 0 14px rgba(255,79,160,0.22); }
  .exp-entry-head{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.5px;
  }
  .exp-entry-head .cap{ text-transform:uppercase; font-weight:700; }
  .exp-entry .blurb{ font-family:var(--font-body); font-size:14px; margin:6px 0 0; font-style:italic; }
  .exp-entry .meta{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:6px; }
  .exp-entry-actions{ margin-top:8px; display:flex; gap:8px; }

  /* Library detail popup (build 2026-07-06j): every section below the
     credits line — tags, calendar row, on-loop row, experience list,
     Computer Friend row — gets the same top gap, and collapses to zero when
     it renders nothing (no tags, no experiences yet). This replaces a set of
     ad hoc inline margin-bottom values (6px on tags, 8px on
     calendar/loop/cf, 0 on the experience list itself) that didn't match
     each other or .exp-entry's own 10px margin-top, which is why the
     Computer Friend button used to sit flush against the last experience
     card with no gap at all. */
  .ld-section{ margin-top:10px; }
  .ld-section:empty{ margin-top:0; }

  /* ---------- library list ---------- */
  .lib-controls{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  /* A-Z jump bar (build 2026-06-30c): sticky directly under nav so it stays
     reachable while scrolling a 100+ show grid. `top` and the matching
     --lib-scroll-offset custom property are both set live in JS from nav's
     actual measured height, not hardcoded, so this keeps working if nav's
     own height ever changes (bigger system font, a future padding tweak)
     instead of silently drifting out of alignment. flex-wrap (not
     overflow-x scroll) handles narrow phones — wraps to a second row rather
     than requiring a horizontal swipe on top of a sticky element. */
  .lib-jump-bar{
    position:sticky;
    top:0;
    z-index:19;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:6px;
    background:var(--panel);
    padding:8px 0;
    margin-bottom:10px;
    border-bottom:1px solid var(--panel-line);
  }
  .lib-jump-btn{
    flex:0 0 auto;
    background:none;
    border:1px solid var(--panel-line);
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.5px;
    padding:6px 11px;
    border-radius:4px;
    cursor:pointer;
  }
  .lib-jump-btn:hover{ border-color:var(--amber); color:var(--amber); }
  .lib-jump-btn.disabled{ opacity:.35; cursor:default; }
  #libList{ display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-bottom:6px; }
  .lib-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:12px 14px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:4px;
    position:relative;
    /* offset for the sticky nav+jump-bar pair, so a jumped-to card lands
       fully visible instead of partway hidden underneath them — value is
       set live in JS (renderLibJumpBar), this is just a sane fallback. */
    scroll-margin-top:var(--lib-scroll-offset, 90px);
  }
  .lib-card:hover{ border-color:var(--amber-dim); }
  .lib-card .title{ font-family:var(--font-display); font-size:16px; letter-spacing:.3px; text-transform:uppercase; line-height:1.15; }
  .lib-card .credits{ font-family:var(--font-mono); font-size:11px; color:var(--chalk); margin-top:0; }
  /* margin-top:auto (not a fixed value) deliberately — #libList is a CSS
     grid, which already stretches every card in a row to match the tallest
     one by default, so each .lib-card (a flex column) has real leftover
     space to give away. Putting that leftover space here, on the LAST child,
     pins the icon row to the bottom of every card uniformly, regardless of
     how many lines the title/credits text above it wrapped to. */
  .cap-icons{ font-size:15px; letter-spacing:2px; white-space:nowrap; margin-top:auto; }
  /* Shared bottom-right corner cluster (build 2026-07-01f) — holds the
     "performed in it" P badge and/or the "on loop" badge as flex row
     children instead of each being independently position:absolute and
     competing for the same corner. DOM order controls left-to-right order:
     P first, loop badge second, so P always reads to the left of the loop
     badge when both are present, per spec. */
  .lib-corner-badges{
    position:absolute;
    bottom:10px;
    right:10px;
    display:flex;
    align-items:center;
    gap:4px;
  }
  /* "Performed in it" badge (brought back 2026-06-28, plain-letter instead of
     the old 🎭 emoji it replaces — the no-decorative-emoji rule is locked,
     this is a plain mark in the same spirit as ✕/▾/▸/★/✓/⚠/←). Deliberately
     apart from .cap-icons (which stays left-aligned) rather than joining that
     row, per Cameron's request that it read as a separate fact about the
     show, not a fifth capacity icon. */
  .performed-badge{
    width:16px;
    height:16px;
    border-radius:50%;
    border:1px solid var(--panel-line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-mono);
    font-size:9px;
    font-weight:700;
    color:var(--chalk-dim);
    background:var(--stage);
  }
  /* "On Loop" badge (build 2026-07-01f) — the one deliberate, explicit
     exception to the app's no-decorative-emoji rule, scoped ONLY to this
     badge (Cameron's call: it appears on at most 3 shows at a time, and is
     meant to read as a quick visual, not a label). A pill rather than a
     circle since "🔁×N" needs more width than a single letter. Two states:
     .active (currently on loop right now) gets a filled background and full-
     brightness text/border; without .active (history only — looped before,
     not right now) gets the same muted treatment the P badge already uses.
     Never uses amber — amber is reserved for show titles throughout the app. */
  .loop-badge{
    height:16px;
    padding:0 6px;
    border-radius:8px;
    border:1px solid var(--panel-line);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-mono);
    font-size:9px;
    font-weight:700;
    color:var(--chalk-dim);
    background:var(--stage);
    white-space:nowrap;
  }
  .loop-badge.active{
    color:var(--chalk);
    border-color:var(--chalk-dim);
    background:var(--panel-line);
  }

  /* ---------- library subsections: someday / scheduled / don't-care ---------- */
  .lib-section-divider{ height:1px; background:var(--panel-line); margin:24px 0 14px; }
  .lib-subsection{ margin-bottom:4px; }
  .lib-subsection-header{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--chalk-dim); padding:10px 4px; cursor:pointer; border-bottom:1px solid var(--panel-line);
  }
  .lib-subsection-header:hover{ color:var(--amber); }
  .lib-subsection-body{ padding:8px 4px 6px; }
  .lib-subitem{ font-family:var(--font-body); font-size:13px; padding:5px 0; color:var(--chalk); }
  .lib-subitem .sub-extra{ font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim); }
  .lib-subitem-clickable{ cursor:pointer; }
  .lib-subitem-clickable:hover{ color:var(--amber); }

  /* ---------- empty states ---------- */
  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--chalk-dim);
  }
  .empty p{ font-family:var(--font-mono); font-size:12px; letter-spacing:.5px; max-width:360px; margin:0 auto; }

  /* ---------- storage health banner ---------- */
  .storage-warning{
    background:var(--curtain);
    color:#fff;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.3px;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    text-align:center;
  }
  .storage-warning button{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:#fff;
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 9px;
    border-radius:3px;
    cursor:pointer;
  }

  /* ---------- due-scheduled banner (Review) ---------- */
  .due-banner{
    background:var(--paper); color:var(--ink);
    border:1px solid var(--amber-dim);
    border-radius:6px;
    padding:6px 14px;
    margin-bottom:18px;
  }
  .due-banner-row{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    flex-wrap:wrap;
    font-family:var(--font-body); font-size:13px;
    padding:8px 0;
    border-bottom:1px dashed var(--paper-line);
  }
  .due-banner-row:last-child{ border-bottom:none; }

  /* ---------- vibe check ---------- */
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:16px;
    margin-bottom:14px;
  }
  .stat-card h3{
    font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--amber); margin:0 0 10px;
  }
  .collab-row{ display:flex; flex-direction:column; gap:2px; font-family:var(--font-mono); font-size:12px; padding:4px 0; border-bottom:1px solid var(--panel-line); }
  .collab-row > span:last-child{ text-align:right; }
  .collab-row:last-child{ border-bottom:none; }
  .collab-name-btn{ background:none; border:none; padding:0; margin:0; font:inherit; color:var(--paper); text-decoration:underline; text-decoration-color:var(--panel-line); cursor:pointer; }
  .collab-name-btn:hover{ color:var(--amber); text-decoration-color:var(--amber); }
  .collab-row b{ color:var(--amber); }
  /* Inline duo-split control (2026-06-30, replaces the "review detected
     pairs" modal entirely): a quiet, low-contrast link that only appears
     next to a name that's CURRENTLY shown merged — on the card row and in
     the audit popup — instead of a separate screen listing every pair
     whether or not anything's wrong with it. */
  .duo-split-btn{ background:none; border:none; padding:0; margin-left:6px; font-family:var(--font-mono); font-size:10px; color:var(--chalk-dim); text-decoration:underline; text-decoration-color:var(--panel-line); cursor:pointer; }
  .duo-split-btn:hover{ color:var(--curtain); text-decoration-color:var(--curtain); }
  .flag-row{ font-family:var(--font-body); font-size:13px; padding:6px 0; }
  .flag-row b{ color:var(--amber); }

  /* ---------- vibe check: collapsible card bodies (title+description always
     visible, the actual list tucked behind a tap, default collapsed) ---------- */
  .stat-card-header{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; margin-bottom:10px; }
  .stat-card-header h3{ margin:0; }
  .stat-card-toggle{ font-family:var(--font-mono); font-size:11px; color:var(--chalk-dim); white-space:nowrap; }
  .stat-card-header:hover .stat-card-toggle{ color:var(--amber); }

  /* ---------- vibe check: free tab-switch between Quick check / Computer
     Friend (live) results, separate from the run buttons above them ---------- */
  .vibe-tab-row{ display:flex; gap:8px; margin-top:12px; }
  .vibe-tab-pill{
    background:none; border:1px solid var(--panel-line); border-radius:14px;
    color:var(--chalk-dim); font-family:var(--font-mono); font-size:11px;

function slugify(s){

}

});

  "caroline-or-change": "In 1960s Louisiana, a Black maid working in the basement laundry room of a Jewish family navigates dignity, resentment, and a fraught bond with the family's young son against the backdrop of the civil rights movement.",
  "taboo": "Set in the flamboyant London club scene of the early 1980s, the show interweaves the rise of pop star Boy George with the story of his friend, the outrageous performance artist and designer Leigh Bowery.",
  "all-shook-up": "In a buttoned-up 1950s Midwestern town, a leather-jacketed, guitar-toting drifter loosely modeled on Elvis Presley rolls through and, through a tangle of mistaken identities, loosens up the whole community's ideas about love.",
  "dirty-rotten-scoundrels": "Two rival con men working the French Riviera — one suave and one crude — team up, then compete, to see who can swindle a wealthy American heiress out of her fortune first.",
  "jersey-boys": "The show traces the rise of Frankie Valli and the Four Seasons from the streets of working-class New Jersey to pop stardom, and the friction, mob ties, and fallout that came with fame.",
  "little-women": "The four March sisters growing up in Civil War-era Massachusetts pursue their own paths — writing, marriage, art, and family — while their eldest, aspiring author Jo, resists the expectations placed on women of her time.",
  "spamalot": "Loosely spoofing the legend of King Arthur and his Knights of the Round Table, the show follows their absurd quest for the Holy Grail, poking fun at Broadway musical conventions along the way.",
  "the-25th-annual-putnam-county-spelling-bee": "Six quirky middle schoolers compete in a small-town spelling bee overseen by a comedically mismatched panel of adult moderators, with audience volunteers occasionally pulled up to compete alongside them.",
  "the-color-purple": "Across several decades in the early 20th-century American South, a poor Black woman endures abuse and separation from her sister and children before finding her own voice, resilience, and love.",
  "the-light-in-the-piazza": "An American mother traveling in 1950s Florence with her intellectually disabled adult daughter watches a whirlwind romance blossom between her daughter and a young Italian man, and must decide how much of the truth to reveal.",
  // Batch 8 (build 2026-07-02g): 2016-2025, chronological — closes coverage to 397/397
  // Batch 7 (build 2026-07-02f): 2006-2015, chronological — continuing
  // straight through the seed list the same way batches 1-6 did, no
  // filtering by decided/undecided status, just working forward by year.
  "grey-gardens": "A wealthy East Hampton mother and daughter's 1941 engagement party, in which the daughter's society marriage collapses under her mother's shadow, gives way three decades later to the same two women living together in genteel squalor in their decaying family mansion.",
  "high-fidelity": "A record-store owner in his thirties, obsessed with making top-five lists out of every aspect of his life, is dumped by his girlfriend and sets out to track down his most memorable past breakups in search of what keeps going wrong.",
  "lestat": "A young 18th-century Frenchman is turned into a vampire against his will and spends decades wrestling with his own bloodlust, his complicated devotion to the mother and companions he transforms alongside him, and his search for meaning as an immortal outsider.",
  "spring-awakening": "In a repressive 19th-century German town, a group of teenagers grapple with the sexual awakening, curiosity, and confusion that the adults around them refuse to address, with tragic consequences for several of them.",
  "tarzan": "An infant orphaned in the African jungle is raised by gorillas and grows into a man torn between the only family he's ever known and the human explorers, including a young woman he falls for, who eventually arrive from the outside world.",
  "the-drowsy-chaperone": "A lonely, obsessive musical-theater fan plays his favorite cast album alone in his apartment, and the fictional 1920s wedding-day musical on the record springs to vivid life around him as he narrates and comments on it.",
  "the-wedding-singer": "In 1985 New Jersey, a wedding singer left at the altar strikes up a friendship with a waitress who's engaged to a man who doesn't deserve her, and the two slowly realize they might belong together instead.",
  "curtains": "During the out-of-town tryout of a troubled 1959 Broadway musical, the show's talentless leading lady is murdered onstage, and the stagestruck police detective investigating the case falls for the show itself as much as for solving the crime.",
  "legally-blonde": "A sunny sorority president follows her ex-boyfriend to Harvard Law School to win him back, only to discover she has real legal talent and a mind of her own along the way.",
  "the-pirate-queen": "In 16th-century Ireland, a chieftain's daughter defies expectations to become a formidable sea captain and clan leader, ultimately facing off against her equally formidable rival, Queen Elizabeth I of England, to protect her people and her love.",
  "xanadu": "A Greek muse descends from a mural in 1980 Venice Beach to inspire a struggling artist to open a roller disco, risking the wrath of her fellow muses when she falls in love with a mortal.",
  "young-frankenstein": "The American grandson of the infamous Victor Frankenstein inherits his ancestor's Transylvanian castle and, despite his best efforts to distance himself from the family legacy, ends up reanimating a corpse of his own.",
  "13": "A thirteen-year-old boy relocates from New York City to small-town Indiana after his parents' divorce and schemes to win popularity in time for his bar mitzvah by any means necessary.",
  "a-catered-affair": "In 1953 the Bronx, a working-class couple must decide whether to spend their hard-won savings on their taxi business or on the lavish wedding the mother suddenly insists on giving their reluctant only daughter.",
  "billy-elliot": "During the 1984-85 UK miners' strike, a coal miner's son in a Northern England town discovers a passion for ballet that puts him at odds with his grieving, strike-battered family and community.",
  "cry-baby": "In 1950s Baltimore, a strait-laced high-society girl falls for the leather-clad leader of the town's rebellious 'drapes,' scandalizing her genteel 'square' world and setting off a class war between the two cliques.",
  "in-the-heights": "Over a sweltering few days in Manhattan's Washington Heights, a close-knit Latino neighborhood of small-business owners and their families confronts gentrification, immigration, and the question of where home really is.",
  "next-to-normal": "A suburban mother's ongoing struggle with bipolar disorder strains her marriage and her relationship with her teenage daughter, forcing the whole family to confront a devastating loss at the root of her illness.",
  "passing-strange": "A young Black artist from a middle-class Los Angeles church family travels through 1970s Amsterdam and Berlin in search of an authentic identity and artistic voice, narrated throughout by an older version of himself looking back with hindsight the character onstage doesn't yet have.",
  "road-show": "Two real-life brothers — a restless con man and his more idealistic architect sibling — chase the American Dream across a series of get-rich-quick schemes from the Klondike gold rush to the Florida land boom, framed as a reflection from beyond the grave on what their ambition cost them and each other.",
  "shrek-the-musical": "A solitary ogre living happily alone in his swamp is forced into an unlikely alliance with a talkative donkey and a rescued princess with a secret of her own in order to reclaim his land from a power-hungry lord.",
  "title-of-show": "A meta-musical with no external plot to summarize, the show follows two friends writing a musical about two friends writing a musical, tracking their real anxieties about ambition, authenticity, and whether their creation will ever make it to a real stage.",
  "9-to-5-the-musical": "Three overworked and under-appreciated female office employees at a 1970s corporation take revenge on their sexist, credit-stealing boss by kidnapping him and secretly running the company far better without him.",
  "memphis": "In 1950s Memphis, a white radio DJ obsessed with Black music falls for a Black nightclub singer and helps bring the sound of rock and roll to a wider white audience, even as their interracial relationship draws danger from the segregated world around them.",
  "rock-of-ages": "On the eve of the Sunset Strip's late-1980s hair-metal heyday giving way to gentrification, a small-town girl and an aspiring rock star fall for each other amid the neon-lit chaos of a legendary Hollywood club fighting to survive.",
  "american-idiot": "Three suburban friends react in different ways to a post-9/11, media-saturated America — one enlisting, one staying home to become a father, one fleeing to the city and falling into addiction — as told entirely through a concept-album-style score.",
  "elf-the-musical": "A human raised as one of Santa's elves at the North Pole travels to New York to find his biological father and reconcile his relentlessly cheerful worldview with a cynical adult world that's largely forgotten the Christmas spirit.",
  "million-dollar-quartet": "On a single night in December 1956, Elvis Presley, Johnny Cash, Jerry Lee Lewis, and Carl Perkins converge unexpectedly at Sun Records for an impromptu jam session, dramatizing the real-life recording that became rock and roll legend.",
  "the-scottsboro-boys": "Framed as a minstrel show performed by its own real-life subjects, the piece recounts the true story of nine Black teenagers falsely accused of rape in 1931 Alabama and the decades-long fight against their wrongful convictions.",
  "women-on-the-verge-of-a-nervous-breakdown": "Over one chaotic 48 hours in 1980s Madrid, a heartbroken actress tries to track down the lover who's abruptly left her while fielding his ex-wife, his son, a spiked batch of gazpacho, and a friend entangled with a suspected terrorist.",
  "bonnie-clyde": "During the Great Depression, two small-town Texas dreamers desperate to escape poverty and obscurity fall in love and embark on a notorious cross-country crime spree, chasing the fame and glamour they'd only ever seen in the movies.",
  "catch-me-if-you-can": "A teenage con artist in the 1960s successfully impersonates an airline pilot, a doctor, and a lawyer while forging millions of dollars in checks, all while a dogged FBI agent pursues him across the country.",
  "priscilla-queen-of-the-desert": "Two drag queens and a transgender woman travel across the Australian outback in a battered bus to perform a cabaret show, confronting both hostile small-town audiences and their own family complications along the way.",
  "sister-act": "A struggling disco singer who witnesses a mob hit is hidden by police in a convent disguised as a nun, where she reluctantly transforms the convent's disorganized choir into a soulful sensation while dodging the gangsters hunting her.",
  "spider-man-turn-off-the-dark": "A bullied high school student gains spider-like powers after a lab accident and must balance his double life as a masked, web-slinging superhero with ordinary teenage struggles, all while facing off against a scientist turned monstrous villain.",
  "the-book-of-mormon": "Two mismatched young Mormon missionaries are sent to a poverty- and warlord-stricken Ugandan village to spread their faith, and find their rigid training upended by the realities they encounter there.",
  "a-christmas-story-the-musical": "In 1940s Indiana, a nine-year-old boy campaigns relentlessly for the one Christmas gift he's certain will change his life — a Red Ryder BB gun — despite every adult around him warning he'll shoot his eye out.",
  "bring-it-on-the-musical": "A popular cheerleading captain is redistricted to a rival school with no cheer program and must earn the trust of its dance crew to build a squad from scratch in time to face off against her old, more privileged team.",
  "chaplin": "Told through flashback, the show traces silent-film icon Charlie Chaplin's journey from an impoverished London childhood to Hollywood superstardom as the Little Tramp, and the toll his fame, scandal, and political exile eventually took on his personal life.",
  "dogfight": "On the eve of shipping out to Vietnam in 1963, a Marine recruits an unassuming waitress for a cruel betting game among his fellow soldiers to find the least attractive date, only to find himself genuinely falling for her as the night goes on.",
  "ghost-the-musical": "After a young banker is murdered in a mugging gone wrong, his spirit lingers to protect his grieving girlfriend from the danger he senses closing in, enlisting a reluctant psychic to help him communicate before it's too late.",
  "leap-of-faith": "A traveling con-man preacher stages a fake revival to swindle a drought-stricken Kansas town out of its money, but finds his cynicism tested when he falls for the local sheriff determined to expose him and witnesses something he can't explain.",
  "newsies": "In 1899 New York, a scrappy band of orphaned and runaway newspaper boys organize a citywide strike against the powerful publishers who raise the price they must pay for the papers they sell.",
  "once": "A Dublin street musician on the verge of giving up on his music meets a Czech immigrant pianist over the course of one transformative week, and their brief, wordless connection reshapes both of their futures.",
  "a-gentleman-s-guide-to-love-and-murder": "A distant, disinherited heir to a wealthy English family systematically murders his way through the eight relatives standing between him and the earldom, all while juggling two very different women vying for his affection.",
  "first-date": "A blind date between two mismatched New Yorkers — a buttoned-up guy and a free-spirited woman still hung up on an ex — unfolds in real time over a single awkward, funny dinner, complete with imagined interventions from friends, family, and past relationships.",
  "hands-on-a-hardbody": "Ten down-on-their-luck Texans compete in a grueling small-town endurance contest, each keeping one hand on a pickup truck for as long as they can, in hopes that winning it will change their lives.",
  "kinky-boots": "A struggling shoe-factory owner in Northampton, England partners with a drag queen performer to save his family business by designing a line of durable, glamorous boots built for drag performers.",
  "matilda": "A brilliant, neglected five-year-old girl with a gift for mischief and a budding telekinetic power finds an ally in her kind schoolteacher as she stands up to her cruel parents and her school's tyrannical headmistress.",
  "motown-the-musical": "Framed around Motown Records' 25th-anniversary celebration, the show traces founder Berry Gordy's rise from a Detroit boxer to the music mogul behind Diana Ross, Smokey Robinson, Marvin Gaye, and the Jackson 5, and his complicated personal and professional relationships with the artists who built the label with him.",
  "aladdin": "A charming street thief in the fictional city of Agrabah uses three wishes from a genie he frees from a magic lamp to pose as a prince and win the heart of the sultan's daughter, all while a scheming vizier plots to seize the throne.",
  "beautiful-the-carole-king-musical": "The show traces singer-songwriter Carole King's journey from a teenage Brill Building hit-maker writing songs for other artists to a solo performer finding her own voice, set against the collapse of her marriage to writing partner Gerry Goffin.",
  "heathers": "At a cutthroat 1980s Ohio high school, a girl desperate to escape the bottom of the social ladder falls in with the school's three most powerful and cruel 'Heathers,' then with a dangerous new boyfriend whose revenge fantasies against their bullies turn lethal.",
  "if-then": "A woman in her late thirties starting over in New York City sees her life split into two divergent paths after a chance encounter in the park, and the show follows both possible versions of her future in parallel.",
  "rocky": "A washed-up, small-time Philadelphia boxer gets an unlikely shot at the heavyweight title against the reigning champion, and must decide what winning — or simply going the distance — would really mean for his life and his relationship with a shy pet-shop clerk.",
  "the-bridges-of-madison-county": "Over four days in 1965 Iowa, a lonely Italian war bride turned farmer's wife falls into a brief, transformative affair with a traveling National Geographic photographer while her husband and children are away at a state fair.",
  "the-lightning-thief-the-percy-jackson-musical": "A troubled twelve-year-old discovers he's actually the son of the Greek god Poseidon and must journey across modern America with two fellow demigods to recover a stolen lightning bolt before a war among the gods breaks out.",
  "allegiance": "After Pearl Harbor, a Japanese American farming family is forced from their California home into a Wyoming internment camp, where a brother and sister are driven apart by conflicting ideas about how best to prove their loyalty to a country that has imprisoned them.",
  "an-american-in-paris": "A young American ex-GI who stays behind in Paris after World War II to pursue painting falls for a French ballerina who is secretly engaged to the resistance fighter who saved her family during the Nazi occupation.",
  "doctor-zhivago": "Amid the fall of Czarist Russia, World War I, and the Russian Revolution, a physician and poet torn between his devoted wife and a passionate, complicated love affair with another woman struggles to hold onto his art and his humanity as his country tears itself apart.",
  "finding-neverland": "Playwright J.M. Barrie befriends a widowed mother and her four young sons, and the imaginative games they play together inspire him to write Peter Pan, even as his growing devotion to the family strains his own marriage and reputation.",
  "fun-home": "A cartoonist looks back across three different ages of her own life to piece together her relationship with her closeted, complicated father, a funeral home director, and her own coming-out as a lesbian in the years just before his death.",
  "hamilton": "An orphaned immigrant from the Caribbean rises through wit and ambition to become a Founding Father, Treasury Secretary, and one of the most consequential and personally combustible figures of the American Revolution and early republic.",
  "honeymoon-in-vegas": "A New York man terrified of marriage after promising his dying mother he'd never wed finally proposes to his girlfriend in Las Vegas, only for a smooth-talking gambler to con him out of both a poker game and, temporarily, his fiancée.",
  "lazarus": "A surreal, non-linear stage sequel to the story of a stranded alien first seen in The Man Who Fell to Earth, the show follows the same character years later, adrift and haunted by memory and hallucination as he searches for a way home.",
  "on-your-feet": "The show traces Cuban American singer Gloria Estefan's rise to pop stardom alongside her husband and producer Emilio, and the near-fatal tour-bus accident that threatened to end both her career and her ability to walk.",
  "ride-the-cyclone": "Six teenagers from a small-town Canadian choir are killed in a freak roller-coaster accident, and a mysterious fortune-telling machine grants them each the chance to make a case for which one of them should be allowed to return to life.",
  "school-of-rock": "A washed-up, broke wannabe rock musician poses as a substitute teacher at a strict prep school and secretly turns his class of overachieving students into a rock band to compete in a Battle of the Bands.",
  "something-rotten": "In 1590s London, two struggling playwright brothers, desperate to compete with the wildly popular William Shakespeare, consult a soothsayer whose garbled vision of the future leads them to invent an entirely new form of theater: the musical.",
  "the-visit": "An immensely wealthy woman returns to the impoverished town that shunned her decades earlier and offers its desperate residents a fortune — on the condition that they kill the man who wronged her in her youth.",
  "dear-evan-hansen": "A socially anxious teenager's small lie about a secret friendship with a classmate who died by suicide spirals into a fabricated bond that brings him unexpected family, fame, and connection, until the deception threatens to collapse.",
  "waitress": "A small-town waitress and gifted pie-maker stuck in an unhappy, controlling marriage discovers an unplanned pregnancy and finds her way toward independence through an affair with her new doctor and a regional pie contest.",
  "natasha-pierre-the-great-comet-of-1812": "Adapted from a slice of Tolstoy's War and Peace, a young engaged noblewoman falls under the spell of a dashing rake while her fiancé is away at war, and a disillusioned, philosophically minded nobleman is drawn into helping repair the fallout.",
  "bright-star": "Set across the 1920s and 1940s in North Carolina, a formidable literary magazine editor's encounter with a young soldier just home from WWII stirs up the long-buried story of the baby she was forced to give up as a teenager.",
  "a-bronx-tale": "A Bronx boy coming of age in the 1960s is torn between the honest, working-class values of his bus-driver father and the charisma of the neighborhood mob boss who takes him under his wing, with a forbidden interracial romance complicating his loyalties.",
  "american-psycho": "A wealthy, status-obsessed 1980s Wall Street banker maintains an immaculate surface of consumerism and social one-upmanship while secretly indulging in escalating, possibly delusional acts of violence.",
  "shuffle-along": "A backstage account of the making of the groundbreaking 1921 all-Black Broadway musical Shuffle Along, following its four creators as they fight racism, exhaustion, and financial ruin to get the show made, only to watch its legacy erased soon after.",
  "come-from-away": "When 38 international flights are diverted to the small town of Gander, Newfoundland after the September 11 attacks, the stranded passengers and the townspeople who take them in form unexpected bonds over the days that follow.",
  "the-band-s-visit": "An Egyptian police band, mistakenly stranded overnight in a sleepy Israeli desert town after a mix-up at the bus station, forms quiet, unexpected connections with the locals who take them in.",
  "anastasia": "In post-revolutionary Russia, a young amnesiac woman is recruited by two con men to pose as the missing Grand Duchess Anastasia Romanov, only for the impersonation to force a real reckoning with her own hidden past.",
  "war-paint": "Cosmetics titans Helena Rubinstein and Elizabeth Arden wage a decades-long rivalry to dominate the American beauty industry from the 1930s through the 1960s, each building an empire while never once meeting face to face.",
  "bandstand": "A traumatized WWII veteran returning home forms a swing band with fellow veterans to compete in a national radio contest, using the songs they write together to process what they experienced overseas and honor a fallen friend.",
  "groundhog-day": "A cynical, self-absorbed TV weatherman sent to cover the Groundhog Day festival in small-town Punxsutawney becomes trapped reliving the same day over and over, forced to confront who he is before he can move forward.",
  "spongebob-squarepants-the-musical": "When an imminent volcanic eruption threatens to destroy Bikini Bottom, SpongeBob and his undersea neighbors must overcome panic, rivalry, and self-doubt to save their town.",
  "am-lie": "A shy, imaginative Parisian waitress secretly orchestrates small acts of kindness and mischief in the lives of the people around her while struggling to work up the nerve to pursue a connection of her own.",
  "charlie-and-the-chocolate-factory": "A poor boy who wins one of five golden tickets to tour eccentric candy maker Willy Wonka's mysterious factory watches the other winning children's greed and misbehavior get the better of them, while his own decency is quietly tested.",
  "mean-girls": "A homeschooled teenager new to public high school is taken in by the school's most popular and ruthless clique, and gradually becomes as manipulative as the girls she initially set out to take down.",
  "be-more-chill": "An awkward, bullied high schooler swallows a supercomputer pill that promises to make him cool by feeding him constant instructions through an earpiece, with escalating and dangerous consequences for himself and his friends.",
  "frozen": "Two royal sisters in the kingdom of Arendelle are separated by one sister's uncontrollable ice powers, and must reunite to stop an eternal winter and repair the bond fear once broke between them.",
  "pretty-woman-the-musical": "A wealthy corporate businessman hires a Hollywood Boulevard sex worker to be his companion for a week of business functions, and the arrangement unexpectedly develops into real feelings on both sides.",
  "the-prom": "A group of self-absorbed Broadway actors, hoping to revive their public image after a career setback, descend on a small Indiana town to champion a lesbian teenager who's been barred from bringing her girlfriend to prom.",
  "king-kong": "A filmmaker's expedition to a remote island captures a giant ape and brings him to New York City as a spectacle, ending in tragedy when the captive creature breaks free.",
  "head-over-heels": "Loosely adapting Sir Philip Sidney's Elizabethan romance Arcadia to the songs of the Go-Go's, a royal family flees their kingdom to escape a series of oracle prophecies threatening to end its magical 'Beat,' with each prophecy fulfilled in unexpected, gender-fluid ways.",
  "the-cher-show": "Three actresses simultaneously play Cher at different stages of her life, as 'Babe,' 'Lady,' and 'Star,' narrating and commenting on each other's choices as the show traces her rise from a shy childhood through Sonny Bono, solo superstardom, and reinvention.",
  "moulin-rouge-the-musical": "In 1899 Paris, a penniless composer falls for the star performer of the bohemian Moulin Rouge nightclub, whose owner has already promised her to a wealthy duke in exchange for financing the club's future.",
  "hadestown": "A retelling of the Orpheus and Eurydice myth set in a Depression-inflected underworld run by the industrialist god Hades, following a young musician's descent to try to bring his lost love back to the world above.",
  "beetlejuice": "A recently deceased young couple hires a crude, chaotic 'bio-exorcist' ghost to scare off the family that's moved into their former home, only for his attention to shift toward the family's death-obsessed teenage daughter.",
  "tootsie": "An unemployed, notoriously difficult actor disguises himself as a woman to land a role, and finds unexpected career success and increasingly complicated romantic entanglements while maintaining the ruse.",
  "tina-the-tina-turner-musical": "Traces Tina Turner's journey from a churchgoing girl in Tennessee through her rise to fame and abusive marriage to Ike Turner, to a hard-won solo comeback and global superstardom in the 1980s.",
  "ain-t-too-proud": "Traces the Temptations' rise from the streets of Detroit to the top of the Motown sound, following the group's shifting lineup and the personal and political conflicts that threatened to tear them apart across the civil rights era.",
  "jagged-little-pill": "Set to Alanis Morissette's album of the same name, a seemingly picture-perfect suburban family unravels as each member confronts a hidden crisis, including addiction, sexual assault, questions of identity, and the strain of a hidden adoption, beneath their curated exterior.",
  "six": "The six wives of Henry VIII reclaim the microphone as a pop-concert girl group, competing to see whose life was the most difficult before ultimately rejecting the competition to tell their own histories on their own terms.",
  "mrs-doubtfire": "A recently divorced, out-of-work actor disguises himself as an elderly British nanny to stay close to his children, maintaining the ruse even as it threatens to unravel his relationship with his ex-wife and her new partner.",
  "girl-from-the-north-country": "Set in a Depression-era Duluth, Minnesota boarding house on the edge of foreclosure, an ensemble of struggling residents and drifters, including the proprietor's ailing wife and pregnant adopted daughter, face debt, addiction, and hard choices, their stories scored (not narrated) by Bob Dylan songs rather than driven by his own life story.",
  "diana-the-musical": "Traces Princess Diana's arranged marriage into the British royal family, her public unraveling alongside Prince Charles's ongoing relationship with Camilla Parker Bowles, and her transformation into a global humanitarian icon before her sudden death.",
  "flying-over-sunset": "A fictional account imagining a shared 1950s LSD trip between three real public figures, actor Cary Grant, writer Aldous Huxley, and playwright/diplomat Clare Boothe Luce, each confronting private grief and unresolved trauma as their hallucinations intertwine.",
  "mj": "Traces pop superstar Michael Jackson's creative process and troubled psyche through the lens of a 1992 rehearsal for the Dangerous world tour, as a documentary crew's questions force him to revisit pivotal moments of his career.",
  "some-like-it-hot": "Two Depression-era Chicago musicians who witness a mob hit go on the run disguised as women in an all-female band, complicating both their disguises and their romantic entanglements as they flee to Florida.",
  "a-beautiful-noise": "Traces singer-songwriter Neil Diamond's rise from a shy Brooklyn kid through a hit-making career and personal reckonings, framed as a present-day therapy session where an older Diamond revisits his own life story.",
  "juliet": "Imagining what happens if Shakespeare's Juliet doesn't die at the end of Romeo and Juliet, this jukebox musical set to 2000s pop hits follows her instead as she leaves Verona for Paris to build an independent life and find new love, while Shakespeare and his wife argue over how the story should end.",
  "kimberly-akimbo": "A teenager with a rare genetic condition that ages her body four times faster than normal navigates high school life, an eccentric and dysfunctional family, and a tentative romance while facing a drastically shortened life expectancy.",
  "paradise-square": "In New York City's multiracial Five Points neighborhood during the Civil War, Black and Irish immigrant communities who've built a fragile harmony together are torn apart by the Union's draft and the violence of the 1863 Draft Riots.",
  "almost-famous": "A teenage music journalist in the early 1970s talks his way onto tour with a rising rock band for a Rolling Stone assignment, growing attached to the band and their charismatic band-aid muse as he learns the difference between fandom and journalism.",
  "mr-saturday-night": "An aging, once-famous Catskills comedian, decades past his prime and estranged from much of his family, gets an unexpected shot at a career comeback and a chance to repair what he broke along the way.",
  "shucked": "When a mysterious blight threatens the corn crop that sustains their small farming town, a young woman leaves home to find an expert who can save it, unwittingly bringing a con man back with her.",
  "back-to-the-future": "A teenager accidentally travels back in time to 1955 in a modified DeLorean, where he must make sure his future parents fall in love without erasing his own existence, before finding a way back to 1985.",
  "gutenberg-the-musical": "Two enthusiastic but wildly under-informed aspiring musical writers perform a bare-bones backers' audition of their invented, historically inaccurate biomusical about printing-press inventor Johannes Gutenberg, playing every role themselves with a rotating cast of labeled hats.",
  "new-york-new-york": "In postwar 1945 New York, a diverse group of musicians and dreamers, including a returning GI trumpeter and an aspiring singer, chase ambition and love while trying to make it in the city's competitive music scene.",
  "here-lies-love": "Traces Imelda Marcos's rise from a small-town beauty queen to First Lady of the Philippines and her husband Ferdinand's brutal, decades-long dictatorship, staged as an immersive disco dance club leading up to their ouster in the 1986 People Power Revolution.",
  "suffs": "Follows American suffragists, led by the young firebrand Alice Paul and the more cautious veteran organizer Carrie Chapman Catt, alongside Black activists including Ida B. Wells and Mary Church Terrell, through the final, fractious decade of the fight to ratify the 19th Amendment.",
  "the-outsiders": "Adapting S.E. Hinton's novel, a working-class teenage 'greaser' in 1960s Tulsa navigates loyalty, class conflict, and violence with his rival, wealthier 'Soc' peers, after a fight between the two groups turns fatal.",
  "hell-s-kitchen": "A semi-autobiographical, fictionalized account (not a strict biography) of Alicia Keys's teenage years in 1990s Manhattan, following 17-year-old Ali as she chafes against her protective mother, falls for an older street drummer, and discovers her gift for piano through a neighbor's mentorship.",
  "water-for-elephants": "During the Great Depression, a veterinary student who loses his family and drops out of school joins a traveling circus, where he falls for the star performer trapped in a marriage to the show's abusive ringmaster.",
  "days-of-wine-and-roses": "A married couple's shared love of drinking curdles into mutual alcoholism over the course of their relationship, as one partner eventually gets sober while the other struggles to follow.",

// Returns a show's premise sentence, or null if none exists yet. A rare
// per-show correction can be set on the override record's `premiseOverride`
// field (no UI for this yet — direct data edit only), taking precedence over
// the seed default, same precedence relationship `roleOverrides` has with
// `show.roles`. Custom shows have no seed layer, so this always returns
// whatever's on their own override, if anything.
function getPremise(show){
  if(!show) return null;
  const override = (DATA.overrides[show.id] || {}).premiseOverride;
  if(override) return override;
  if(show.custom) return null;
  return SEED_PREMISES[show.id] || null;
}

// "On Loop" (build 2026-07-01f): a lightweight, temporary "currently
// obsessing over this" flag — deliberately NOT part of the collaborator/
// comeback-show math (that's built to reward stable, accumulated evidence;
// a flag that can flip week to week doesn't belong in it). Picked, not
// derived — same starting-guess status as the other small tunable constants
// in this file (WILSON_Z, LIVE_REPEAT_WEIGHT, etc.).
const MAX_ON_LOOP = 3;

   ============================================================ */
const STORAGE_KEY = 'ledger-data';
const API_KEY_STORAGE = 'underscore-api-key';
const EXPORT_COUNTER_KEY = 'underscore-export-counter';
let DATA = { overrides:{}, customShows:{}, anchors:[], vibeHistory:[], duoDenylist:[] };
let dataLoaded = false;

/* ---- personal Anthropic API key: deliberately its own storage key, kept
   OUT of ledger-data, so it never gets swept into an EXPORT backup ---- */
function getApiKey(){
  try{ return (localStorage.getItem(API_KEY_STORAGE) || '').trim(); }
  catch(e){ return ''; }
}
function setApiKey(key){
  try{ localStorage.setItem(API_KEY_STORAGE, key.trim()); }
  catch(e){ alert('Could not save the key — this browser may be blocking local storage.'); }
}
function clearApiKey(){
  try{ localStorage.removeItem(API_KEY_STORAGE); }catch(e){}
}

/* ---- export-reminder counter: tracks experience changes since the last
   export. Lives in its own localStorage key (like the API key) so it's
   never swept into an EXPORT backup — counting it in the backup would reset
   the counter on import, which is exactly what we want, but only the
   resetExportCounter() call below should do that, not the JSON payload.
   Increments on addExperience / updateExperience / deleteExperience only —
   status flags (someday, dontcare, scheduled) and show metadata (custom show
   edits, role tags, duo denylist) are deliberately excluded: they're low-
   stakes changes you'd rarely need to recover if a session went wrong. ---- */
function getExportCounter(){
  try{ return parseInt(localStorage.getItem(EXPORT_COUNTER_KEY)||'0',10)||0; }
  catch(e){ return 0; }
}
function setExportCounter(n){
  try{ localStorage.setItem(EXPORT_COUNTER_KEY, String(n)); }catch(e){}
  updateExportBadge(n);
}
function bumpExportCounter(){ setExportCounter(getExportCounter()+1); }
function resetExportCounter(){ setExportCounter(0); }
function updateExportBadge(n){
  const btn = document.getElementById('exportBtn');
  if(!btn) return;
  btn.textContent = n>0 ? `EXPORT (${n})` : 'EXPORT';
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      DATA = JSON.parse(raw);
      DATA.overrides = DATA.overrides || {};
      DATA.customShows = DATA.customShows || {};
      DATA.anchors = DATA.anchors || [];
      DATA.vibeHistory = DATA.vibeHistory || [];
      DATA.duoDenylist = DATA.duoDenylist || [];
    }
  }catch(e){
    // no existing data yet, or storage is blocked — checkStorageHealth() catches that case
  }
  dataLoaded = true;
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  }catch(e){
    console.error('Storage save failed', e);
    showStorageWarning();
    alert('Could not save — this browser is blocking local storage (common in private/incognito windows, or very strict privacy settings). Use EXPORT now, then try a normal browser window.');
  }
}

function checkStorageHealth(){
  try{
    const probeKey = '__underscore_storage_probe__';
    localStorage.setItem(probeKey, String(Date.now()));
    const back = localStorage.getItem(probeKey);
    localStorage.removeItem(probeKey);
    if(!back) throw new Error('storage readback returned nothing');
  }catch(e){
    showStorageWarning();
  }
}
function showStorageWarning(){
  const el = document.getElementById('storageWarning');
  if(el) el.style.display = 'flex';
}
document.getElementById('storageWarningDismiss').onclick = ()=>{
  document.getElementById('storageWarning').style.display = 'none';
};

function allShows(){
  return Object.assign({}, SEED_SHOWS, DATA.customShows);
}
function getShow(id){ return allShows()[id]; }
function getState(id){
  return DATA.overrides[id] || {status:null, experiences:[]};
}
function ensureOverride(id){
  if(!DATA.overrides[id]) DATA.overrides[id] = {status:null, experiences:[]};
  return DATA.overrides[id];
}
function setStatus(id, status){
  const o = ensureOverride(id);
  o.status = status;
  if(status !== 'scheduled') o.scheduledDate = null;
  if(status !== 'dontcare') o.dontcareReason = null;
  saveData();
}
function setScheduled(id, dateStr){
  const o = ensureOverride(id);
  o.status = 'scheduled';
  o.scheduledDate = dateStr;
  o.dontcareReason = null;
  saveData();
}
function setDontcare(id, reason){
  const o = ensureOverride(id);
  o.status = 'dontcare';
  o.dontcareReason = (reason||'').trim();
  o.scheduledDate = null;
  saveData();
}
// Returns every show currently flagged onLoop, sorted oldest-first by
// onLoopSince — that ordering is what toggleOnLoop() below relies on to find
// "the one bumped when a 4th is toggled on."
function getActiveLoopShows(){
  return Object.keys(DATA.overrides)
    .filter(id => DATA.overrides[id].onLoop)
    .sort((a,b) => (DATA.overrides[a].onLoopSince||0) - (DATA.overrides[b].onLoopSince||0));
}
// Toggles a show's "on loop" flag. Turning ON: if MAX_ON_LOOP is already
// active elsewhere, silently bumps the oldest one (by onLoopSince) off
// first — Cameron's call, no confirm/alert, since he's already forgotten
// what was on loop 3 loops ago by the time a 4th comes up. loopCount ticks
// up once per activation (not per deactivation) so it always fires exactly
// once per "loop era," regardless of whether that era ends manually or via
// auto-bump. Turning OFF: no confirm either (matches the calendar-remove
// precedent) — loopCount is untouched, since it's a lifetime history count,
// not a reflection of current state.
function toggleOnLoop(id){
  const o = ensureOverride(id);
  if(o.onLoop){
    o.onLoop = false;
    o.onLoopSince = null;
  } else {
    const active = getActiveLoopShows().filter(x=>x!==id);
    if(active.length >= MAX_ON_LOOP){
      const oldest = active[0];
      DATA.overrides[oldest].onLoop = false;
      DATA.overrides[oldest].onLoopSince = null;
    }
    o.onLoop = true;
    o.onLoopSince = Date.now();
    o.loopCount = (o.loopCount||0) + 1;
  }
  saveData();
}
function addExperience(id, exp){
  const o = ensureOverride(id);
  exp.id = 'e' + Date.now() + Math.floor(Math.random()*1000);
  o.experiences.push(exp);
  // someday / dontcare / noopinion all mean "haven't experienced this yet" —
  // once you've logged anything, that's no longer true, so these three
  // always clear. 'scheduled' is different on purpose: it's an upcoming,
  // unrelated date that can coexist with experiences already logged in
  // OTHER capacities (e.g. you've got the OBC and a pro-shot logged for a
  // show, but you're also seeing it live for the first time next month) — so
  // a still-future date survives logging something else in the meantime. It
  // only clears here once its date has actually arrived, on the assumption
  // that whatever you just logged fulfilled it — the same assumption the
  // due-banner's "log it now" button already depends on to make its prompt
  // go away once you act on it.
  const todayStr = new Date().toISOString().slice(0,10);
  if(o.status==='someday' || o.status==='dontcare' || o.status==='noopinion'){
    o.status = null;
  } else if(o.status==='scheduled' && (!o.scheduledDate || o.scheduledDate <= todayStr)){
    o.status = null;
    o.scheduledDate = null;
  }
  saveData();
  bumpExportCounter();
}
function updateExperience(id, expId, patch){
  const o = ensureOverride(id);
  const e = o.experiences.find(x=>x.id===expId);
  if(e) Object.assign(e, patch);
  saveData();
  bumpExportCounter();
}
function deleteExperience(id, expId){
  const o = ensureOverride(id);
  o.experiences = o.experiences.filter(x=>x.id!==expId);
  saveData();
  bumpExportCounter();
}
function addCustomShow({title, team, year, tags}){
  const id = 'custom-' + slugify(title) + '-' + Date.now();
  DATA.customShows[id] = {id, title, year: year||null, team: team||[], tags: tags||[], roles: {}, custom:true};
  saveData();
  return id;
}

// Custom shows (including ai-suggested ones) get a real edit path now —
// previously the only fields you could ever set were whatever you typed
// into the add-show modal at the moment of creation, with no way back in.
// That's exactly the gap BBAJ exposed: it was added title-only, accidentally,
// during the pre-25n add-modal bug, and there was nowhere to go fill in its
// real year/team/tags afterward. Seed shows never reach this — they stay
// locked/append-only as always.
function updateCustomShow(id, {title, year, team, tags}){
  const show = DATA.customShows[id];
  if(!show) return false;
  if(title !== undefined) show.title = title;
  show.year = year || null;
  show.team = team || [];
  show.tags = tags || [];
  saveData();
  return true;
}

// Shared by Library's detail-popup delete button AND Review's new inline delete
// button — previously each had its own separate copy of this confirm/delete
// logic. Pulled into one function so the warning text and behavior can't drift
// between the two entry points the way other things in this app have before.
// Returns true if the show was actually deleted, false if cancelled or not a
// custom show (seed shows are permanent and never reach this function from the UI).
function deleteCustomShow(showId){
  const show = getShow(showId);
  if(!show || !show.custom) return false;
  const state = getState(showId);
  const hasLogged = state.experiences.length>0;
  const warning = hasLogged
    ? `Delete "${show.title}" entirely? This also removes the ${state.experiences.length} experience${state.experiences.length===1?'':'s'} logged against it. Can't be undone (export a backup first if unsure).`
    : `Delete "${show.title}"? Can't be undone.`;
  if(!confirm(warning)) return false;
  delete DATA.customShows[showId];
  delete DATA.overrides[showId];
  saveData();
  return true;
}

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildReviewQueue(){
  const shows = allShows();
  const undecided = Object.values(shows).filter(s=>{
    const st = getState(s.id);
    return st.status===null && st.experiences.length===0;
  });
  shuffleArray(undecided);
  reviewQueue = undecided;
}

function nextReviewId(){
  return reviewQueue.length>0 ? reviewQueue[0].id : null;
}

function getDueScheduledShows(){
  const todayStr = new Date().toISOString().slice(0,10);
  return Object.values(allShows())
    .filter(s=>{
      const st = getState(s.id);
      return st.status==='scheduled' && st.scheduledDate && st.scheduledDate <= todayStr;
    })
    .sort((a,b)=> getState(a.id).scheduledDate.localeCompare(getState(b.id).scheduledDate));
}

function dueScheduledBannerHtml(dueShows){
  if(!dueShows.length) return '';
  return `
    <div class="due-banner">
      ${dueShows.map(s=>{
        const st = getState(s.id);
        return `<div class="due-banner-row">
          <span><b>${escapeHtml(s.title)}</b> was on your calendar for ${escapeHtml(st.scheduledDate)} — how'd it go?</span>
          <button class="btn small amber" data-due-log="${s.id}">log it now</button>
        </div>`;
      }).join('')}
    </div>
  `;
}

function wireDueBanner(el){
  el.querySelectorAll('[data-due-log]').forEach(btn=>{
    btn.onclick = ()=>{
      forcedReviewId = btn.dataset.dueLog;
      loggingMode = true;
      schedulingMode = false;
      dontcareMode = false;
      renderReview();
    };
  });
}

function renderReview(){
  buildReviewQueue();
  const el = document.getElementById('tab-review');
  // Don't list a show in its own due-banner row while it's already the one being logged below.
  const dueShows = getDueScheduledShows().filter(s=> !(forcedReviewId===s.id && loggingMode));
  const bannerHtml = dueScheduledBannerHtml(dueShows);

  if(forcedReviewId){
    currentReviewId = forcedReviewId;
  } else if(!currentReviewId || !reviewQueue.find(s=>s.id===currentReviewId)){
    currentReviewId = nextReviewId();
  }

  if(!currentReviewId){
    el.innerHTML = bannerHtml + `
      <h2 class="section-title">Review</h2>
      <div class="empty">
        <p>The ghost light's the only thing on. You've made a call on everything currently in the deck — all seed titles, plus anything you've added.</p>
      </div>
      <div class="btnrow" style="justify-content:center;">
        <button class="btn ghost-dark" id="addCustomFromEmpty">+ add a specific show</button>

      </div>
      <div id="findMoreStatus" style="text-align:center;margin-top:10px;"></div>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);text-align:center;margin-top:8px;">"Ask Claude for more shows" makes a live API call using your personal key (see the API KEY button below) — typically a few cents, and it double-checks facts with a web search before answering. No key set up yet? The button will walk you through it.</p>
    `;
    document.getElementById('addCustomFromEmpty').onclick = ()=> openAddCustomModal(goToShowInReview);
    document.getElementById('findMoreFromEmpty').onclick = ()=> findMoreShowsViaAPI();
    wireDueBanner(el);
    return;
  }
  const show = getShow(currentReviewId);
  el.innerHTML = bannerHtml + `
    <h2 class="section-title">Turn on the ghost light</h2>
    <p class="section-sub">${reviewQueue.length} show${reviewQueue.length===1?'':'s'} left in this pass · go one at a time, no pressure</p>

  } else {
    body.innerHTML = experienceFormHtml(show.id, true);
    wireExperienceForm(show.id, true, ()=>{
      loggingMode=false;
      renderLoggedExperiences(show);
    }, null, body);
    renderLoggedExperiences(show);
  }
}

function renderLoggedExperiences(show){
  const state = getState(show.id);
  let container = document.getElementById('loggedExpList');
  if(!container){
    const body = document.getElementById('reviewBody');
    body.insertAdjacentHTML('beforeend', `<div id="loggedExpList" style="margin-top:14px;"></div>`);
    container = document.getElementById('loggedExpList');
  }
  if(state.experiences.length===0){ container.innerHTML=''; return; }
  container.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:#7a756d;margin-bottom:6px;">LOGGED SO FAR</div>` +
    expListOrEditHtml(show.id, state.experiences, 'review') +
    `<div class="btnrow" style="margin-top:10px;">
       <button class="btn small" id="addAnotherExp">+ log another experience</button>
       <button class="btn primary small" id="doneWithShow">done with this show</button>
     </div>`;
  document.getElementById('addAnotherExp').onclick = ()=>{ editingExpId=null; loggingMode=true; renderReviewBody(show); };
  document.getElementById('doneWithShow').onclick = ()=>{ currentReviewId=null; loggingMode=false; editingExpId=null; forcedReviewId=null; renderReview(); };
  wireExpListOrEdit(container, show.id, state.experiences, ()=> renderLoggedExperiences(show));
}

function advanceReview(){
  currentReviewId = null;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  forcedReviewId = null;
  renderReview();
}

// Used after manually adding a custom show: forces that specific show onto the
// Review card (reusing the same forcedReviewId mechanism the due-banner's "log it
// now" button uses) so the person actually SEES what they just added, with its
// normal someday/scheduled/dontcare/log button row — rather than silently landing
// back in the shuffled queue, which could easily look identical to "nothing happened."
function goToShowInReview(id){
  forcedReviewId = id;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  renderReview();
}

// Same idea as goToShowFromVibe() below, but drops straight into the
// experience-logging form instead of the normal someday/scheduled/dontcare/
// log button row — for a rec's "Log it" button, where tapping it already
// means "I've experienced this," not "remind me later." Can't just flip
// loggingMode and reuse the nav button's own click handler the way
// goToShowFromVibe() does: that handler only calls renderReview() when
// loggingMode is false (so switching tabs mid-form elsewhere doesn't get
// silently clobbered), so this does the tab-switch bookkeeping itself.
function goToShowFromVibeToLog(id){
  forcedReviewId = id;
  loggingMode = true;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const reviewNavBtn = document.querySelector("nav button[data-tab='review']");
  if(reviewNavBtn) reviewNavBtn.classList.add('active');
  const reviewTabEl = document.getElementById('tab-review');
  if(reviewTabEl) reviewTabEl.classList.add('active');
  renderReview();
}

// Same idea as goToShowInReview() above, but callable from Vibe Check, which
// isn't the active tab yet — clicking a rec title there needs to actually
// switch tabs first. Reuses the real nav button's own click handler (which
// already does the active-class swap + renderReview()) instead of copying
// that logic a second time.
function goToShowFromVibe(id){
  forcedReviewId = id;
  loggingMode = false;
  schedulingMode = false;
  dontcareMode = false;
  editingExpId = null;
  const reviewNavBtn = document.querySelector("nav button[data-tab='review']");
  if(reviewNavBtn) reviewNavBtn.click();
  else renderReview();
}

/* ============================================================
   EXPERIENCE FORM (shared between Review + Library, and now also
   in-place editing — pass `prefill` as the existing experience object,
   including its `id`, to pre-fill every field and save via
   updateExperience() instead of addExperience() on submit.)
   ============================================================ */
function experienceFormHtml(showId, compact, prefill){
  const formId = 'expform-'+showId+'-'+Math.floor(Math.random()*99999);
  return `
  <div class="exp-form" data-form="${formId}">

      <label>Capacity</label>

      </div>
    </div>
    <div id="subfields-${formId}">${prefill ? subfieldsHtml(formId, prefill.capacity, prefill) : ''}</div>
  </div>
  `;
}

      </label>
    </div>` : ''}
    ${showsSubLabel ? `
    <div class="field">
      <label>Which version / release?</label>
      <input type="text" class="f-sublabel" placeholder="e.g. OBC, 2024 revival cast, movie soundtrack, the PBS broadcast..." value="${escapeHtml(prefill && prefill.subLabel || '')}">
    </div>` : ''}
    ${showsVenue ? `
    <div class="field">
      <label>Venue type</label>
      <div class="capacity-row">
        ${VENUE_TYPES.map(v=>`<span class="chip venue-chip${prefill && prefill.venueTypes && prefill.venueTypes.includes(v) ? ' on' : ''}" data-venue="${escapeHtml(v)}">${escapeHtml(v)}</span>`).join('')}
      </div>
    </div>` : ''}
    <div class="field">
