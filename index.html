<style>
  /* Single fixed palette — Bright Turquoise & Gold. (WARM/dark mode and the
     toggle were removed by request; colors still route through these CSS
     custom properties rather than being hardcoded in rules, in case a second
     palette is ever wanted again.) */
  :root{
    --stage:#1E9E99;
    --panel:#178F8A;
    --panel-line:#0F6E69;
    --paper:#FFF6DC;
    --paper-line:#F0DCA0;
    --amber:#FFC93D;
    --amber-dim:#E0A92E;
    --curtain:#C2613D;
    --pink:#FF4FA0;
    --ink:#0A3F3C;
    --chalk:#0A3F3C;
    --chalk-dim:#155A56;
    --title-glow:0 0 6px rgba(255,201,61,0.3);
    --someday-bg:rgba(255,201,61,0.18);
    --dontcare-bg:rgba(194,97,61,0.18);
    --bulb-glow:rgba(255,201,61,.45);
    --font-display:Impact, Haettenschweiler, 'Anton', 'Arial Narrow Bold', sans-serif;
    --font-body:'Source Serif 4', Georgia, serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--stage);
    color:var(--chalk);
    font-family:var(--font-body);
    line-height:1.5;
  }
  ::selection{ background:var(--amber); color:var(--ink); }

  /* ---------- marquee header ---------- */
  .marquee{
    background:var(--panel);
    border-bottom:3px solid var(--amber-dim);
    padding:22px 20px 16px;
    text-align:center;
    position:relative;
  }
  .marquee h1{
    font-family:var(--font-display);
    font-size:clamp(28px,6vw,46px);
    letter-spacing:2px;
    margin:0;
    color:var(--amber);
    text-shadow:var(--title-glow);
    text-transform:uppercase;
  }
  .marquee .sub{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin-top:6px;
  }
  .header-actions{
    position:absolute;
    top:18px; right:18px;
    display:flex; gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
    max-width:200px;
  }
  .header-actions button{
    background:none;
    border:1px solid var(--panel-line);
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:1px;
    padding:5px 8px;
    border-radius:3px;
    cursor:pointer;
  }
  .header-actions button:hover{ border-color:var(--amber); color:var(--amber); }

  /* ---------- nav ---------- */
  nav{
    display:flex;
    justify-content:center;
    background:var(--panel);
    border-bottom:1px solid var(--panel-line);
    position:sticky; top:0; z-index:20;
  }
  nav button{
    background:none; border:none;
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:13px 18px;
    cursor:pointer;
    border-bottom:3px solid transparent;
  }
  nav button.active{
    color:var(--amber);
    border-bottom-color:var(--amber);
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:24px 16px 80px;
  }
  .tab{ display:none; }
  .tab.active{ display:block; animation:fadein .25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  h2.section-title{
    font-family:var(--font-mono);
    font-weight:700;
    color:var(--chalk);
    letter-spacing:2px;
    font-size:16px;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .section-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    margin:0 0 18px;
  }

  /* ---------- ticket stub card (signature element) ---------- */
  .ticket{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    position:relative;
    padding:18px 20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.35);
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:18px; height:18px;
    background:var(--stage);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-9px; }
  .ticket::after{ right:-9px; }
  .ticket .perf{
    border-top:2px dashed var(--paper-line);
    margin:14px 0;
  }
  .ticket .show-title{
    font-family:var(--font-display);
    font-size:24px;
    letter-spacing:.5px;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .ticket .credits{
    font-family:var(--font-mono);
    font-size:11px;
    color:#5a5550;
    letter-spacing:.3px;
  }
  .ticket .tags{ margin-top:6px; }
  .tag-pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.5px;
    background:rgba(0,0,0,0.06);
    border-radius:10px;
    padding:2px 8px;
    margin:0 4px 4px 0;
    color:#5a5550;
  }

  /* ---------- buttons / chips ---------- */
  .btnrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .btn{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.5px;
    padding:9px 14px;
    border-radius:5px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
  }
  .btn:hover{ border-color:var(--ink); }
  .btn.primary{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .btn.amber{ background:var(--amber); color:var(--ink); border-color:var(--amber); font-weight:700; }
  .btn.ghost-dark{
    background:transparent; color:var(--chalk); border:1px solid var(--panel-line);
  }
  .btn.ghost-dark:hover{ border-color:var(--amber); color:var(--amber); }
  .btn.danger{ color:var(--curtain); border-color:var(--curtain); background:#fff; }
  .btn.small{ padding:5px 10px; font-size:11px; }
  .btn:disabled{ opacity:.4; cursor:default; }

  .chip{
    font-family:var(--font-mono);
    font-size:11px;
    padding:6px 11px;
    border-radius:14px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    display:inline-block;
  }
  .chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .verdict-chip[data-v="allIn"].on{ background:var(--pink); border-color:var(--pink); color:#fff; }

  /* ---------- form elements ---------- */
  .field{ margin:14px 0; }
  .field label{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:#5a5550;
    margin-bottom:6px;
  }
  .field input[type=text], .field textarea, .field select{
    width:100%;
    font-family:var(--font-body);
    font-size:14px;
    padding:9px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:64px; }
  .capacity-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .rating-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .rate-btn{
    font-family:var(--font-mono);
    font-size:11px;
    padding:7px 10px;
    border-radius:4px;
    border:1px solid var(--paper-line);
    background:#fff;
    cursor:pointer;
  }
  .rate-btn.on{ background:var(--amber); border-color:var(--amber); font-weight:700; }
  .rate-hint{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:4px; }

  /* ---------- logged experience entries ---------- */
  .exp-entry{
    background:rgba(0,0,0,0.04);
    border-left:3px solid var(--amber);
    border-radius:4px;
    padding:10px 12px;
    margin-top:10px;
  }
  .exp-entry.verdict-didntBuy{ border-left-color:var(--curtain); }
  .exp-entry.verdict-allIn{ border-left-color:var(--pink); box-shadow:0 0 0 1px rgba(255,79,160,0.18), 0 0 14px rgba(255,79,160,0.22); }
  .exp-entry-head{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.5px;
  }
  .exp-entry-head .cap{ text-transform:uppercase; font-weight:700; }
  .exp-entry .blurb{ font-family:var(--font-body); font-size:14px; margin:6px 0 0; font-style:italic; }
  .exp-entry .meta{ font-family:var(--font-mono); font-size:10px; color:#7a756d; margin-top:6px; }
  .exp-entry-actions{ margin-top:8px; }

  /* ---------- library list ---------- */
  .lib-controls{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .lib-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .lib-card:hover{ border-color:var(--amber-dim); }
  .lib-card-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .lib-card .title{ font-family:var(--font-display); font-size:17px; letter-spacing:.3px; text-transform:uppercase; }
  .lib-card .credits{ font-family:var(--font-mono); font-size:10px; color:var(--chalk-dim); margin-top:2px; }
  .cap-icons{ font-size:15px; letter-spacing:2px; white-space:nowrap; }
  .status-badge{
    font-family:var(--font-mono); font-size:10px; letter-spacing:.5px;
    padding:3px 8px; border-radius:10px; text-transform:uppercase;
  }
  .status-badge.someday{ background:var(--someday-bg); color:var(--amber); }
  .status-badge.dontcare{ background:var(--dontcare-bg); color:var(--curtain); }

  /* ---------- empty states ---------- */
  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--chalk-dim);
  }
  .empty .bulb{ font-size:40px; display:block; margin-bottom:10px; filter: drop-shadow(0 0 14px var(--bulb-glow)); }
  .empty p{ font-family:var(--font-mono); font-size:12px; letter-spacing:.5px; max-width:360px; margin:0 auto; }

  /* ---------- storage health banner ---------- */
  .storage-warning{
    background:var(--curtain);
    color:#fff;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.3px;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    text-align:center;
  }
  .storage-warning button{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:#fff;
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 9px;
    border-radius:3px;
    cursor:pointer;
  }

  /* ---------- vibe check ---------- */
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:16px;
    margin-bottom:14px;
  }
  .stat-card h3{
    font-family:var(--font-mono); font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--amber); margin:0 0 10px;
  }
  .collab-row{ display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12px; padding:4px 0; border-bottom:1px solid var(--panel-line); }
  .collab-row:last-child{ border-bottom:none; }
  .flag-row{ font-family:var(--font-body); font-size:13px; padding:6px 0; }
  .flag-row b{ color:var(--amber); }

  .anchor-tag{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--panel); border:1px solid var(--panel-line);
    border-radius:14px; padding:5px 10px; margin:0 6px 6px 0;
    font-family:var(--font-mono); font-size:11px;
  }
  .anchor-tag button{ background:none; border:none; color:var(--chalk-dim); cursor:pointer; font-size:13px; padding:0;}

  .ai-box{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:16px;
  }
  .ai-response{
    background:var(--paper); color:var(--ink);
    border-radius:6px; padding:14px 16px; margin-top:14px;
    font-family:var(--font-body); font-size:14px; white-space:pre-wrap;
  }

const STORAGE_KEY = 'ledger-data';
const API_KEY_STORAGE_KEY = 'underscore-api-key';
let DATA = { overrides:{}, customShows:{}, anchors:[] };
let dataLoaded = false;

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      DATA = JSON.parse(raw);
      DATA.overrides = DATA.overrides || {};
      DATA.customShows = DATA.customShows || {};
      DATA.anchors = DATA.anchors || [];
    }
  }catch(e){
    // no existing data yet, or storage is blocked — checkStorageHealth() catches that case
  }
  dataLoaded = true;
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  }catch(e){
    console.error('Storage save failed', e);
    showStorageWarning();
    alert('Could not save — this browser is blocking local storage (common in private/incognito windows, or very strict privacy settings). Use EXPORT now, then try a normal browser window.');
  }
}

  try{
    const probeKey = '__underscore_storage_probe__';
    localStorage.setItem(probeKey, String(Date.now()));
    const back = localStorage.getItem(probeKey);
    localStorage.removeItem(probeKey);
    if(!back) throw new Error('storage readback returned nothing');
  }catch(e){
    showStorageWarning();
  }
}

  const el = document.getElementById('storageWarning');
  if(el) el.style.display = 'flex';
}

function allShows(){
  return Object.assign({}, SEED_SHOWS, DATA.customShows);
}
function getShow(id){ return allShows()[id]; }
function getState(id){
  return DATA.overrides[id] || {status:null, experiences:[]};
}
function ensureOverride(id){
  if(!DATA.overrides[id]) DATA.overrides[id] = {status:null, experiences:[]};
  return DATA.overrides[id];
}
function setStatus(id, status){
  const o = ensureOverride(id);
  o.status = status;
  saveData();
}
function addExperience(id, exp){
  const o = ensureOverride(id);
  exp.id = 'e' + Date.now() + Math.floor(Math.random()*1000);
  o.experiences.push(exp);
  o.status = null; // logging an experience supersedes someday/dontcare
  saveData();
}
function updateExperience(id, expId, patch){
  const o = ensureOverride(id);
  const e = o.experiences.find(x=>x.id===expId);
  if(e) Object.assign(e, patch);
  saveData();
}
function deleteExperience(id, expId){
  const o = ensureOverride(id);
  o.experiences = o.experiences.filter(x=>x.id!==expId);
  saveData();
}
function addCustomShow({title, team, year, tags}){
  const id = 'custom-' + slugify(title) + '-' + Date.now();
  DATA.customShows[id] = {id, title, year: year||null, team: team||[], tags: tags||[], custom:true};
  saveData();
  return id;
}

let reviewQueue = [];
let skippedIds = new Set();
let currentReviewId = null;
let loggingMode = false;

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildReviewQueue(){
  const shows = allShows();
  const undecided = Object.values(shows).filter(s=>{
    const st = getState(s.id);
    return st.status===null && st.experiences.length===0;
  });
  shuffleArray(undecided);
  reviewQueue = undecided;
}

function nextReviewId(){
  const pool = reviewQueue.filter(s=>!skippedIds.has(s.id));
  if(pool.length>0) return pool[0].id;
  if(reviewQueue.length>0) return reviewQueue[0].id; // everything's been skipped at least once; cycle anyway
  return null;
}

function renderReview(){
  buildReviewQueue();
  const el = document.getElementById('tab-review');
  if(!currentReviewId || !reviewQueue.find(s=>s.id===currentReviewId)){
    currentReviewId = nextReviewId();
  }
  if(!currentReviewId){
    el.innerHTML = `
      <h2 class="section-title">Review</h2>
      <div class="empty">
        <span class="bulb">💡</span>
        <p>The ghost light's the only thing on. You've made a call on everything currently in the deck.</p>

      <div id="findMoreHost"></div>
    `;

      fetchMoreShows();
    };

    return;
  }

  el.innerHTML = `
    <h2 class="section-title">Turn on the ghost light</h2>
    <p class="section-sub">${reviewQueue.length} show${reviewQueue.length===1?'':'s'} left in this pass · go one at a time, no pressure</p>
    <div id="reviewCard"></div>
    <div class="btnrow" style="margin-top:14px;">

    <div id="findMoreHost"></div>

  renderReviewCard(show);

  document.getElementById('findMoreShowsInline').onclick = ()=>{
    if(!getApiKey()){ openApiKeyModal(); return; }
    fetchMoreShows();
  };
}

function wireExperienceForm(showId, isNew, onDone){
  const wrapper = document.querySelector(`[data-form]`);
  if(!wrapper) return;
  const formId = wrapper.dataset.form;
  const subEl = document.getElementById('subfields-'+formId);
  let selectedCap = null;
  let selectedVenues = new Set();
  let selectedRating = null;
  let selectedVerdict = null;

  wrapper.querySelectorAll('.cap-chip').forEach(chip=>{
    chip.onclick = ()=>{
      wrapper.querySelectorAll('.cap-chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on');
      selectedCap = chip.dataset.cap;
      selectedVenues = new Set();
      selectedRating = null;
      selectedVerdict = null;
      subEl.innerHTML = subfieldsHtml(formId, selectedCap);
      wireSubfields();
    };
  });

  function wireSubfields(){
    subEl.querySelectorAll('.venue-chip').forEach(vc=>{
      vc.onclick = ()=>{
        vc.classList.toggle('on');
        if(vc.classList.contains('on')) selectedVenues.add(vc.dataset.venue);
        else selectedVenues.delete(vc.dataset.venue);
      };
    });
    subEl.querySelectorAll('.f-rate, .f-rate-none').forEach(rb=>{
      rb.onclick = ()=>{
        subEl.querySelectorAll('.f-rate, .f-rate-none').forEach(x=>x.classList.remove('on'));
        rb.classList.add('on');
        selectedRating = rb.dataset.r ? Number(rb.dataset.r) : null;
        const hint = document.getElementById('ratehint-'+formId);
        if(hint) hint.textContent = selectedRating ? RATING_LABELS[selectedRating] : '';
      };
    });
    subEl.querySelectorAll('.verdict-chip').forEach(vc=>{
      vc.onclick = ()=>{
        subEl.querySelectorAll('.verdict-chip').forEach(x=>x.classList.remove('on'));
        vc.classList.add('on');
        selectedVerdict = vc.dataset.v;
      };
    });
    const saveBtn = subEl.querySelector('.f-save');
    const cancelBtn = subEl.querySelector('.f-cancel');
    if(saveBtn) saveBtn.onclick = ()=>{
      if(!selectedCap){ alert('Pick a capacity first — how did you experience this one?'); return; }
      const sublabelEl = subEl.querySelector('.f-sublabel');
      const performedEl = subEl.querySelector('.f-performed');
      const exp = {
        capacity: selectedCap,
        subLabel: sublabelEl ? sublabelEl.value.trim() : '',
        performedIn: performedEl ? performedEl.checked : false,
        venueTypes: Array.from(selectedVenues),
        location: subEl.querySelector('.f-location').value.trim(),
        dateNote: subEl.querySelector('.f-datenote').value.trim(),
        rating: selectedRating,
        verdict: selectedVerdict,
        blurb: subEl.querySelector('.f-blurb').value.trim(),
        moment: subEl.querySelector('.f-moment').value.trim(),
      };
      addExperience(showId, exp);
      onDone();
    };
    if(cancelBtn) cancelBtn.onclick = ()=> onDone();
  }
}

function expEntryHtml(showId, e){
  const cap = CAPACITIES.find(c=>c.key===e.capacity);
  const verdict = VERDICTS.find(v=>v.key===e.verdict);
  const verdictClass = e.verdict==='didntBuy' ? 'verdict-didntBuy' : (e.verdict==='allIn' ? 'verdict-allIn' : '');
  const bits = [];
  if(e.subLabel) bits.push(escapeHtml(e.subLabel));
  if(e.venueTypes && e.venueTypes.length) bits.push(e.venueTypes.map(escapeHtml).join('/'));
  if(e.location) bits.push(escapeHtml(e.location));
  if(e.dateNote) bits.push(escapeHtml(e.dateNote));
  return `
    <div class="exp-entry ${verdictClass}">
      <div class="exp-entry-head">
        <span class="cap">${cap?cap.icon+' '+cap.label:e.capacity}</span>
        <span>${e.rating?RATING_LABELS[e.rating]+' ('+e.rating+'/5)':'no rating'} ${verdict? '· '+verdict.label:''}</span>
      </div>
      ${bits.length?`<div class="meta">${bits.join(' · ')}</div>`:''}
      ${e.performedIn?`<div class="meta">🎭 performed in this one</div>`:''}
      ${e.blurb?`<div class="blurb">"${escapeHtml(e.blurb)}"</div>`:''}
      ${e.moment?`<div class="meta">★ ${escapeHtml(e.moment)}</div>`:''}
      <div class="exp-entry-actions">
        <button class="btn small danger" data-del="${showId}|${e.id}">remove</button>
      </div>
    </div>
  `;
}

function renderLibList(){
  const listEl = document.getElementById('libList');
  const shows = Object.values(allShows());
  const filtered = shows.filter(s=>{
    const st = getState(s.id);
    const hasLogged = st.experiences.length>0;
    const isHiddenStatus = st.status==='someday' || st.status==='dontcare';
    if(!hasLogged && !isHiddenStatus) return false; // untouched shows live only in Review
    if(isHiddenStatus && !hasLogged && !libFilter.showHidden) return false;
    if(libFilter.text && !s.title.toLowerCase().includes(libFilter.text)) return false;
    if(libFilter.cap && !st.experiences.some(e=>e.capacity===libFilter.cap)) return false;
    return true;
  });
  filtered.sort((a,b)=>a.title.localeCompare(b.title));
  if(filtered.length===0){
    listEl.innerHTML = `<div class="empty"><span class="bulb">🎫</span><p>Nothing here yet. Log something in Review, or add a show directly.</p></div>`;
    return;
  }
  listEl.innerHTML = filtered.map(s=>{
    const st = getState(s.id);
    const caps = [...new Set(st.experiences.map(e=>e.capacity))];
    const capIcons = caps.map(c=> (CAPACITIES.find(x=>x.key===c)||{}).icon || '').join(' ') + (st.experiences.some(e=>e.performedIn) ? ' 🎭' : '');
    let badge = '';
    if(st.status==='someday') badge = `<span class="status-badge someday">someday</span>`;
    if(st.status==='dontcare') badge = `<span class="status-badge dontcare">don't care</span>`;
    return `
      <div class="lib-card" data-show="${s.id}">
        <div class="lib-card-top">
          <div>
            <div class="title">${escapeHtml(s.title)}</div>
            <div class="credits">${s.year?s.year+' · ':''}${s.team.map(escapeHtml).join(', ')}</div>
          </div>
          <div style="text-align:right;">
            ${badge}
            <div class="cap-icons">${capIcons}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  listEl.querySelectorAll('.lib-card').forEach(card=>{
    card.onclick = ()=> openLibDetail(card.dataset.show);
  });
}

function openLibDetail(showId){
  const show = getShow(showId);
  const state = getState(showId);
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `
    <div class="modal" style="max-width:600px;">
      <h2 class="section-title" style="color:var(--ink)">${escapeHtml(show.title)}</h2>
      <p style="font-family:var(--font-mono);font-size:11px;color:#5a5550;margin-top:-6px;">${show.year?show.year+' · ':''}${show.team.map(escapeHtml).join(', ')}</p>
      <div id="libDetailExp">${state.experiences.map(e=>expEntryHtml(showId,e)).join('') || "<p style=\"font-size:13px;color:#7a756d;\">No experiences logged. Just a someday or dont-care flag.</p>"}</div>
      <div class="btnrow">
        <button class="btn amber" id="ld-add">+ log an experience</button>
        <button class="btn small" id="ld-close">Close</button>
      </div>
      <div id="ld-formhost"></div>
    </div>
  `;
  document.body.appendChild(back);
  back.querySelector('#ld-close').onclick = ()=>{ back.remove(); renderLibrary(); };
  back.querySelector('#ld-add').onclick = ()=>{
    const host = back.querySelector('#ld-formhost');
    host.innerHTML = experienceFormHtml(showId, false);
    wireExperienceForm(showId, false, ()=>{
      back.remove();
      renderLibrary();
    });
  };
}

/* ============================================================
   VIBE CHECK TAB
   ============================================================ */
function renderVibe(){
  const el = document.getElementById('tab-vibe');
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);

  // collaborator stats
  const collabMap = {};
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const ratings = st.experiences.map(e=>e.rating).filter(r=>r!==null && r!==undefined);
    const boughtInCount = st.experiences.filter(e=>e.verdict==='boughtIn' || e.verdict==='allIn').length;
    const total = st.experiences.length;
    s.team.forEach(person=>{
      if(!collabMap[person]) collabMap[person] = {ratings:[], boughtIn:0, total:0, shows:new Set()};
      collabMap[person].ratings.push(...ratings);
      collabMap[person].boughtIn += boughtInCount;
      collabMap[person].total += total;
      collabMap[person].shows.add(s.title);
    });
  });
  const collabStats = Object.entries(collabMap)
    .filter(([_,v])=>v.total>0)
    .map(([name,v])=>{
      const avg = v.ratings.length ? (v.ratings.reduce((a,b)=>a+b,0)/v.ratings.length) : null;
      const boughtInRate = v.boughtIn / v.total;
      return {name, avg, boughtInRate, showCount: v.shows.size};
    })
    .sort((a,b)=> b.boughtInRate - a.boughtInRate || (b.avg||0)-(a.avg||0))
    .slice(0,8);

  // "stuck at fine" flags
  const flags = [];
  loggedShows.forEach(s=>{
    const st = getState(s.id);
    const rated = st.experiences.filter(e=>e.rating!==null && e.rating!==undefined);
    const distinctCaps = new Set(rated.map(e=>e.capacity));
    if(rated.length>=2 && distinctCaps.size>=2){
      const ratings = rated.map(e=>e.rating);
      const max = Math.max(...ratings), min = Math.min(...ratings);
      const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;
      if(max-min<=1 && avg>=2.5 && avg<=3.5){
        flags.push(`<b>${escapeHtml(s.title)}</b> sits right in the "fine" band across ${distinctCaps.size} different formats — that's usually a quieter, more reliable signal than a single bad rating. Worth naming what it actually is, rather than letting it keep getting recommended on the strength of a so-so number.`);
      }
    }
  });

  el.innerHTML = `
    <h2 class="section-title">Vibe Check</h2>
    <p class="section-sub">what the ledger says about your actual taste, not the popular consensus</p>

    <div class="stat-card">
      <h3>Creative collaborators you keep buying into</h3>
      ${collabStats.length ? collabStats.map(c=>`
        <div class="collab-row"><span>${escapeHtml(c.name)} <span style="color:var(--chalk-dim)">(${c.showCount} show${c.showCount===1?'':'s'})</span></span>
        <span>${c.avg?c.avg.toFixed(1)+'/5 avg · ':''}${Math.round(c.boughtInRate*100)}% loved or bought in</span></div>
      `).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">Log a few experiences and this fills in.</p>'}
    </div>

    <div class="stat-card">
      <h3>Stuck-at-fine flags</h3>
      ${flags.length ? flags.map(f=>`<div class="flag-row">${f}</div>`).join('') : '<p style="font-family:var(--font-mono);font-size:12px;color:var(--chalk-dim);">No "fine across every format" patterns yet. (You know which show eventually triggers this one.)</p>'}
    </div>

    <div class="stat-card">
      <h3>Non-theater anchors</h3>
      <p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">Stuff outside theater entirely that explains your taste better than any genre tag — a show, a band, a TV writer. This is how "computer friend" catches the Schlesinger-shaped connections.</p>
      <div id="anchorList"></div>
      <div class="btnrow">
        <input type="text" id="anchorInput" placeholder="e.g. Crazy Ex-Girlfriend" style="flex:1;font-family:var(--font-body);padding:8px 10px;border-radius:4px;border:1px solid var(--panel-line);background:var(--stage);color:var(--chalk);">
        <button class="btn ghost-dark small" id="anchorAdd">add</button>
      </div>
    </div>

    <div class="stat-card ai-box">
      <h3>Ask Computer Friend</h3>
      <p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);margin-top:0;">
        Runs your logged data through Claude for an actual opinion — not flattery, reasoning. Good for "why do I really hate this" or "what am I missing."
      </p>
      <p style="font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin-top:0;">Optional feature — needs a personal API key. First click opens setup.</p>
      <div class="btnrow">
        <button class="btn amber" id="runVibeCheck">Run a general vibe check + recs</button>
      </div>
      <div class="field">
        <label>Or ask something specific</label>
        <textarea id="aiQuestion" placeholder="e.g. why do I keep getting Hadestown recommended when I clearly don't buy it?"></textarea>
      </div>
      <div class="btnrow">
        <button class="btn" id="askAi">Ask</button>
      </div>
      <div id="aiResponseHost"></div>
    </div>
  `;
  renderAnchors();
  document.getElementById('anchorAdd').onclick = ()=>{
    const inp = document.getElementById('anchorInput');
    const val = inp.value.trim();
    if(val){
      DATA.anchors.push({id:'a'+Date.now(), name:val});
      saveData();
      inp.value='';
      renderAnchors();
    }
  };
  document.getElementById('runVibeCheck').onclick = ()=>{
    if(!getApiKey()){ openApiKeyModal(); return; }
    runAiVibeCheck(null);
  };
  document.getElementById('askAi').onclick = ()=>{
    if(!getApiKey()){ openApiKeyModal(); return; }
    const q = document.getElementById('aiQuestion').value.trim();
    if(q) runAiVibeCheck(q);
  };
}

function renderAnchors(){
  const el = document.getElementById('anchorList');
  if(!el) return;
  el.innerHTML = DATA.anchors.map(a=>`
    <span class="anchor-tag">${escapeHtml(a.name)} <button data-anchor-del="${a.id}">✕</button></span>
  `).join('') || '<p style="font-family:var(--font-mono);font-size:11px;color:var(--chalk-dim);">none yet</p>';
  el.querySelectorAll('[data-anchor-del]').forEach(btn=>{
    btn.onclick = ()=>{
      DATA.anchors = DATA.anchors.filter(a=>a.id!==btn.dataset.anchorDel);
      saveData();
      renderAnchors();
    };
  });
}

function buildLedgerSummary(){
  const loggedShows = Object.values(allShows()).filter(s=>getState(s.id).experiences.length>0);
  const someday = Object.values(allShows()).filter(s=>getState(s.id).status==='someday');
  const dontcare = Object.values(allShows()).filter(s=>getState(s.id).status==='dontcare');
  return {
    logged: loggedShows.map(s=>({
      title: s.title,
      year: s.year,
      team: s.team,
      tags: s.tags,
      experiences: getState(s.id).experiences.map(e=>({
        capacity: e.capacity, subLabel: e.subLabel, rating: e.rating,
        verdict: e.verdict, blurb: e.blurb, moment: e.moment
      }))
    })),
    someday: someday.map(s=>s.title),
    dontcare: dontcare.map(s=>s.title),
    nonTheaterAnchors: DATA.anchors.map(a=>a.name),
  };
}

async function runAiVibeCheck(customQuestion){
  const host = document.getElementById('aiResponseHost');
  const apiKey = getApiKey();
  if(!apiKey){
    host.innerHTML = `<div class="ai-response">No API key set yet — tap "API KEY" in the header to add one (optional, takes a minute).</div>`;
    return;
  }
  host.innerHTML = `<div class="ai-response loading">thinking it over...</div>`;
  const summary = buildLedgerSummary();
  if(summary.logged.length===0){
    host.innerHTML = `<div class="ai-response">Log a few experiences first — there's nothing to read your taste off of yet.</div>`;
    return;
  }
  const systemPrompt = `You are "Computer Friend" inside a personal theater ledger app. The user is a serious, longtime theatergoer (30 years) who explicitly does NOT want flattery — they want genuine, well-reasoned takes, the kind a sharp, well-read friend would give, including pushback when warranted. Use their logged ratings, verdicts (all in / bought in / mixed / didn't buy it / no strong take), blurbs, and non-theater anchors to find real taste patterns — especially ones tied to specific creative collaborators or cross-medium connections (a TV writer, a band, etc), not generic genre-matching. Treat a consistent "fine" (rating 3) across multiple formats of the same show as a real signal of quiet dislike, not neutrality — don't recommend more of that pattern. Never recommend anything already in their "don't care" list. When you recommend something, always say explicitly WHY it connects to their data — cite the specific show, collaborator, or anchor that justifies it. Be concise: a few sharp paragraphs, not a report. No bullet-point therapy-speak, no "I hear you" filler.`;
  const userMsg = customQuestion
    ? `Here is my theater ledger data as JSON:\n${JSON.stringify(summary)}\n\nQuestion: ${customQuestion}`
    : `Here is my theater ledger data as JSON:\n${JSON.stringify(summary)}\n\nGive me a real vibe check: what does this data say about my actual taste (beyond genre), and suggest 2-3 shows I haven't logged that fit — with explicit reasoning for each, not vibes-based guessing. If you spot a "stuck at fine" pattern, call it out directly.`;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }],
      })
    });
    const data = await response.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
    const text = textBlocks.join('\n').trim();
    host.innerHTML = `<div class="ai-response">${escapeHtml(text || 'No response text came back — try again.')}</div>`;
  }catch(e){
    host.innerHTML = `<div class="ai-response">Couldn't reach Computer Friend just now. Try again in a moment.</div>`;
  }
}

async function fetchMoreShows(){
  const host = document.getElementById('findMoreHost');
  const apiKey = getApiKey();
  if(!apiKey){
    if(host) host.innerHTML = `<div class="ai-response" style="margin-top:12px;">No API key set yet — tap "API KEY" in the header to add one (optional, takes a minute).</div>`;
    return;
  }
  if(host) host.innerHTML = `<div class="ai-response loading" style="margin-top:12px;">asking around backstage for titles you haven't been asked about...</div>`;
  const existingTitles = Object.values(allShows()).map(s=>s.title);
  const systemPrompt = `You generate musical theater data for a personal tracking app. Respond with ONLY a raw JSON array, no prose, no markdown code fences, no commentary before or after. Each array item must be an object with exactly these keys: "title" (string), "year" (number, premiere year, best guess if unsure), "team" (array of strings — composer/lyricist/book writer names), "tags" (array of short lowercase genre keywords). Only include MUSICALS — never straight plays. Favor real, verifiable, well-known productions (Broadway, West End, major national tours, notable off-Broadway or jukebox shows). Do not invent shows.`;
  const userMsg = `Here are titles already in the user's musical theater database — do not repeat any of these:\n${JSON.stringify(existingTitles)}\n\nGive me 20 more real musicals not in that list, spanning a mix of eras and styles (some classic/golden-age, some 90s-2000s, some recent — and feel free to include some lesser-known or off-Broadway titles, not just the most obvious marquee names).`;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }],
      })
    });
    const data = await response.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
    let raw = textBlocks.join('\n').trim();
    const start = raw.indexOf('[');
    const end = raw.lastIndexOf(']');
    if(start===-1 || end===-1) throw new Error('no JSON array found in response');
    raw = raw.slice(start, end+1);
    const items = JSON.parse(raw);
    const existingLower = new Set(existingTitles.map(t=>t.toLowerCase()));
    let added = 0;
    items.forEach(item=>{
      if(!item.title) return;
      if(existingLower.has(String(item.title).toLowerCase())) return;
      addCustomShow({title:item.title, year:item.year||null, team:item.team||[], tags:item.tags||[]});
      existingLower.add(String(item.title).toLowerCase());
      added++;
    });
    if(host) host.innerHTML = `<div class="ai-response" style="margin-top:12px;">Added ${added} new show${added===1?'':'s'} to the deck.</div>`;
    currentReviewId = null;
    setTimeout(renderReview, 600);
  }catch(e){
    if(host) host.innerHTML = `<div class="ai-response" style="margin-top:12px;">Couldn't reach Computer Friend just now — try again in a moment.</div>`;
  }
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'the-underscore-backup.json';
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!confirm('This will replace your current ledger data with the imported file. Continue?')) return;
      DATA = Object.assign({overrides:{}, customShows:{}, anchors:[]}, parsed);
      saveData();
      currentReviewId = null;
      renderReview();
      renderLibrary();
      renderVibe();
      alert('Imported.');
    }catch(err){
      alert('That file did not parse as valid ledger JSON.');
    }
  };
  reader.readAsText(file);
};

/* ============================================================
   UTIL + INIT
   ============================================================ */
function escapeHtml(str){
  if(str===null || str===undefined) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

(async function init(){
  document.getElementById('tab-review').innerHTML = `<div class="empty"><span class="bulb">💡</span><p>loading the ledger...</p></div>`;
  checkStorageHealth();
  await loadData();
  renderReview();
})();
</script>
